body:
  text: 程氏春秋或問目録春秋類卷一隱公卷二桓公卷三莊公閔公卷四僖公卷五文公卷六宣公卷七成公卷八襄公卷九昭公卷十定公哀公臣等謹案春秋或問十卷元程端學撰端學既輯春秋本義復歷舉諸説之得失以明去取之意因成此書與本義相輔而行者也其掊擊諸説多否少可于張洽之傳攻之尤力然如論春秋不當以一字為褒貶論春秋多筆削以後之闕文論春秋不書祥瑞論春秋災異不當強舉其事應皆具有卓識其他持論亦多正大惟謂左氏事實多出偽撰又堅主夏時之説力詆左氏王周正傳雖至於春書無冰亦以為建寅之月而穿鑿周禮豳詩以解之不知左氏周人説經或有未確記事未必盡誤若自紀其本朝之正朔則更必不誤也端學所言其無乃矯枉過正乎蓋杜預諸人篤守專門其弊不免屈經以從傳而端學諸人務伸已説其弊亦不免廢傳以説經讀宋元以來之春秋者取其所長而知其所短可矣乾隆三十九年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:c3c30e40d24822c4186fd56c68514d9fa266c604fa3f72ca1f206345934bb5e7
