body:
  text: 春秋或問卷一元程端學撰或問曰春秋名義先儒不一其説子一切削之獨有取於杜氏之說何也曰春秋者魯史之本號非孔子所名孟子曰晉之乘楚之檮杌魯之春秋左氏載韓起適魯見魯春秋司馬侯謂羊舌肸習春秋以對晉悼公申叔時以教春秋為傅太子法皆前乎孔子之辭古人簡質即物取名如詩名闗睢盧令書名益稷梓材之類姑借此以紀簡編何必研精覃思轉相訓詁釋其命名之義哉故惟杜氏得之爾曰春秋之始乎隐公或謂其賢且讓或謂始於蔑之盟或謂天王下賵諸侯之妾子獨取程子孫氏以為平王之所終者何也曰春秋非為魯隐作也假魯史立教為萬世法者也隐公賢乎常事耳春秋不書常事况隐公十年之間經之所書莫非過行而謂其賢乎若曰始蔑之盟則魯惠以上固有盟矣隠三年石門之盟左氏曰尋盧之盟也盧之盟在春秋之前是知魯惠以上固有盟也此盟適當隠之初耳若曰天王下賵諸侯之妾則於平王戌申忘父事讎孰重哉不始於彼而獨始於此乎借曰魯史所無不得以為始然平王所以號令不及天下者必有其故不獨此一事矣故石氏曰春秋以無王而作孰謂隠賢且讓而始之哉趙木訥亦曰凡諸儒欲以一事當春秋之始者皆妄也曰朱子解詩以平王戌申使復讎討賊之師為報施酬恩之舉忘親逆理而春秋作者何也曰朱子之言至矣然不過因詩之一事以立論王綱之壊雖此之由而平王五十年間壊王綱者非止一事朱子之詩曰涇舟膠楚澤周綱已陵遲况復王風降故宫黍離離宣聖作春秋哀傷實在兹亦不専取一事為春秋始也隠公元年或問曰元年之元先儒曰元即仁也仁人心也子不之取何也曰在易元亨利貞之元可謂在天為元在人為仁若數年而以仁為訓遂謂仁年得乎楊龜山固已病其太支離矣其與說者所謂變一為元元者氣也葢相類矣况元年者上古以來歴歴稱之何獨春秋始有深義以下闕文以上原闕二十一行秋似元有此中也曰先儒謂書春王正月示人君當上奉天時下奉王正明此義則王與天同久而人道立者其意微矣子亦不取何也曰意則微矣然施之紀事之年月則未有此意矣故劉氏云大凡元年春正月公即位此八字文理相須苟載事者必皆庸焉非聖人新意惟王一字在春正之間為聖人新意耳此說庶矣然愚又謂王一字亦非聖人新意其曰王正月者王所班之正月猶言王之正月也豈聖人新意哉嘗謂自元年春王正月六字亦非聖人新意惟書公即位雖因舊史而有不請命之譏所謂其義則丘竊取之者也曰然則序王於年月之間者誰歟曰魯史也以理論之諸侯國史當有王字若周史則弗書之矣曰如子之言則教天下後世一魯史而足焉用孔子筆削乎曰非此之謂也孔子傷周之不王也義利之不明也王伯之不辨也夷夏之無别也諸侯大夫之僭竊也災異薦出而莫之戒也於是削魯史之合於禮者筆魯史之不合於禮者以訓後世使人知其非禮則禮有在矣其所以防民之欲而約之於義理之中者懇矣至矣故曰克己復禮閑邪存誠此春秋所由作也而其叙事之年月則不問有禮與否而悉書之以次其事之先後惡用深求也哉故春秋立教在其事而不在其年時月日之間若因年時月日而考其事之逺近緩速重復先後則有之矣故春秋紀事有月者書王無月而時者不書王愚以是益信月書王月而不可離王正月為二句矣故曰以年時月日而論春秋者求之過者也曰鄭夾漈陳君舉皆謂諸侯舊用天子之年諸侯止稱世至平王失政諸侯並稱元年者彼亦有考乎曰無所考也彼亦以改元為重事而意其非諸侯之權也故黄氏曰諸侯所謂奉天子正朔者謂以子丑寅為嵗首講朝聘耳未必使諸侯皆以天子之元年為元年葢封建之法肈自黄帝諸侯之世守其國固有出於三代興王之前者有王者興特以禮相與諸侯各自有其國各自有即位則亦各自有始年安得一律以天子之年為年其曰諸侯以世計者恐世逺難考姑舉其世次歟此論得之曰先儒謂春秋用周正正月為夏之十一月子獨不然何也曰蔡氏釋書元祀十有二月之義曰元祀者太甲即位之元年十二月者商以建丑為正故以十二月為正也三代雖正朔不同然皆以寅月起數葢朝覲㑹同班厯授時則以正朔行事至於紀月之數則皆以寅為首也改正朔而不改月數則於經史尤可考周建子矣而詩言四月維夏六月徂暑則寅月起數周未嘗改也秦建亥矣而史記始皇帝十一年十二月更名臘曰嘉平夫臘必建丑月也秦以亥正則臘為三月云十二月者寅月起數秦未嘗改也至三十七年書十月癸丑始皇出遊十一月行至雲夢繼書七月丙寅始皇崩九月𦵏驪山先書十月十一月而繼書七月八月知其以十月為正朔而寅起月數未嘗改也且秦史制書謂改年始朝賀皆據十月朔夫秦繼周者也若改月數則周之十月為建酉月矣安在其為建亥乎漢初史氏所書舊制也漢仍秦正亦書曰元年冬十月則正朔改而月數不改亦已明矣黄氏曰據杜氏注左傳有周正月今十一月之語先儒遂多指春秋之春為冬建子之月至胡康侯講春秋始謂前乎周以丑為正書元祀十有二月知月不易也後乎周以亥為正書元年冬十月知時不易也建子之月非春明矣聖人語顔回以為邦則曰行夏之時作春秋以經世則曰春王正月葢以夏時冠周月垂法萬世以周正紀事示無其位而不敢専也然康侯以春為夏正之春建寅而非建子可也以月為周之月則時與月異又在疑而未决也故晦菴先生以為若如胡氏說則月與時當差兩月恐聖人作經不若此之紛更戴岷隠講春秋常以夏正為說於時亦未見為闕竊意三代雖有正朔之事而天時無遷改之理趙浚南曰周正夏正之辨雖各有據隨其所信然天時終不可易月數實未嘗改春秋用夏正數月本無可疑然獨疑月數不改則周之大事必用建子之月魯當在十一月即位而今在寅月即位何也葢當時諸侯放恣國各有歴考之唐志周魯宋各自有歴法晉當獻恵之世大抵皆用夏正豈魯自改正朔用夏正寅月即位而春秋因其舊乎或曰果如是則經惡得不正之曰春秋因魯史而脩春秋不曰其文則史乎若定公即位在六月亦據實書之况一經所在皆非常事魯用寅月即位當直書之以懲専恣豈得改其實哉或又曰即位書不書各有義豈専為正朔設乎曰春秋一事該數義者甚多此其一義耳家氏曰寅卯辰為春寅為嵗首此百王不易之正也虞夏而上春首寅嵗首寅天時王正兩得其正自商人以建丑為嵗首周人以建子為嵗首而百王之正與二代之嵗首始判為二夫子云行夏之時欲正與時皆以寅為嵗首革二代之嵗首而為百王不易之正此夫子之志然周雖建子為嵗首不過發號施令自此而始而周家所以揆時授功者夏時夏正也彼謂周家以建子首十一月者左氏之誤也以為周家變易四時以子丑寅為春卯辰巳為夏午未申為秋酉戌亥為冬者孔安國鄭康成之大誤也葢自羲皇肈立人極仰觀天運之常俯察氣化之變分隂陽以序四時而春夏秋冬之位以定十二月之次以立此皆因其自然之理非聖人以己之私智而强為之區别也以窮冬為春非生物之候也以夏為秋物之方長而未成也以秋為冬而嵗功未畢欲閉藏而莫可也商周聖人之心亦虞夏聖人之心其欽若天道敬授人時一而已矣夫豈變易四時貿亂寒暑而曰吾以是新民聼者哉蓋嵗首者將以發號施令而正月則以紀年授時嵗首可改正月不可改也見之書伊訓元祀十有二月乙丑伊尹奉嗣王祗見厥祖太甲中篇三祀十有二月朔伊尹奉嗣王歸於亳此十二月乃商家之嵗首而但謂之十二月以見商家雖以建丑為嵗首未嘗改十二月為正月也又如臨卦之彖辭曰元亨利貞至於八月有凶指觀而言也臨二陽四隂之卦直十二月觀二陽四隂之卦直八月葢自今年十二月指明年八月而言當二陽之寖長豫憂四隂之將盛以臨觀相為反對云爾此卦下之辭文王所為是時商人以丑為嵗首而文王之彖惟從夏正此商家月次不易之明證也周書泰誓一月戊午師渡孟津武成一月壬辰旁死魄一月者建寅之月正也春大㑹于孟津者夏時孟春建寅之月也孔氏乃以一月為建子之月其意以為三代改正朔必改月數改月數必以其正為四時之首夫豈知改正朔者不過更其嵗首春秋冬夏可得而變易乎十二月次可得而紊乎又考之詩及二禮其義益明𫝊註不足惑矣詩豳風七月流火九月授衣者夏時也小雅六月北伐四月維夏六月徂暑等詩與周頌臣工維莫之春者皆夏時也臣工之詩乃諸侯助祭及莫春遣之歸國告戒之辭也曰維莫之春亦又何求如何新畬於皇來牟將受厥明言莫春則當治耕作之事牟麥將熟可以受上帝之明賜夫牟麥將熟則建辰之月夏正之季春也而鄭氏箋詩乃指周之莫春為夏之孟春則四時之為易位其舛豈不甚乎周官冬日至祀圜丘夏日至祀方澤季春出火季秋納火仲夏斬隂木仲冬斬陽木皆指夏時而言也凌人掌氷正嵗十二月令斬氷𫝊者云夏正十二月今之季冬也若以為周正十二月今之孟冬水始凍冰未及堅冰可藏乎内宰仲春詔内外命婦始蠶夏仲春也若以為周之仲春今十二月而可蠶乎天官正月始和布治于邦國都鄙者亦夏正正月也而𫝊乃以為周正建子月此一時而從周從夏之不同其實正月布治者亦夏正也又如禮記月令一篇純乎用夏時者也王肅蔡伯喈皆以為周公遺書吕不韋稍加傅㑹以行乎世實則周公之書彼不韋豈知為此乎汲冢書者不知何所從來要之亦古書也其周月觧時觧訓等篇四時中節大率與月令相似且其言曰夏數得天百王所同我周改正易械以垂三統至於敬授人時廵狩烝享猶自夏焉又有嘗麥觧曰成王四年孟夏初謁宗廟乃嘗麥於太祖若以卯月為孟夏安有麥可嘗乎必如鄭孔之說錯亂四時變易冬夏則所謂分至啓閉十有二候十有二律乃不與天氣物化相應商周聖人吾知必不為此也又如魯論曽㸃舍瑟一章所謂莫春者亦可指為夏正之正月乎今之正月寒氣猶壯既非春服可成之侯亦非可浴之時則此莫春非夏正而何孟子曰十一月徒杠成十二月輿梁成云者本言脩治橋梁必在冬深水涸之時徒杠十一月可成澗水先涸也輿梁必十二月乃成河水後涸至是時乃可施工云耳𫝊者引夏令為證則非本㫖此又月次不易見之魯論孟子者也自左傳一失以春王正月為周王正月孔鄭再失以周正說詩傳書杜元凱三失撰為長歴以從左傳之訛自是以來千有餘年諸儒議論膠固未能致辨乎此迨河南程先生謂春秋假天時立義故文定𫝊春秋祖述其說謂夏時冠周月一以夏時周月為斷時夏時則寅卯辰為春月周月則子為嵗首時自時月自月不相為謀春秋春王正月果若是乎竊嘗觀程子之意似謂夫子以夏時冠周月以見行夏時之意但春秋有年之下書時而紀事者如隠二年春公㑹戎于潛之類自舊已然葢史失其月僅著其時而春秋因之耳今以為夫子冠以是時猶存周月其不然與葢左傳自王正曰周正本非確然一定之論後人以元凱為之長厯而厯法有未易知者故依違而不敢議而不知厯務遷就以求其合唐人善厯者固常非之謂日干或不在其月則改易閏餘曲為遷就故閏月相距近者十餘月逺或七十餘月如是而求合果何益於經乎或曰然則用夏正泝而上之至春秋之世可得合乎曰天運有常有變只如日月之行雖云度數一定不能不稍有盈縮有交㑹而不食者有頻交而頻食者故自古無不差之厯是可以定數求乎元凱務遷就求合周正卒不得合每為之遁辭曰此經誤也此厯誤也後人舍五經之明證而從事於厯固當有一二合者然得諸此而遺諸彼合於前則爽於後是亦偶合而已矣是故窮經者不必論厯又曰言春秋用周正者左氏傳也羽翼左氏之說為之厯以傳於後者杜元凱也愚未能學厯豈敢輕議前人之非然欲發明夏正之說不容己於言也僖公五年左傳書王正月辛亥朔日南至說者以為周正建子之明證此乃傳之南至而非經之南至豈得置而勿論乎夫閏法自虞夏以來未之有改也厯家置閏準以三十二月為準而長厯自僖元年閏十一月至五年閏十二月相去凡五十月不與古厯御同此杜氏曲為遷就以求合傳五年之南至是嵗南至實不在此月何以言之所謂冬日至者夏日至者乃日行極南極北之驗未聞春之首秋之初而可以至言也今左氏於此年春書春王正月日南至是以建子月為孟春春而日至古有是乎春可以書日南至秋可以書日北至乎二至既舛二分亦可從而舛乎左傳於分至啓閉每謹記而備之今既以子丑寅為春則必以午未申為秋四序分錯中節而隨之紊亂建子月立春則建丑月為春分乎建午月立秋則未月可得為秋分乎春秋分者本謂晝夜等寒暑中今以窮冬盛夏為春秋分晝夜可得而均乎寒暑可得而中乎推是以往天氣物化悉皆舛紊愚不知孔鄭謂商周變易四時者至此何以為之說乎此以厯而言也考之傳文左氏自不能固守周正之說每每雜引周夏正以揆一時之事而杜氏曲為說以通之終有不可得而通者聊舉一二以釋學者之疑隐三年左傳云四月鄭祭足帥師取溫之麥秋又取成周之禾夏之言麥秋之言禾其為夏時固宜而杜氏乃以此四月為周之二月以此秋為周之夏謂是芟踐成周未成之禾麥何其用意區區若此乎晉伐虢圍上陽問之卜偃曰吾其濟乎對曰童謡云云其九月十月之交乎冬十二月丙子朔晉滅虢左傳以周正紀事卜偃以夏正釋童謡從左傳乎從卜偃乎卜偃生於當時世典晉卜若周家以建子為正月卜偃何為以十二月為夏正之十月乎綘縣老人云臣生之嵗正月甲子朔四百四十五甲子矣師曠士文伯以嵗考之定為七十三嵗老人葢生於魯文公十一年夏正建寅之正月朔至襄公二十九年夏正十二月為二萬六千六百有六旬為嵗七十三而左氏乃載此事於三十年之二月則老人乃生文公十一年三月甲子而非正月甲子至是七十有四矣藉令老人隠者誤舉夏正師曠士文伯博極精詣不當與之俱誤周家以建子為正而二子以夏正計老人始生之嵗必無是也莊二十五年六月辛未朔日有食之鼓用牲于社左傳云惟正陽之月慝未作日有食之用幣伐鼓則以是月非正陽之月不當用正陽之禮故經以是為譏爾夫既非正陽之月則是月乃夏正之六月奚疑元凱求以通周正之誣乃曰以長厯推此六月朔乃七月朔置閏失所以致月錯此借厯法之不可知者以為遁辭非經意亦非左傳所以立例之本意是不可以無辨也又如城築興作之事多以輕用民力而書左氏一以周正為斷曰此時也此不時也宣公八年十月城平陽傳曰書時也夫以水昏正為興作之候者傳例也以周正而言此十月乃夏正之八月是時北方七星何由昏正而左氏乃以城平陽為得時而書則十月乃夏正而非周正亦明矣左傳自不守其周正之說後先矛盾不相為同後人乃依違避就而不敢改遂使春秋夏時著義鬱而不揚愚竊恨焉學者知左傳之訛則孔鄭杜之說可以坐判矣然後可與言春秋矣請即經之正文而概論之夫冬而烝禮之常也春秋常事不書桓八年正月書烝五月又書烝再書之以譏烝之不以時榖梁子似亦知夏時之說其言曰烝冬事也而春興之夏又興之春秋所以譏胡文定又引周官大司馬仲冬田而烝者以證正月為建子月其可哉周禮仲冬固是夏時十一月十一月而田維其時矣十一月而烝亦其時矣而春秋之正月乃夏時之正月正月而書烝謂其過時而書豈得反以周禮仲春之田而證春秋正月之烝必指春秋正月為周正建子月謂春秋以一嵗再烝而書不以不時而書若然則春秋於夏五月一書烝以譏不時可也正月之烝既得其時又何以書為哉桓十四年八月辛未御廩災乙亥嘗八月而嘗時也常事不書也所以書為御廩災甫三日而嘗所以譏爾御廩者粢盛之所藏今而告災不知戒懼春秋是以譏公榖二傳皆同而孫泰山胡文定乃謂此八月乃周正之八月周正之八月乃夏家之六月六月而嘗不時所以書失春秋繼災書嘗示警之意矣嗟夫烝之不時者以為時嘗之時者以為不時不過以證夏時冠月周正紀事之說耳且以春秋所書寒暑災變而言於夏時大概可通其不可通者小有疑而未定焉耳隐九年三月癸酉大雨震電庚辰大雨雪記異也震電非異震電而雪所以為異僖十年冬大雨雪書冬不書月且加以大字記是冬寒氣太甚屢雪之為災耳若此以冬為八月九月是時秋氣始肅餘暑未艾安有連五月之雨雪乎又如僖三十三年十二月隕霜不殺草李梅實嚴冬不殺氣燠也若謂此十二月為建亥月則夏時之十月草不盡殺猶或有之春秋何以遽書為異乎竊詳經文十二月乙巳公薨之下書隕霜不殺草李梅實此於嵗終併書一冬之異非專為此月書也杜氏以其長厯而推謂此十二月乃周之十一月今九月也指此為舊史紀錄之誤春秋因之愚謂九月之霜不能殺草猶未足為異春秋何以動色而書之曰隕霜不殺草李梅實乎此夏正之冬何疑乃若書無冰皆在春以冰政不舉而書耳詩七月二之日鑿冰沖沖謂十二月取冰三之日納于凌隂謂正月藏冰四之日其蚤獻羔祭韭謂二月開冰而周禮藏冰開冰與此畧同春秋於桓公十四年春正月咸元年春二月襄二十八年春三月書無冰皆以冰政不舉書譏之耳書螽有在夏秋者為其賊苗而書有在冬者則以陽氣不斂蟄出為災耳哀公十二年冬書螽十三年冬又書螽皆紀異也窮冬沍寒閉蟄已久而螟蝗生焉其為異大矣左氏乃託夫子荅季孫之語歸過於司厯之失閏春秋為記異而書豈為厯乎宣十五年秋螽而冬蝝亦為失閏可乎莊七年秋大水無麥苗𫝊者謂周七月為夏五月故以無麥苗為災非也中原之地種麥冣早故月令仲秋勸種麥令曰無或失時是嵗以大水之故種麥失時或已種而為水所溺故曰無麥苖非謂已熟之麥而莊二十八年冬大無麥禾謂嵗終計公私所儲蓄而言不然麥熟在夏禾熟在秋何以書無麥禾於此際乎此春秋所書寒暑災變合於夏時者也外是亦有一二之疑皆可以義而通要以不害於大體之合皆具述於經本文之下生乎千載之後而尚論千載以前事容有未盡合者質之聖人而無悖考之五經而可證斯可謂之合何必盡求其合然後謂之合乎必欲變易四時錯亂分至以從周正之說則非吾之所敢知也陽氏曰是是非非所易見也事有似是而非者苟不推見至隐未有不以非為是者也何者春秋書春無冰則似冬令書冬殺菽則似秋令此左氏所以敢於改時易月而不怍者也夫春夏秋冬之序則用周正分至啓閉之序則用夏時人皆知其非而不敢非之者以其記聖經也然聖經豈若是哉左氏但託經之似以誣後世爾何以知之左氏用周月紀事公榖於桓公八年烝之𫝊以夏釋經左氏之說非矣程子曰以𫝊考經之事跡以經别𫝊之真偽學者但以天道觀聖經則左氏之說不辨而自詘矣左氏於正月之上加一周字以子月為春是以冬為春也以卯月為夏是以春為夏也以午月為秋是以夏為秋也以酉月為冬是以秋為冬也四時十二月之序皆易位矣稽諸天道則不順揆諸人事則不合遂使春秋一經非奉若天道之書上違先王之典下開萬世之疑皆左氏之罪也請推本而論之堯典一書欽天授時之書也羲和四子分掌四時日中星鳥以殷仲春建卯之月也日永星火以正仲夏建午之月也宵中星虛以殷仲秋建酉之月也日短星昴以正仲冬建子之月也自堯典定時成嵗之後四時十二月之序一定不移虞夏商周皆因之雖百世莫能改也或曰三代既無改時易月之事夫子何以言行夏之時乎曰此以嵗首頒朔言之也舜月正元日詢四岳闢四門禹正月朔旦率百官若帝之初古者國有大朝㑹大政事大號令大因革則於嵗首行之而頒之於諸侯也夏正建寅為人統此以正月為嵗首也商正建丑為地統此以十二月為嵗首也周正建子為天統此以十一月為嵗首也秦正建亥為水位此以十月為嵗首也夏正即今之正月不假言也請以商周秦漢明之伊訓曰惟元祀十有二月乙丑伊尹祠于先王奉嗣王祗見厥祖太甲曰惟三祀十有二月伊尹以冕服奉嗣王歸于亳于元祀三祀之下即繫之以十二月者此商以十二月為嵗首未嘗改十二月為正月七月之詩周公所作也其詩以子月為一之日丑月為二之日寅月為三之日卯月為四之日言日不言月者不改月者也十月蟋蟀入我牀下曰為改嵗入此室處者改嵗首也此周以子月為嵗首即未嘗以一之日為正月也秦文公獲黑龍以為水瑞始皇二十六年初并天下以十月建亥為嵗首吕不韋集諸儒作月令季秋之月合諸侯制百縣為來嵗受朔日秦以孟冬之月為來嵗也司馬公作治鑑於二世元年之下書曰冬十月戊寅大赦于漢髙祖元年之下書曰冬十月沛公至霸上於孝景元年之下書曰冬十月庚戌封琅琊王澤為燕王於孝景元年之下書曰冬十月丞相嘉奏立祖宗廟於孝武元年之下書曰冬十月詔舉賢良方正直言極諌之士而親䇿之於元年之下書冬者時不改也書十月者月不改也此漢因秦正朔以亥月為嵗首即未常以冬為春以十月為正月也至太和元年夏五月行太初厯以正月為嵗首自是於二年三年之下即書正月不復先書十月矣孔子所謂行夏之時此之謂也賈誼所謂改正朔者改此而已非改月也唐武后天授元年十一月朔日南至改用周正以十一月為正月十二月為臘月夏正月為一月亦可以參考矣左氏於僖五年十二月晉滅虢引童謡之言以為鶉火旦中之月於僖十五年十一月韓之戰引卜徒父之占曰嵗云秋矣我落其實而取其材於昭十七年六月日食引太史之言以為日過分而未至是建已正陽之月於昭二十四年五月日食引叔孫昭子之言以為日過分而陽猶不克能無旱乎於昭三十一年十二月日食引史墨之言曰日月在辰尾謂夏之十月日月合朔於蒼龍之尾若此之類皆所以附合其周月之說也然而妄不勝正有不可以智巧為者星孛於冬則不可以為秋九月火已伏河漢已沉雖欲牽合附㑹而不可得也杜預著釋例既成㑹汲郡得冢中竹書就中紀年冣為分了晉莊伯之十一年十一月魯隐公之元年正月也其編年皆用夏正建寅之月為嵗首夫晉魯紀月同異固不可捨詩書而信其說但以寅月為嵗首則固為天王協時月正日諸侯皆禀承正朔安得晉用夏正數月魯獨用周正耶改時易月之說孔孟以前經無明文左氏自倡為之說於是漢魏晉唐諸儒皆宗之孔安國註尚書鄭𤣥註詩禮趙岐註孟子杜預註左傳何休註公羊范寗註榖梁孔穎達述正義捨經信傳踵繆承訛歴千有餘年無有正其非者至河南程子始斷之曰周正月非春也只此一言真足以破千載之惑矣然又曰假天時以立義猶不輕於斥左氏之非胡文定公見冬不可以為春遂發明程子之意謂春秋以夏時冠周月誠如是也則繫年之夏時與紀事之周月常有兩月之差夫天運有常四時不忒豈同一物可假借以為用乎蓋嘗論之一嵗之有春夏秋冬猶一日之有旦晝暮夜也子時一陽生雖屬明日猶是昨日之夜至寅時方謂之旦子月一陽生雖屬來嵗猶是往嵗之冬至寅月方謂之春一日之旦始於寅時一嵗之春始於寅月左氏以子月為春是猶以夜半之子時為旦也是故通乎晝夜之道則知春秋以月繫時以時繫年之義矣隠公三年左氏曰四月鄭祭足帥師取温之麥秋又取成周之禾案月令孟夏之月麥秋至農乃登麥此四月熟麥也案金縢秋大熟未穫天大雷電以風禾盡偃王出郊天乃雨反風禾盡起此禾熟於秋也四月取麥豈非建巳之月乎秋取禾豈非申酉之月乎成十年晉景公疾桑田巫曰不食新矣六月丙午晉侯欲麥使甸人獻麥召桑田巫示而殺之此左氏以周月紀晉事也今言四月取温之麥以夏時紀鄭事是畔其說也而元凱註曰四月為二月秋今之夏也麥禾皆未熟葢芟踐之此其取也而謂之踐失其義矣先儒以元凱為左氏忠臣愚以為佞臣也桓八年春正月己卯烝夏五月丁丑烝烝冬祭也案月令孟冬之月大飲烝案周禮中冬教大閱獻禽享烝書十有二月王在新邑烝祭嵗是冬之三月者可烝祭於先王先公也魯十二公冬烝皆不見於經何也祭而合禮則不書也桓公八年春正月烝公羊曰烝冬祭也何以書譏亟也何休註曰屬十二月已烝今復烝也不異烝祭名而言烝者取冬祭所屬衆多之物榖梁曰烝冬事也春興之志不時也於丁丑烝之傳曰烝冬事也春夏興之黷祀也公羊以春烝為譏亟榖梁以春烝為不時是皆不以冬為春與左傳異矣堯以厯象考日月星辰之度舜以璣衡齊日月五星之政文王興易於中古而定後天八卦之位武王訪範於箕子而叙五紀庶徴之疇仲尼祖述堯舜憲章文武而作春秋所謂考諸三王而不繆建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑者也杜元凱云左丘明受經於仲尼今案左傳終叙韓魏趙共殺智伯事去獲麟已二十七年臘祭始於秦而左氏謂虞不臘矣朱子曰是秦時文字分明噫三傳作而春秋晦然不因三傳之有同異則無以考正聖經令學者得有所據而知春秋為上律天時之書者以有公榖二傳尚可參考耳胡文定公於左傳周正二字反復論辨非不詳明顧乃委曲遷就而有夏時冠周月之說至於此經之𫝊反以榖梁氏之說為非曰春秋非以不時書也為再烝見瀆書也經再書而一貶胡氏此言失祖述憲章之義矣易說卦曰兊正秋也萬物之所說也說卦此一節論文王後天八卦也帝出乎震建卯之月也相見乎離建午之月也說言乎兊建酉之月也勞乎坎建子之月也故文定公曰夫斗建寅然後謂之春斗建巳然後謂之夏兊為正秋則坎為正冬明矣今以冬為春則四時易位矣春秋正名之書豈若是哉胡氏此言非不確而有夏時冠周月之說春狩春烝不時也而謂之時秋嘗時也而謂之不時非經意也書泰誓惟十有三年春孔安國註曰周之孟春一月戊午註曰周正月二十八日案周禮季春出火辰月也季秋内火戌月也案金縢秋大熟朱子曰申酉之月也辰月為季春申酉戌之月為秋則寅月為孟春明矣泰誓之一月武成之一月者寅月也河南遺書曰是時商厯己絶周厯未建故用人正今之正月也註謂戊午是子月二十八日六甲循環寅月二十八日亦戊午也詩豳風七月一章曰一之日觱發二之日栗烈無衣無褐何以卒嵗五章曰十月蟋蟀入我牀下穹窒熏䑕塞向墐戶嗟我婦子曰為改嵗入此室處自古帝王之興有因有革舜禹以揖讓得天下舜之正朔即堯之正朔也夏之正朔即虞之正朔也當因而因也湯武以放伐得天下商之正朔不可因之於夏周之正朔不可因之於殷當革而革也周用天正以子月為嵗首故豳詩於十月改嵗迎新嵗也鄭康成箋云曰為改嵗者嵗終而一之日觱發二之日栗烈當避寒氣而入此穹窒墐戶之室而居之至此而女功止其說是也然而日中宵中日永日短天道則不改也作訛成易析因夷隩民事則不變也堯典以平在朔易為嵗終虞夏商周皆因之故首章卒嵗在觱發栗烈之後于耜舉趾之前也十月改嵗者周一代之典也十二月卒嵗者萬世通行之法也周雖以子月為嵗首而四時十二月之序則元用夏時也故知周公豳詩之㫖則知孔子春秋之義矣小雅曰十月之交朔日辛卯日有食之亦孔之醜案災異譴告之來在他月猶輕惟正陽之月其災尤重正月四月也陽月十月也詩曰正月繁霜我心憂傷此純乾之月霜降為災十月之交日有食之此純坤之月太陽薄食者非小變也朱子以十月為建亥之月是也鄭康成解經如四月六月七月諸詩皆用夏時獨此詩箋曰十月夏八月周頌臣工之詩嗟嗟保介維莫之春箋曰周之季春夏之孟春也引月令天子親載耒耜之事以證之愚常考之月令所言乃孟春祈榖之後天子躬耕帝籍之事也周頌所言乃諸侯來助祭於其歸也歌臣工之詩以遣之因命其車右之介士曰春已莫矣歸當問田之新畬今如之何此省耕勸農之事也夫至當歸一精義無二鄭氏以十月為酉月以莫春為寅月與七月諸詩箋註不同自為矛盾矣周禮大胥春入學舎菜合舞秋頒樂合聲媒氏掌萬民之判中春之月令㑹男女籥章掌土鼓豳籥中春晝擊土鼓龡豳詩以逆暑中秋夜迎寒亦如之大司馬仲春教振旅遂以蒐田中夏教茇舎遂以苗田中秋教治兵遂以獮田仲冬教大閱遂以狩田案中春卯月也中秋酉月也此夏時也康成註經前後互異天官正月之吉始和註曰周之正月小宰正嵗帥治官之屬而觀治象註曰夏之正月地官正月之吉始和正嵗令于教官註說亦同一嵗之首是有兩正月也凌人之職曰正嵗十有二月令斬氷註曰夏之季冬籥章國祭蜡則龡豳頌以息老物註引伊耆氏嵗十二月合聚萬物而索饗之十二月乃建亥之月豳風十月穫稻稱觥介夀歌其數也一嵗之中是有兩十二月也愚嘗考而得之與鄭說異周不改月經凡言月皆夏月也周改嵗首經凡言嵗皆周嵗也正月者月之始也夏正建寅之月也吉朔日也始和者氣候初温和也三陽為泰和可知也若建子之月則天地閉藏冰凍地拆謂之始和可乎正嵗者嵗之始也周以子月為嵗首夏之十一月也凌人之職正嵗十二月令斬冰言正嵗在十二月之前者以十一月為嵗首也下文春治鑑夏頒冰秋刷不言冬者正嵗即仲冬也斬冰即季冬也周不改時於此可見内宰之職正嵗均其稍食上春詔王后生穜稑之種而獻之於王一嵗之始曰正嵗春月之孟曰上春言正嵗在上春之前者正嵗非夏之正月於此可見鄉大夫之職正月之吉受教法於司徒寅月也嵗終則㑹政致事亥月也正嵗考法於司徒子月也正月之吉讀法以考其德行道藝寅月也嵗終則㑹其州之政令亥月也正嵗則讀教法如初子月也經文前後次序昭然可考或曰正嵗者周正一嵗之首經文如黨正嵗大夫等職言正嵗皆在嵗終之下何也曰周官一書皆用夏時紀事雖改嵗首而四時十二月之序則未甞改也所以先言嵗終而後言正嵗也正月之吉始和經於太宰大司徒大司馬大司冦皆言之獨於大宗伯闕焉葢其職乃春官故不假言正月也鄭氏以正月為周正月以正嵗為夏正月其說誤矣禮記明堂位曰成王以周公為有勲勞於天下是以封周公於曲阜地方七百里革車千乗命魯公世世祀周公以天子之禮樂是以魯君孟春乗大路載弧韣旂十有二旒日月之章祀帝於郊配以后稷天子之禮也鄭康成註曰孟春建子之月魯之始郊日以至孔穎達正義曰郊特牲云周之始郊日以至今鄭𤣥破周為魯故云魯郊日以至孟春夏正建寅之月也案家語郊周篇定公問於孔子曰寡人問郊而莫同何也孔子對曰郊之祭也迎長日之至也故周之始郊其月以日至其日用上辛此天子之禮也魯無冬至大郊之事是以不同也迎長日之至者周以冬至迎長之月上辛郊天也大司樂云冬日至禮天神於地上之圜丘是也程子曰冬至氣之始也萬物本乎天人本乎祖故周以建子之月郊祀后稷以配天也魯無冬至大郊之事魯諸侯也降殺以别於天子故以孟春建寅之月上辛日郊天與天子不同也案宣公三年成公七年定公十五年哀公元年皆以春正月卜郊而不從者也成公十七年九月用郊定公十五年五月郊哀公元年四月郊魯之郊祀非禮也失禮之中又失禮焉聖人雖因其失而書之然魯不以子月郊於此可見矣哀公十三年子服景伯在呉謂太宰嚭曰魯將以十月上辛有事于上帝先王季辛而畢何世有職焉自襄以來未之改也亦以見魯郊非子月也鄭氏以下闕文以上原闕二十行可言臘也亦猶冬至祭天曰郊孟春祈榖亦曰郊也四月而祭曰雩秋月水旱有意而祭亦曰雩也案通典王者各以五行之墓日為臘如漢火德火墓在戌故臘用戌冬至後第三戌日是也雜記孟獻子曰正月日至可以有事於上帝七月日至可以有事於祖七月而禘獻子為之也孔頴達正義曰正月周正月建子之月也日至冬至日也七月周七月建午之月也日至夏至日也案正月者夏正建寅之月也七月者夏正建申之月也曰日至何也孟子曰麰麥播種而耰之其地同至於日至之時皆熟也以此知日至之義不可専以冬至夏至釋之也案襄公七年夏四月卜郊不從孟獻子曰吾今而後知有卜筮郊以祈農事也是故啓蟄而郊郊而後耕今既耕而卜郊宜其不從也左氏與雜記所載皆獻子之言也魯無冬至大郊之事郊用啓蟄之月則魯君孟春祀帝於郊是乃建寅之月也正月日至非冬至明矣然則何以謂之日至曲禮曰凡卜筮日旬之外曰逺某日旬之内曰近某日古者祭必卜日卜而不從則不郊卜上辛不吉則改卜中辛季辛此曰日至謂辛日也卜之吉日至也郊特牲曰郊之用辛也周之始郊日以至言周郊用辛日至也鄭氏初註之說是也正月日至可以有事於上帝七月日至可以有事於祖郊與禘對孟春建寅之月可以郊則孟秋建申之月可以禘皆以辛日至行事也此獻子議禮之意也論語曾㸃曰暮春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸何晏集解曰暮春三月季春也案魯秉周正朔暮春建辰之月豳風春日載陽蠶月條桑之時也曽㸃舎瑟之對今味其辭意則四時寒燠之代序與裘葛衣服之異宜有與時偕行自樂其樂之妙朱子曰單袷之衣衣無絮謂之袷浴盥濯也今上已祓除是也案漢儀禮志三月上已禊浴于東流水上古人以三月初已為上已自魏以來但用三月三日王羲之之㑹于㑹稽山隂脩禊事也沂水在魯城南當是時也風和日暖景明物熙童冠詠歸與天地生物同一春意若以為寅月則沂水之凍方觧雩壇之風尚寒浴沂詠歸非其時也孟子曰七八月之間旱則苗槁矣趙岐註曰周七八月夏五六月也案豳詩五榖之中惟禾稻晚熟十月納禾稼十月穫稻是也七八月旱與七八月之間雨集溝澮皆盈皆申酉之月也秋旱則苗槁指禾稻而言也以春秋考之魯大旱二一書於夏巳午未之月也一書於秋申酉戌之月也大雩皆在秋之三月冬居一焉齊梁鄒魯之間地氣之冷暖穡事之早晚當無有不同者觀魯以秋月雩則七八月旱豈非申酉之月乎此有年大有年所以皆書於冬也子産聼鄭國之政以其乗輿濟人於溱洧孟子曰惠而不知為政嵗十一月徒杠成十二月輿梁成民未病渉也焉得人人而濟之趙岐註曰周十一月夏九月周十二月夏十月案涪陵㬊淵字亞夫朱文公之髙弟恪之先君子存齊執經從㬊氏學問曰文公荅門人不觧春秋之問謂周正月三字便說不行今孟子杠梁成註乃引用夏令九月成杠十月成梁以為證何也亞夫先生曰左氏國語與左氏春秋同出一手淳熙四年朱子年四十八孟子集註成周改嵗首而不改月則晩年之確論也嘗欲改註孟子而其書已行於世矣以時令考之戌亥之月寒未至於酷烈猶可以褰裳渉也子丑之月冰壯水凍斯寒極矣當此之時而以乗輿濟人則民必有病渉者矣橋梁道路可以觀政九月成杠十月成梁戒事之辭也十一月徒杠成十二月輿梁成遂事之辭也國語先事戒備之意孟子就凍極之時言之皆夏時之節令也趙邠卿生於漢末去春秋戰國已逺彼豈真知周之改月與不改月哉但為左氏所誤耳漢武帝詔太子受公羊春秋宣帝喜榖梁由是二𫝊皆置博士哀帝時劉歆奏左氏春秋可立博士上問諸儒皆不對大司空師丹劾之歆等皆補郡去當時左氏之學未信也自趙岐鄭𤣥諸儒踵孔安國之誤取其說以註經市虎之訛三人言之而遂信矣於是何休范寗杜預孔穎達之徒更倡而和不復改正如程子之明達胡氏之博洽雖深致其疑終以遷就其說此參母所以投杼也屈原離騒曰攝提貞于孟陬兮惟庚寅吾以降案楚武王子瑕食采於屈因以為氏屈原其後也仕於懐王為三閭大夫案經楚自屈完受盟以來終春秋之世中國之盟㑹皆與焉盟㑹必書時書月書日楚之正朔即周之正朔也孟子與張儀同時秦使張儀譎詐楚懐王令絶齊交請與俱㑹武關屈原諫不聼是屈原與孟子同時也離騷經曰攝提貞于孟陬案漢天文志北斗七星杓攜龍角衡殷南斗魁枕參首用昏建者杓夜半建者衡平旦建者魁如孟春昏時杓建寅夜半衡建寅平旦魁建寅也攝提星名在龍角之兩旁各有三星鼎足鈞之直斗柄所指以建十二辰者也真正也孟始也謂孟春也陬隅也寅月曰陬葢是月孟春昏時龍角攝提星見在東北隅隨斗柄指寅故以為名也屈原以寅月為孟月則孟子所謂七八月是乃攝提隨斗杓正指申酉之月所謂十一月十二月是乃攝提隨斗柄正指子丑之月鄒魯與楚同正朔故也邠卿註孟子附㑹左氏之誤與楚辭之節序不合矣宋玉九辨曰悲哉秋之為氣也蕭瑟兮草木揺落而變衰泬寥兮天髙而氣清寂寥兮收潦而水清秋既先戒以白露兮冬又申之以嚴霜案宋玉楚大夫屈原弟子也蕭瑟者寒凉之意四時隂陽之運盛極則衰草木揺落者一葉落而天下知秋也天髙氣清無垢穢也収潦水清夏漲秋落隂至而清也白露八月節酉月也四序平分玉何獨悲秋也暑往則寒來隂進則陽退當是時秦强楚弱玉知天下之勢必入於秦此其所以悲也然而二周尚存七國未滅周之正朔未改也以白露建酉之月為秋則子月大雪節非春亦明矣宋玉之言所謂鍼左氏鄭𤣥之膏肓者也董仲舒曰臣謹案春秋之文求王道之端得之於正正次王王次春春者天之所為也正者王之所為也其意曰上承天之所為而下以正王道之端耳案漢史武帝建元元年冬十月詔舉賢良直言極諌之士而親䇿之當是時秦之正朔未改也仲舒治公羊春秋明於天人之際故三䇿始終専以春秋為對其言曰春者天之所為也仲舒之意葢欲武帝改秦正朔行夏之時以正王道之端也武帝聼納其說太初元年行太初厯以建寅之月為嵗首於是行之世世不可改易此仲舒之學得之於春秋而大有功於世教也竊嘗因仲舒之言而推之王者常以正時為務奉天道以正人時常以治厯為要古者造厯之法周天三百六十五度四分度之一日一晝夜行一度故必三百六十五日四分日之一乃合周天之度堯典言六日者舉成數也此氣盈也一年十二月有小盡六日此朔虛也總氣盈朔虛之餘日計之一年餘十日有竒積之三年則置一閏及五年則置再閏兩閏之間大約相去三十有二月或嬴縮不齊雖不中不逺矣十九年七閏為一章春秋二百四十二年計有八十九閏失一閏則差一月以正為二矣失三閏則差三月以春為夏矣子曰吾猶及史之闕文也左氏因此遂謂聖人作經皆沿舊史之誤而不革於文元年以為誤置閏於襄二十七年以為再失閏於昭二十年以為失一閏於哀十二年以為失一閏信斯言也則春秋之時厯紀廢壞可謂極矣聖人作經安得為上律天時之書乎案經以事繫日是日不誤也以日繫月是月不誤也以月繫時是時不誤也書日食三十六朔不誤也書晦者二月之大小盡不誤也書閏者二三嵗五嵗之閏不誤也書星孛于大辰二十八宿之度十二辰之次不誤也一經聖人筆削之手二百四十二年之厯皆正矣紀嵗星之行度則以春為首紀月之弦望則以寅為正董子所謂天地之常經古今之通誼正謂是也杜預生在西晉自謂能長厯推筭春秋時厯夫天度有推移厯法有踈密積之毫釐未有久而不差者漢興以張蒼言用顓頊厯至武帝時未及百年日月晦朔弦望盈虧多非是此厯與天相失也當時博學如司馬遷兒寛治厯如公孫卿壺遂等皆謂不能為筭夫以當時之厯而推筭當時之氣候猶且不合况千載之逺乎洛下閎太初厯成日月如合璧五星如連珠可謂密矣洛下閎曰後八百年當差一日章帝元和二年太初厯後又作四分厯自太初至元和一百七十餘年厯已差矣唐開元九年麟德厯寖踈日食屢不效上命僧一行造開元年大衍厯近世眉山程公說作春秋分記其言曰元凱長厯改易閏餘以求合左傳故閏月相距近則十餘月逺或七十餘月誤可知也諸厯惟大衍冣密故今専以其法推筭春秋時厯閏法多差日食三十六而朔差者半此非春秋之誤乃周厯之誤愚謂程公說譏元凱三統厯法之誤是也至其用大衍厯法之誤則不自知也蓋劉歆三統厯法止可用之於漢一行大衍厯法止可用之於唐一日二日之積歴嵗既久未有不與天度相失者觀武帝時顓頊厯章帝時太初厯開元時麟德厯則知之矣請以日景之長短地理之逺近譬之夏至日立八尺之表於潁川陽城其景尺有五寸謂之地中北移於蔚州則晷景愈長南移之朗州則晷景愈短又南至交州則晷出表南三寸餘其差逺矣夫自今日以前已往者千嵗也自今日以後未來者亦千嵗也厯法之差亦猶是也元凱以經為誤而自以長厯為信是以陽城之日晷而準交州之日景也豈不謬哉愚案五家之說如此又即左氏觀之如桓十七年冬城向昭九年冬築郎囿皆曰書時也亦以夏之冬而言也使以周正言之則於時為秋安得書時哉昭十七年六月鄅人籍稻亦以夏之六月言也使以周正言之六月為四月安得稻哉莊十六年公父定叔出奔衞三年而復使以十月入曰良月就盈數也以十月為良月盈數則亦夏之十月也愚故斷然以春秋正月為建寅之月也或曰然則經書春無冰十月隕霜殺菽左氏書日南至者何也曰經之所書愚於本義或問既言之矣若左氏書日南至亦自矛盾僖五年春正月書日南至若依左氏為建子則昭二十年春二月𫝊亦書日南至將復以周為丑乎此左氏所以不足據也曰春秋日食三十六厯家以周正推之多所合以夏正推之多所不合其說又何也曰春秋距今幾二千嵗嵗運漸差焉得而合杜氏以長厯推春秋甲子有所不通妄曰經誤今厯家推驗精者不過二十六然以周厯考之朔日失二十五以魯厯考之又失十三唐一行得二十七而朔差者半唯宋衞朴謂得三十五獨莊十八年三月不入食法衞朴之言有不可信者蓋以厯法一百七十三日有餘一交㑹自隠元年至哀二十七年凡三千一百五十四月惟三十六食而襄二十一年九月十月二十四年七月八月頻交頻食是有雖交而不食有不當交而食者矣又豈可以常法推而謂之入食限乎近世善推厯者以今之授時厯細推春秋日食其日月合朔者十有七莊二十六年十二月癸亥朔僖五年九月戊申朔文十五年六月辛丑朔宣十四年四月丙辰朔闕朔字成十六年六月丙寅朔襄十四年二月乙未朔二十年十月丙辰朔二十一年九月庚戌朔二十三年二月癸酉朔闕朔字二十四年七月甲子朔昭七年四月甲辰朔二十一年七月壬午朔二十二年十二月癸酉朔二十四年五月乙未朔三十一年十二月辛亥朔定五年三月辛亥朔十五年八月庚辰朔是也以周正推之其差一月者十有二差二月者二差三月者二隠三年二月己巳當為三月己巳朔闕朔字桓三年九月壬辰朔當為八月壬辰朔十七年十月朔當為十一月庚子朔闕庚子字莊二十五年六月辛未朔當為七月辛未朔三十年九月庚午朔當為十月庚午朔僖十五年五月當為四月癸丑朔闕癸丑朔字文元年二月癸亥當為三月癸亥朔闕朔字成十七年十二月丁巳朔當為周正十一月丁巳朔襄十五年八月丁巳當為七月丁巳朔闕朔字二十七年十二月乙亥朔當為十一月乙亥朔昭十五年六月丁巳朔當為五月丁巳朔定十二年十一月丙寅朔當為十月丙寅朔是差一月者也莊十八年三月當為五月壬子朔闕壬子朔字僖十二年三月庚午當為五月庚午朔闕朔字是差二月者也宣八年七月甲子當為十月甲子朔闕朔字襄十七年六月甲戌朔當為九月甲戌朔是差三月者也古今厯法不同嵗運亦異雖未可盡據然豈可謂春秋日食多與周正合哉曰隠公不書即位子謂未詳其所以不舉之故者何也曰三𫝊攝讓之說未可信也左氏曰不書即位攝也公羊曰何以不言即位成公意也公將平國而讓之桓桓㓜諸大夫扳隠而立之故凡隠之立為桓立也榖梁曰何以不言即位成公志也焉成之將以讓桓也夫攝者身不為君而行君之事讓者身已為君而推讓與人今三𫝊自相矛盾而歐陽氏辨其非攝非讓見於三𫝊辨疑者又如此故未有以灼知其何為而不舉也惟戴氏以經之所無而不言蓋亦闕疑之意竊又疑商之大事在十二月則周天子諸侯即位亦當在十一月豈桓宣以下諸公不用周正不請天王而春秋書其即位隠公之初猶奉周正守正法在十一月即位春秋以為常事而不書歟然不可考矣曰天王使宰咺來歸惠公仲子之賵天王之天先儒以為孔子所加子獨以為魯史之舊亦有說乎曰吾聞諸邦子曰春秋因魯史有可損而不能益也周禮司服凡喪為天王斬衰則天王之稱其來舊矣諸侯國史稱天王無足怪者况春秋大義固不在加天於王上然後為尊王也凡其所以譏諸侯大夫之僣者皆尊王之意也愚故斷然以為非孔子所加也曰張氏諸儒以宰為大宰夫子責其奉命賵妾特貶家宰於上士中士之例而又名之以深其罪子獨何以知其不然耶曰此正一字褒貶賊經之弊惡得雷同而許之也况先儒亦有不同其說者乎吕朴鄉有言曰春秋周大夫不名爵從其爵單伯劉子之類是也未爵稱字家父榮叔之類是也舍是無名道矣是故經書宰有三元年天王使宰咺來歸惠公仲子之賵書名而不書氏者士也桓四年天王使宰渠伯糾來聘書氏及字者命大夫也僖三十年天王使宰周公來聘書官而不名氏者三公也始使士繼使大夫終使三公天子日微諸侯日强矣此其指不亦甚明白哉夫以天王之尊而下賵諸侯之妾母何必名其使而後知其非哉曰左氏公羊以惠公仲子為二人子於三𫝊辨之而知其說矣而程子陳氏諸儒以為惠公之妾劉原父諸儒則以為孝公之妾子兩存之何也曰以左氏考之為惠公之妾以經書僖公成風之法求之則又疑其為孝公之妾以理言之前說近似然其大義則俱為賵諸侯之妾亦不在深究也曰及宋人盟于宿舊說以為公及之孔子為内諱故不言公然乎曰不然也吾聞諸朱子曰直書其事而善惡自見者春秋之大法也且後書公及大夫盟者不可勝數何獨於此諱之曰公子益師卒先儒皆謂凡書大夫卒者大夫佐君治國故録其卒以示君臣之恩子何以知其不然耶曰此意施之國史可也春秋所書者皆非常之事也曰死生人道大變非非常而何曰有生則有死死亦常事也且所謂非常者謂非禮也非義也苟以死為非常亦可以死為非禮非義乎此論似是而實非不可不辨二年或問曰隠二年至十一年無正月諸說不一子何以知其為事無月日故總以春目之也曰此以理推之而知其然也諸說不一原於公榖公羊謂隠無正月為隠將讓桓故不有其正月說既鑿矣至榖梁謂隠十年無正為隠不自正元年有正所以正隠又鑿之尤者矣春秋者聖人之實錄也實錄其事其善惡自有不可掩者若去一字以示貶吾恐聖人公平正大之心不若是之瑣瑣也五經垂教無非實事詩書禮以記常易以通辨春秋以見用獨易若有異辭然不過取象以眀理指顯以通微究其歸未甞不實也春秋非取象之書而無正之云又非取象之比安得捕風捉影為說以惑世哉今㑹戎于潛使有日月將實書之或無日月不可妄加也使於二年春之下而書首月人將指㑹戎為正月之事不書正月所以𫝊信也三年二月己巳日有食之則書日食之月四年二月莒人伐把則書伐杞之月五年公觀魚于棠舊史無月日則又不得書首月以至十年之間偶無繫正月之事又偶有闕月日之文故終隠公不得書正月也聖人微意初不在此而讀者有不察焉耳公榖倡於前諸儒演於後紛紛籍籍尋小義遺大㫖卒使聖人之心淪於空虛悲夫曰㑹戎之事戴氏黄氏皆謂周衰夷狄雜居中夏魯有疆埸之交不得不㑹說者譏公不當與戎㑹是責人於難其說然乎曰此姑息之論也春秋正誼不謀利明道不計功若許其㑹戎則春秋不書矣曰莒人入向程子謂春秋書其事而被侵伐者亦不免焉夫不責伐人而責受伐無乃言之倒耶曰此亦一義也夫擅興兵以伐人之國罪不勝誅矣然受伐者不自引咎辨諭以義不告天子方伯又不量彼己之勢一戰而敗辱滅社稷塗炭生靈惡得無罪哉雖然當時事勢豈可盡知亦有强凌弱衆暴寡諭義不入封疆莫固兵力不支天子方伯不可告者又不可執一而論也曰親逆之說子獨取程子張氏之說何也曰諸侯親迎於禮無所考可旁證者唯詩中之辭哀公之問耳公榖與韓侯迎止于蹶之里合而太山莘老抑崇康侯獻可諸家從之程子與文王親迎于渭及哀公問大昬既至冕而親迎之說合而常山少藴元德諸家從之以履緰非命卿而逆女亦可為非常則程子之說得之但程子云書逆書歸明重事來逆非卿則書歸見禮之薄等語為未安耳曰少藴謂逆與迎不同何也曰案釋文逆則迎也關東曰逆關西曰迎而禮有親迎之文不聞别有迎女之禮少藴之說於禮無考未敢信其必然也然其他與程子大畧相同取程子則少藴在其中矣曰元德諸家又謂春秋於婚姻事與卒𦵏同皆書於䇿蓋送終與謹始一者何也曰如其說則常事爾常事則國史所錄非春秋大法愚於元年公子益師卒既辨之矣不暇再述也曰常山又謂韓侯迎止于蹶之里為蹶父為王卿士韓侯因朝覲至周而迎者信乎曰億辭也且因朝周而迎是遂事也遂事則韓侯為有罪是以知其不通也曰伯姬歸于紀先儒以為送之者雖公子公孫非卿故不書者何也曰此非春秋本義也曰先儒又謂内女嫁為諸侯夫人則書逆書歸明重事者何也曰春秋因重事以見非禮若止明重事則常事不書也故啖氏曰凡外逆女皆以非禮書得之矣曰原父亦以内女嫁於諸侯則尊同尊同則志者何也曰此亦前說之意也原父甞自曰春秋不書常事豈獨昧此乎曰莘老謂内女歸為諸侯夫人則書歸重之也其尊敵公公為之服故也何也曰内女嫁與諸侯其尊敵公固有服也而此非為有服書也若以有服而書則十二公之女豈止書六人而六人之中又有詳畧之殊此各有義不可以一概論也曰紀子伯為闕文明矣先儒以為凡闕文有本據舊史因之而不能益者亦有先儒傳授承誤而不敢正者然乎曰如日月之類孔子不得益之四時之類孔子安得不正之若紀子伯之誤孔子所必正之者也正之不得則不書安有如此之誤而可為後世鑒者乎此必孔子筆削以後之闕文如所謂先儒傳授承誤而不敢増者也其曰有本據舊史因之而不能益者則有可否焉曰存耕謂紀讎於齊者也莒憾於魯者也紀方昬魯以觧齊之讎故因為魯以平莒之憾紀方困於齊而莒實附於齊是盟之講非惟以結魯之歡且以解齊莒之交也其說如何曰予生千載之下可知者理耳不可詳者事也理則據經可見事則有可考有不可考者存耕之說新矣無所考也况春秋本義正不在此凡此者皆所不録亦不暇一一辨也曰夫人子氏薨先儒之說多矣子於本義獨曰未詳何也曰先儒之說大畧皆云小君與君同體故薨則志之以明齊也以常法論之實為有理以春秋不書常事言之則未為至當春秋書公即位尚欲見其不請於天王不授於先君書公薨尚欲見其正寢與非所被弑與私諡而謂夫人薨而皆無所為吾不信也寜當闕疑以俟知者不敢妄有所錄以昧聖人之所指也曰原父謂不書𦵏為不以夫人𦵏葢公欲不終為君亦不以子氏為夫人者何也曰此亦公榖之餘論也但公羊以為母而榖梁原父以為妻耳豈有隠公稱公而不為公子氏稱夫人而不為夫人者乎又豈有死稱夫人而𦵏不以夫人者乎隠公非攝歐陽氏辨之明矣觀歐陽氏之論則知夫人之為夫人而其不書𦵏非此之謂矣曰鄭人伐衛左氏所傳何以有疑也曰衛人伐鄭鄭人以王師虢師伐衛經當書之今經不書不敢盡信也三年或問曰己巳日食言日不言朔榖梁杜氏孫氏諸儒不一其說子獨以為食在朔後與史失之者何也曰凡月食必在望日食必在朔以日月同度同道是以相掩相亢而日月為之食其或月食在望後日食在朔前後者以月有大小盡或運行錯度厯家錯亂春秋皆據實書之其間亦有史失之而不得其詳者此必然之事非他說所能惑也然其本義則紀天變為君臣大戒而晦朔殆其餘事何必强為說以求異於人哉曰吾聞君子不索隠而知其所可知朱子所取厯法言脩德用賢則陽盛隂衰而月常避日當食而不食者何也曰孔子曰古之治天下必聖人聖人有國則日月不食星辰不孛慈湖楊氏曰堯舜禹之時歴年多無日食至太康失邦始日食其所以扶陽抑隂之道至矣以數言則日食有常數以道言則日食為可免君臣之間惡可委之天數而不自訟哉以此言之則朱子所取厯法非索隠葢亦有所見也曰京房氏云日者陽之宗人君之象也驕溢専明為隂所侵則有日食之災不救必有簒臣之萌君懐謙虛下賢受諫任德日食之災為消其說美矣子不之取何也曰驕溢専明為隂所侵則有日食之災不救必有簒臣之萌等語似指一事以當之其語意未圓故不敢取若其上下文則格言也曰朱子蔡氏不同何也曰朱子取厯家之說蔡氏用儒家之説儒家用退度厯家用進度及其至之一也然以理折之儒家是也曰天王崩諸儒皆謂平惠定靈志崩不志𦵏者赴告雖及魯不㑹也桓襄匡簡景志崩志𦵏者赴告及魯徃之㑹也莊僖頃崩𦵏皆不志者王室不告魯亦不㑹也似有理矣子不之取何也曰春秋書實事以見義者多以不書見義者少書天王崩於前書諸侯非禮之事於後所謂書實事以見義者也若以不書𦵏為魯不㑹𦵏是以不書之事見義者也况桓襄匡簡景五王書𦵏者各有其故如本義葉氏之說安知不書𦵏者不為無故也哉曰黄氏以平王不報父讎而戌申以報私恩周之所以不復西存耕以平王享國之乆岐豐之地一舉而棄之秦遂得以瞰三川而窺周室周之衰平王為之故此志崩為天下悼之者何也曰平王不報父讎與失岐豐之地過矣然義不在於志崩且春秋十三王志崩者九平王以下八王者將何為說耶曰尹氏卒陸氏以為臣無外交之禮今死而赴故書以譏然乎曰此或一小義耳大義則不爾也曰趙氏謂未甞同盟㑹不知其名者信乎曰尹氏王室世卿握天子之權者諸侯必待同盟㑹然後知其名乎此非大義所關亦不必深究也曰宋公和卒先儒之說多矣子皆違之無乃矯之過耶曰先儒雖多異辭大畧謂吉凶慶弔講好脩睦鄰國常禮諸侯來告而書與重一國之變著易代而書與王者懐諸侯之義而書竊謂其論可施之國史而不可施之春秋春秋不書常事先儒固己言之何復於此自相戾耶曰先儒謂死生人之大變非非常乎曰所謂非常者非此之謂也為此言者是知春秋之書非常而不知所謂非常者為非禮義也愚於益師卒既言之而凡書天王崩亦可以類推矣曰齊鄭盟石門君舉謂夫子作春秋於隠桓莊之間惟鄭多特筆焉於襄昭定之際惟齊多特筆焉然乎曰不然也孔子脩春秋其文則史史有其事孔子能書之史無其事孔子不能加也然書其事必有其義苟無其義史雖有其事孔子不書也義者何非常也非常者何非禮也非義也隠桓莊之間惟鄭多故故書鄭之事也詳襄昭定之際惟齊多故故書齊之事也亦詳夫孔子亦何心哉如鑒之照物妍媸小大因物賦形而已矣其曰惟齊鄭多特筆豈知孔子脩春秋之意哉四年或問曰公及宋公遇于清孫劉葉氏皆以魯宋適相遇為說子獨從趙氏杜氏簡禮而㑹之言亦有㫖乎曰孫劉葉氏之説公羊之餘意也如公與宋公果不期而適相遇必有所往之處而適邂逅於中途今經傳不載其所往之處而但書遇吾是以知遇者相期簡禮以相見也使魯宋有所往而適相遇此亦人之所不能闕者若孔子之遇陽貨孟子之遇宋牼經亦何必書之夫不責魯宋故為之事而但責魯宋之適相遇則春秋迂矣吾故斷然謂三子之說非也曰許氏以隠莊之間凡六書遇為去古未逺自閔而後有㑹無遇為忠益不足而文有餘其說又何謂也曰春秋無褒又不書常事如許氏之云則是春秋許其遇也且古者諸侯朝天子而亦有遇今不朝天子而亦有遇吾不知春秋之許其遇者果何義耶失之逺矣曰衛人立晉先儒謂雖先君子孫不由天子先君之命不可立其論正矣而不錄何也曰先儒之言施之常經誠為正論施之衛晉疑其有體而無用也何則衛莊既死衛桓被弑衛安有先君可受命乎不有先君受命衛可遂無君乎故謂之不由天子可謂之不由先君不可曰葉氏曰桓公無嫡無長衛人立晉而不得立則衛安得有君此春秋所以與晉其說奈何曰此雖有先君之命必有天子之命而後可先儒知有天子可受命而不知無先君之受命葉氏知無先君之受命而不知有天子之可受命故有與晉之論先儒之說不過少疵葉氏之說則害大義况春秋無褒又不書常事若晉在所當立而不必命於天子則春秋不書矣今書之必有其故吾是以知葉氏之論過也曰或謂晉後日淫亂故不與其立者何也曰榖梁曰春秋與正而不與賢苟晉當立則立之安得預知其淫亂而不與其立乎五年或問曰公觀魚于棠左氏作矢公榖作觀子兩存之何也曰義各可通而無從考其真偽也然觀比矢為易故置之本義以非大義所關故不復有所辨論大義則在魯隠棄國政而逺事耳目之娛而已曰葉氏齊氏之說何如曰葉氏從左氏而訓矢為射齊氏亦從左氏而訓矢為陳訓矢為陳者泥左氏陳魚而觀之之文朱氏固已辨左氏之妄矣訓矢為射者因左氏則公不射之語又與朱子之意合則固可取矣然左氏臧僖伯公不射之云本為鳥獸之肉不登於爼皮革齒牙骨角毛羽不登於器而發非専為矢魚立論則訓矢為射者亦不得滯於左氏之一語矣愚故曰矢不若觀之為易也曰翼之之說何如曰翼之之說即泰山之說而見於本義之後餘意之間矣然其曰雖朝覲之時亦必須省耕省歛之云恐害無遂事之義而不近人情也曰邦衡之言何如曰其曰先言觀魚而後言于棠者主為觀魚也先言如齊而後言觀社者主為女往以觀社為辭耳愚恐求之過深而支離繁冗反晦經㫖也曰康侯之說是矣而不錄何也曰康侯之說前同程子中同孫氏後同張氏既錄程孫之說不敢復取也大凡兩說相同從其前前說畧後說詳從其後今程子孫氏出乎康侯之前是以取彼而遺此耳曰衛師入郕左氏謂郕人侵衛故衛師入郕子何以有疑也曰郕人侵衛不經見吾是以未敢信也曰考仲子之宫初獻六羽劉氏諸儒謂魯隠以前未嘗無六佾於羣公之廟孫氏程子諸儒則以為羣廟己用八佾之舞二說不同何也曰兩無所考然劉氏謂自四升而為六孫氏程子謂自八降而為六以經文初獻之意味之劉氏近是曰杜氏說近本義而不取何也曰杜氏云惠公欲以仲子為夫人隠成父之志疑其億度而為辭也曰邾鄭伐宋左氏所載何以不可信也曰宋人取邾田左氏能載之魯史必有其事矣魯史有其事而經不書則是隠宋也何則宋首惡邾復讎雖非義戰猶為彼善於此聖人乃舍宋而責邾吾是以有疑也四年宋兩伐鄭安知非鄭復讎而使邾主兵也哉其曰以王師㑹之尤其可疑者也六年或問曰鄭人輸平諸家皆謂鄭來絶交何也曰惑於三傳之過也黄杜二氏已辨三傳之誤知三傳之誤則知諸家之誤矣曰原父木納以輸平為致祊田者何也曰祊田在兩年之後又不明見於經傳是意之也黄氏嘗辨之矣曰邦衡以輸為委送財幣何也曰經於歸祊取鼎類皆直書若輸財幣亦當直書況輸之下有平字其為納平明矣不煩多為辭也曰存耕之說何如曰存耕之說康侯之餘論也七年或問曰書叔姬之歸紀莘老諸儒以為賢之子獨不然何耶曰賢叔姬者公榖之餘論也辨見於後曰滕侯卒而不名劉氏之說何如曰其曰赴以名禮也不赴以名非禮也之云與其所以辨左氏之謬者意頗相戾豈明於權衡而不明於傳也曰蘇氏之說何如曰其曰未通也亦左氏之意曰齊侯使其弟來聘常山之說何如曰其論鄰國朝聘不如張氏之當其論無禮義惟强弱之視可施之他事而非此章之指也曰劉氏之說何如曰其謂齊侯愛其弟未可爵而爵之亟交於諸侯蓋意之之辭於經未見爵之之意如已爵之經當書公子年來聘矣曰葉氏之說何如曰葉氏母弟之論非程子本意而其說與趙氏同既錄趙氏則葉氏不復出矣曰公伐邾先儒之說何如曰皆不免信左氏之病也曰戎伐凡伯于楚丘以歸本義何以無責衞之辭曰張氏以為非衛之楚丘不得而責衞也曰先儒謂言以歸為非執何耶曰伐之人衆於執伐之義重於執上言伐矣則執在其中而不必言執矣文法固當如此耳其實非執之則何得以歸乎苟必欲見執之一字而書曰戎伐凡伯于楚丘執之以歸則支離繁冗而非春秋謹嚴之謂矣况本義不在執之一字乎八年或問曰宋衛遇于垂劉氏之說何如曰接乎我之言起於以垂為吾近邑也非本義所係曰任民諸儒之說何如曰亦不免信左氏之病也曰鄭來歸祊先儒皆謂易許田子獨不然何耶曰謂易許田者惑於左氏之說也葉氏劉氏辨之詳矣非獨劉葉也邦衡木訥抑崇浚南亦以祊與許田為二事且萬世之取信者經而已矣隠八年經曰鄭伯使宛來歸祊庚寅我入祊意自明白而鄭伯以璧假許田乃在桓公之世與此别無相關顧乃信二傳之妄而反疑經之誤亦惑矣康侯又以輸平之時已有此請輾轉牽引遂失經㫖深可歎也曰左氏以為祊公榖以為邴將誰適從曰無事可考理亦難明闕疑可也若以祊為祭名則斷不可者葉氏已辨兹不復論九年或問曰南季來聘康侯之說豈不明白子獨取趙張二說以附於本義之末者何也曰竊疑康侯所數公如京師者一朝於王所者二卿大夫如京師者五本皆非常之事故聖人書之為後世戒者也實非舉二百四十二年之間數其僅如京師之數而已葢春秋之法常事不書使如京師而如禮則不書矣或實往而以常事不書焉則如京師之數固不可考也請論春秋所書如京師之為非常者成公為伐秦道過京師因而朝王僖公為諸侯盟于踐土時天王居鄭因朝王所及㑹諸侯于温天王狩河陽亦因朝王所皆譏其不以時朝而行遂事耳他如卿大夫如京師或為報聘或為㑹𦵏皆譏魯侯之不親往若此者豈可謂常事乎今康侯以為魯之如京師者僅如此又曰隠公即位九年而史䇿不書遣使如周則視以為常事而數之者也是以不得而取也曰公㑹齊侯于防左氏以為謀伐宋子不取程子以為謀伐宋則取之何也曰左氏以謀伐宋為鄭伯以王命告於經無所考故不取程子以謀伐宋為黨鄭而私謀於經有據故取之也曰揣摩億度子所惡也經無謀宋之文惡知程子說之必然耶曰以明年再㑹中丘翬遂與齊鄭伐宋而知其無他事也禮所謂屬辭比事此亦其一法也若傳之比事則有可信不可信者焉曰何以經之比事可信而傳之比事不可信曰經出聖人之手魯史之舊參互考訂萬世之標準也若左氏則雜採百家之說擇焉不精而語焉不詳故讀者惟其理之可信者不可廢若與經違與理悖而盡信之則反害經矣故程子曰以傳考經之事跡以經别傳之真偽十年或問曰公敗宋師于菅杜氏為未陳劉氏為詐戰何也曰此左氏意也讀者見上不言戰而獨言敗故意其為未陳與詐戰耳然春秋書公敗某師者甚衆豈皆未陳詐戰而他國無未陳詐戰者耶不若葉氏謂内辭者為可通也曰春秋公萬世以立教而獨内魯何耶曰聖人假魯史以見義魯史之辭不得妄改辭雖内魯而義之無隠與他國同亦何傷哉曰葉氏謂翬之師而言公為翬還不得志而公自將何也曰亦意之之辭也曰辛未取郜辛巳取防胡翼之曰如此書甚其惡也且辛未至辛巳十一日之間浹旬取其二邑故謹而日之也後之談春秋者盡不用日月且如取郜取防之義苟不以日月則其實何以明若但言以此月取郜取防必不能知一月之間十一日内兩取其邑也言日月不可盡無也其說然乎曰此論似是而實非也日月者紀事自然之法也如日月不可用六經諸史將廢之矣惟其有用也是以不得而廢也春秋非不欲盡言日月也然舊史有詳畧焉有闕文焉其無日月不可得而益有日月又不可得而去也無日月而益則偽有日月而去則亂故春秋紀事有有日月者矣有無日月者矣公榖見其有日月與無日月也求其說而不得從而為之辭或牽彼以就此或例此以方彼自知不通則付之不言故日月之例為春秋蠧矣今壬戌敗宋師辛未取郜辛巳取防魯史紀事自然之法也得其日而事益詳魯隠之惡益彰若或不得其日既敗宋師又取郜取防其惡亦不得掩非聖人特書其日以甚其惡亦非謹其事而日之也苟謂聖人特書日以甚其惡以謹其事則餘無日者皆無甚惡皆無甚謹乎此其不書日者也若并月不書則事皆無惡皆不謹乎故曰似是而實非曰存耕謂翬㑹齊鄭伐宋隠敗宋師葢三師勇鬬而隠自出竒相為掎角者然乎曰此戰國竒正之術經傳所不載千載之下豈能知之何必億而為此說乎借使實然亦非春秋本義也曰張氏謂二邑非魯之版圖故書取以著其無名者然乎曰取者善惡通用之辭取邑曰為惡詩曰取彼斧斨取彼狐貍亦為惡乎况取者舊史之文非孔子所措之字春秋之作其自然之妙與天地侔天之生物非物物雕琢春秋亦非字字安排其意乃在一句之間而非有一字以為義一字褒貶乃末世相沿之陋朱子曰當時大亂聖人據實書之其是非得失付後世公論葢有言外之意若必於一字間求褒貶竊恐不然可謂善讀春秋矣惜其不暇著述也曰宋衛入鄭存耕之說何如曰論形勢而不及本義十一年或問曰公及齊鄭入許左氏所𫝊何以未詳也曰孔莊奔衛經當書之鄭分衛地經當書之本經不書是以疑也春秋或問卷一
