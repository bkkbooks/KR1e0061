body:
  text: 春秋或問卷二元程端學撰桓公元年或問曰鄭伯以璧假許田左氏榖梁兩易之說已辨於歸祊之時矣然先儒以諱易稱假為諱國惡而隱之者何也曰假許田者鄭伯也何必為鄭伯諱乎曰先儒謂言假則有歸道者何也曰鄭莊乘魯勢疑懼而脅取許田以鄭莊平日譎詐故於此不正言求而以假為名旣得許田何有歸道哉曰有歸道之論豈非許人遷善改過之意歟曰許人遷善改過者聖人之心也然原其情則無有歸道也夫假之與易其義雖殊同歸於罪先王所封先祖所受旣不可易亦不可假今變易為假亦無益於魯鄭之事吾知聖人無此迂濶之為也况入祊取郜取防不諱國惡反於易田而諱之失其輕重之倫矣曰少藴邦衡謂許男之田隱公嘗入許而有之者何也曰據經但言入許不言取許邑左氏亦言齊以許讓魯而公辭乃與鄭人鄭伯使許叔居許東偏公孫獲居許西偏則魯未嘗有許地也何得謂許男之田乎凡地名與國同名者衆矣如曰築臺于薛築臺于秦盟于越不可謂之薛國秦國越國也安知許田不偶與許國同名乎原父固已辨之矣若邦衡此説之末有曰傳謂鄭伯以祊易之果爾祊旣入魯則許田即時以歸安得湏鄭伯以璧假之而後與者誠為至論故朴郷曰言假則非易言易則非假向也來歸祊則鄭以此結魯也今也以璧假許田則鄭以此要魯也公非不知鄭假之必不歸也而不得不從旣許其假矣而後得為越之盟甚矣鄭荘之姦雄也鄭伯何為志為此會哉將以邀其許田而為之會也魯何為志為此盟哉將以藉鄭之力以求安其位也春秋之時篡弑之君諸侯苟列於會則諸侯不之討此鄭莊所以逆其意而與之會也此魯桓之所以因其會而遂假之以許田也會猶未足繼而盟焉則愈固矣是舉也於以見鄭伯之巧於邀魯也於以見魯之急於倚鄭也於以見魯之不復朝周而棄其朝宿之邑也於以見鄭之不王而奪其所賜之地也於以見弑君之賊諸侯不惟不加討而又因之以為利也於以見世衰道微雖罪大惡極之人而往往得以自安於其位而無復懼也曰公會鄭伯于垂公及鄭伯盟于越桓繼隱而立為其後者為之子桓居喪未期而出會盟子所不言何邪曰不責其弑逆篡位而責其居喪出會正所謂不能三年之喪而緦小功之察放飯流歠而問無齒決者也二年或問曰宋督弑君及孔父髙氏葉氏之說何如曰髙氏論孔父稱字甚悉葉氏亦曰或者謂君前臣名孔氏不得為字此禮施之於君臣相與之際者豈春秋之謂哉弑君名者初不以為輕大夫字者初不以為重道固並行而不相悖也此論亦甚善但非本義不得録耳曰滕稱子先儒以為時王所出與惡其朝桓削而書子與當喪未君朱子辨之備矣或又以為後服於楚故降而稱子夷狄之者何也曰設使後服於楚降而稱子隱桓之際未服於楚何得先降之邪且公侯伯子男中國之五爵以小大稱者也凡稱子者豈可盡指為夷哉先儒雖有夷狄雖大稱子之説亦不過謂夷狄不可稱侯伯耳非以子為夷狄之號也然秦亦夷狄也而春秋稱伯此又不可考者况滕子云者魯史之文不知夷之者魯史邪孔子邪果魯史邪則當時隱公會戎盟戎矣豈知夷夏之分哉果孔子邪則孔子作春秋其文則史未嘗改侯為子皆不可通之論也曰東萊又謂我以子禮待之者何也曰使魯以子禮待之非後世所能知如其實然亦不過待以子禮耳魯史所書不應亦改其爵為子也曰居仁以為誤文何也曰春秋固有誤文然誤者一二字耳不應終春秋把稱侯伯滕稱子薛稱伯字字皆誤然比諸説此為近理但不若本義所録孫朱程胡戴趙之説尤有理也曰四國成宋亂先儒皆以成為成遂之義子獨取杜氏訓平之説何邪曰成宋亂之文魯史之筆也魯史安肯自書曰公㑹三國成遂宋之亂哉若以為孔子所改則孟子嘗曰其文則史未嘗改也先儒見四國不殺華督而使相莊公也謂成遂其亂殊不知在他人書之猶可在魯史亦當諱國惡也况釋文成字一訓為平一訓為就即遂之謂也且督將弑君四國往而共謀之猶可言成就宋亂也今督已弑君宋已亂矣何俟四國成之哉當四國舉兵必有一國造謀往約三國使者奉辭至於其國必曰宋有弑君之亂將平之苟以成遂為義使者可曰宋有亂將成遂之乎杜氏訓平之説本於江熙雖不詳悉然人情事理兩有攸當安得違之哉秀巖亦曰諸侯以宋有弑君之亂而往平之耳後書取鼎于宋而討賊之事無聞焉則其罪自見矣曰劉氏亦以平安為訓而不取何邪曰劉氏始訓為平終則反之是亦以事跡論而疑之者也曰平宋亂則春秋何書也曰予於本義言之矣竊意四國之舉兵其心之公私不可知然其初也亦欲平宋之亂宋莊華督知其將至也而賂之於是四國見利而忘義左氏所載意亦如此然以左傳考之知其為立華督但以經文求之則此事不過為取鼎起文因經文無殺督之事所以知左氏立華氏之言可信也曰先儒又謂春秋特目其事以重其罪似有理而子亦不取何邪曰此會取賂而固賊比之他事其罪固重然春秋凡書㑹不過責其非王事而擅出境紛紛相會合黨行私云爾然又有前書會而後書其事者是亦目其事也此書四國之㑹而并目其事於其下耳何足異哉夫四國為㑹而不目其事則取鼎于宋何以知其事之始由是觀之史氏立言固當如此非孔子特目其事以重其罪也大凡但書會者其責在會目其事者其責在事如襄公會于澶淵謀宋災但責其謀宋災耳不暇責其會矣若云成宋亂為弑逆大事而特目之則謀宋災非弑逆大事又何為特目之乎然後知凡此皆史氏立言之常法而聖人因之不革以見義者也夫聖人於春秋何有作為於其閒哉物各付物而已矣故先儒氏言特書者皆所不取也不特此而已曰蔡鄭會于鄧懼楚之云據左氏耳於經無文子何以信之邪曰後此二十七年荆敗蔡師以蔡侯歸又四年入蔡又二年伐鄭則二國懼楚可知矣曰吕朴郷謂鄧亦與焉者然乎曰吕亦以鄧為國耳本義已辨之矣曰入把吕朴郷謂七月來朝九月入把者何也曰朴郷不知七月來朝把侯當為紀侯耳程子已言之矣曰凡書公至先儒言危之者衆矣子獨不取何也曰諸侯妄動可危者固不可勝紀然春秋之作將以正義明道奚暇為諸侯危之而幸其得歸至乎且桓公弑賊人所當討古今所共疾孔子奚暇危之哉凡言危之者見踰時之説不可盡通而齊桓之時書至者又少故為是言而不知理之不可也三年或問曰桓公正月無王者十有四或王者不班歴或為桓無王或為元年書王以正桓之罪二年書王以正宋督之罪十年書王以數之終十八年書王以正桓之終子皆削之而以為闕文者何也曰聖人録舊史之文以定當時之亂其經國大義昭於日月豈屑屑去一字以示貶使後世揣摩億度起紛紛之論哉必其傳寫之誤而後世不敢増益之耳今必欲就闕文生義則桓十四年書夏五而無月昭十年不書冬桓四年七年不書秋冬僖二十八年書冬有日而無月將何以為義乎請悉論之平王東遷號令不及天下諸侯即位不請命王崩不奔喪入國取邑弑君篡位且無所畏何暇奉其正朔哉然則王不班歴而不書王者非也夫桓之篡弑固無王矣宣公事蹤與桓無異何以復書王邪則桓無王而不書王者非也桓旣無王元年即不書王可也今元年書王以為正桓之罪三年不書王反不正桓邪元年猶可言也二年書王為正宋督之罪然翬弑隠公慶父弑閔公楚商臣弑君父凡此之類何以皆不書王於前去王於後以正之邪若曰十年數之終十八年正桓之終則妄誕穿鑿之尤者凡為此説者由於不解王正月三字相屬而以王字自為一義正月自為一義故也苟知春秋據事直書不以一字為褒貶義在於事而不在於年時月日之閒則自然無此病矣曰公會齊侯于嬴左氏以為成昬於齊子何以知其必然邪曰是年秋書公子翬如齊逆女則此會為求昬也愚案謂春秋有前書㑹而後書事者若此之類是也曰齊衛胥命葉氏宋氏存耕諸儒謂齊九命為方伯衛八命作牧者何也曰經不言所命者何事二傳不言所命者何事而千載之下反知其相命為方伯州牧吾不之信也故浚南曰胥命為伯非衛之志錄父亦未敢然曰君舉陳氏謂相推長者何也曰是以葉氏之意而不目其事者也但經言胥命亦不聞相推長也果相推長也經當書曰齊侯衛侯相命為伯為牧不應含糊命辭啓後世之疑也此責其不受命於天子而交相命以事也明矣曰張氏謂齊衛為列國之望欲私天下之權於已遂起而圖之必求勢力之均相遜相先布之天下耳目而不以為異然後强者乃敢專之者又何說也曰經之所謂胥命者兩不相下交相命事而已未聞欲布其命於天下也張氏求之過矣曰或又以為草次以見為近鄙者也曰草次以見謂之遇矣曰木訥又謂交相見而書云曰胥命者何也曰此亦草次以見之意而尤略者也去胥命逺矣曰日食之旣仲舒劉向以為先是魯宋弑君魯又成宋亂易許田無事天子之心楚僭稱王鄭拒王師射桓王之應然邪曰夫天變之生前必有所感後必有所應自然之理也然必曰某事感某事某事應某事則拘泥不通此漢儒之大病雖董子之賢不能免焉故髙氏曰人君遇日食則恐懼修省而百官修輔厥后不敢推之於數後世推求億度指陳某事之應則失之矣漢文帝五年地震致堂胡氏論之曰文帝之時有此大異何也曰天地之變非一端也盡以為人事致之則牽合附㑹泥而不通盡以為氣數適然則古人修德政反災為祥者亦不少矣要之為天下主父天母地父母震怒聲色異常人子當祗栗恐懼思所以平格不當指為情性所發而遂已也文帝之時雖有此異然帝方躬修德化節用愛人此其所以雖有此異而無其應歟其說庶矣曰公子翬逆女孫氏之說何如曰其論關雎樂而不淫哀而不傷當時孔子直論關雎之詩之義耳未必如孫氏所言傷周室凌遲㛰姻失道無賢女輔佐君子致關雎后妃之徳以化天下也其曰内女出處之跡皆詳録之以懲以戒為萬世法者近之然内女出處之迹不書者甚多而其所書者莫非非常之事此又不可不知也曰先儒謂翬於隱世不稱公子隠之賊也於桓世稱公子桓之黨也何也曰抑揚予奪之意也曰先儒又謂卿逆夫人於禮為稱何也曰果於禮為稱孔子又何書焉曰先儒謂翬雖尊屬當官而行亦無嫌也何也曰在朝廷之事則可逆女為内主有家人之道也而先不明兄弟叔伯尊卑之義則亂之始也曰先儒謂邦君以爵則有尊卑以國則有大小以道途則有遠邇或迎之於其國或迎之於境上或迎之於所館為禮之節者何也曰此說揆之人情雖若可通而考之典禮則無所據况嫁女娶婦為㛰姻之國后妃配諸侯以治内敵體也此時豈分爵之尊卑國之大小而有逺迎近迎之說哉曰髙氏之説何如曰其曰使公子逺迎之曾無嫌疑之說竊意古人惟禮是從禮當親逆則親逆禮當卿逆則卿逆嫌疑之說未可信也曰存耕之說何如曰其曰翬弑隱而立桓者也遂則殺嫡而立宣者也僑如則通穆姜而亂國者也逆女而使姦臣非正始之道竊謂此說近似然不若啖氏葉氏之説為有據故亦不得取此以亂彼也其他顯然可見其非者不暇悉辨凡愚之所辨者疑似之閒易以惑人者也曰夫人姜氏至自齊孫氏之説何如曰其曰公受姜氏于讙不以讙至者不與公受姜氏于讙也故曰夫人姜氏至自齊以正其義似有抑揚予奪之意故不取也曰莘老之説何如曰其曰君出而反必書至於夫人之歸亦書至告廟之禮同也合二姓之好繼萬世之嗣以為宗廟社稷主不可不告者乃魯史之常法然春秋不書常事故不取也曰存耕之説何如曰存耕歴數文姜穆姜哀姜出姜聲姜之書逆書至為有所失有所屈無所失無所屈者乃凡例之餘習而無自然之大義也曰春秋書有年公羊以為喜子旣辨之矣或以為紀異謂人事順則天氣和桓弑君逆天理亂人倫天地之氣為之繆戾今乃有年故書其異者然乎曰意則新矣而義則未也春秋以水旱饑饉螽螟蝝􅈮之類為異不以有年為異也曰非以有年為異也桓之異也桓之弑逆不當有年而有年是以為異也曰歳歳有年聖人生物之心也以有年為桓之異豈聖人生物之心哉聖人若曰治世每歳而有年亂世至此而始有年此聖人惻怛傷世變之心也若曰桓不當有年而有年聖人生物之心不幾於息乎曰春秋不書常事有年非異則常矣何以書也曰毎歳有年則不書矣惟其至此而始有年也故書此以見他歳之無年耳猶僖三年書六月雨之類也每月有雨不必書矣惟其六月而始雨也故書六月雨以見前月之無雨觀六月之前書曰冬不雨春不雨夏不雨可知也知六月雨之義則知有年之義而無疑然則有年雖為常事而因有年以見他歳之無年豈非非常也哉曰桓宣皆弑逆之賊而有年大有年何獨於桓宣書而他君無有也曰適然也天非有意而特有年於桓宣也聖人亦豈有意而特書於桓宣哉曰然則春秋二百四十二年之間獨兩有年餘皆無年歟曰此亂世氣象也春秋二百四十二年之閒饑與大饑旱與大水無麥無禾蟲傷之災春秋固書之矣餘年五榖之中或此種熟而彼種不熟或此地熟而彼地不熟多雨則髙田熟少雨則卑田熟或薄略而僅有或苗秀而少實皆不可以有年名惟陰陽五行交運錯綜偶一和㑹而五榖皆熟則舊史書之聖人因而錄之以見義焉二百四十二年之閒獨兩有年又何疑哉况此書有年者一魯國之事他國有年則不書也夫天之與人一理一氣有感必應一夫一婦不得其所即傷天地之和春秋之時豈特一夫一婦之不得其所而已五榖不熟固冝此理隂陽賛化育者君相之大務聖人之功用春秋書此亦以示後世君臣當盡心焉者也豈徒屑屑紀其異而已故黄氏曰謂桓不當有年為異則書螽與大水無冰皆當為桓之常春秋豈專紀人之凶荒而不幸人之豐熟哉各書其實耳曰莘老以為桓宣之時不冝有者何也曰是亦紀異之意而特變其文耳曰葉氏以為有年大有年非桓宣所能致天之愛人至矣有年其常而不能常也有年大有年各因其人而一見法焉故終春秋不以再見非外此無年也其說然乎曰此亦疑二百四十二年之閒獨兩有年求其說不得而為之辭者也夫天之愛人至矣有年其常而不能常固天地之心也然以為春秋書有年之本義則不可其曰各因其人而一見法終春秋不以再見非外此無年者葉氏之意若曰魯史書有年者本多仲尼特於桓宣之閒一録之其餘削而不書此億辭也吾何能知之今就事論理春秋於水旱饑饉螽螟蝝􅈮一一書之何獨於有年削之而特書其二以一見法且一見法之説先儒解經之通病未足據也曰存耕謂魯頌云自今以始嵗其有則為僖公亦有年者何也曰此祝頌之辭而非實然也曰然則先儒謂此為祥瑞者何也曰春秋不書祥瑞四年或問曰公狩于郎先儒皆言非地子獨兼言不時何也曰先儒多以周正為說指春為冬而以狩為及時故但責其非地爾殊不知天時不可易月數未常改春固夏正寅卯辰之月也苟知此則非地為輕不時為重盖聖人仁民而愛物當春鳥獸孳尾不過擇取不胎不字以事宗廟而已儻行冬狩之事圍而狩之盡物取之則害物多矣豈人君之心哉曰不書冬秋杜氏謂史闕文存耕諸儒亦謂史闕文聖人所重如夏五之闕非不知决無他字而終不敢加焉所以存闕文也然乎曰不然也聖人固闕疑也闕其事之不可知者爾若年無秋冬人所能知也聖人安得不正之而亦傳其疑哉且春秋常事不書則損舊史之文者多矣如事有闕文而無義將遂不書豈得存其不可曉者以惑世哉安知非筆削以後闕文哉故居仁曰杜預以謂不書秋冬史闕文其説旣善矣然謂之史闕文則不可謂之闕文則可矣亦此意也五年或問曰正月甲戌之下不書事二傳繆妄先儒旣辨之矣髙氏案長歴正月甲申朔日内無甲戌而太歳在甲戌或疑甲戌在去年冬十有二月而去年不書秋冬誤著此月或疑此日下書陳佗殺太子事其簡編脫者何也曰長歴不可信也久矣又太歳當在庚戌而非甲戌也若甲戌在去年冬十二月不應誤在五年之下果誤在五年之下亦當繫之以事也其曰陳佗殺太子事或恐有之盖六年八月經書蔡人殺陳佗以討賊之辭而上文不見其事故也然豈敢質之哉曰天王使仍叔之子來聘先儒皆謂譏世官子之不取何也曰此不特譏世官也夫世官者父為大夫其父死天子不擇其子之賢否而亦命之為大夫是謂世官今仍叔在其子未命故曰仍叔之子則是父為大夫而子弟干政也豈特世官而已哉曰莘老謂春秋父没子代而未爵者則書某氏不稱某稱字武氏子來求賵是也此書姓書字加之子以别之者父在而代從政公榖之言是也其說又何如也曰凡例之不可信也尚矣旣曰父沒而子代矣則安有未爵者乎且尹氏卒亦書氏不以其子而稱也其書姓書字而加之子者又安必其代父而從政也使父從政其子不代其父天王一時使之為使不知凡例何以書之故曰凡例不可信也曰蔡人衛人陳人從王伐鄭朴郷吕氏謂此三國諸侯有天子在則諸侯稱人有諸侯在則大夫稱人者何也曰君前臣名禮也今魯史記其事亦當叙其實奚可以人稱或雞澤之㑹魯侯在焉而稱叔孫豹則亦不人之矣曰孫氏謂不使天子首兵為尊桓王以甚鄭伯之惡者何也曰史氏命辭固有重輕諸侯用諸侯之師則言以某師天子用諸侯之師則言從王此自然之法而孔子因之不革以見義者也若曰孔子特不使天子首兵以甚鄭伯之惡則非春秋自然之法矣胡氏常山諸家皆不免此病不但孫氏而已也曰程子張氏謂王師於諸侯不書敗為諸侯不可敵王者何也曰王師敗績于茅戎春秋猶直書之何獨敗於諸侯而不書乎愚於辨疑已言之矣曰常山謂蔡衛陳稱人非微者也雖使卿行苟不命於天子者若從王則亦不得以名舉葉氏亦謂諸侯無軍以卿帥其敎衛之民以替元服入天子之國曰某士故以人見者何也曰人與士異義又非諸侯自稱之辭魯史安得代稱人哉且公孫敖叔鞅叔孫得臣如京師皆書名氏何獨三國之卿而不書名乎曰杜氏謂王師敗不書不以告者何也曰三國從王伐鄭旣書之矣王師敗而獨不書之亦無是理也且史之所書有從告者有不從告者不可以一例拘也曰康侯謂春秋書王必稱天者所章則天命也所用則天討也王奪鄭政而怒其不朝以諸侯伐焉非天討也故不稱天者何也曰此史氏省文耳何必為義乎若以書王稱天始為天討則下賵魯惠之妾下聘魯桓之賊非天命天討矣而皆以天書何邪且春秋兩書公朝於王所其義本責魯而不責王亦不書天何邪曰張氏亦謂左氏稱諸侯春秋悉以人書而王不稱天為桓王以小忿奪鄭伯政又帥諸侯伐之而大姦大惡乃屢聘焉失天下共主之義而王靈竭故人諸侯而王不稱天者何也曰其曰桓王舎重罪而行輕刑則庶矣其曰人諸侯而王不稱天乃一字褒貶之弊也豈春秋之旨哉竊疑張氏之學出於朱子朱子嘗曰春秋直書其事而善惡自見以爵氏名字日月土地為褒貶之類若法家之深刻乃傳者之鑿說朱子又以春秋之任付之張洽其授受之際必以是告之矣及其為傳則每事反之豈當時已非其師之說邪抑晩年之見别有得邪吾不能知也曰大雩程氏據明堂位禮運以為成王賜魯重祭得郊禘大雩劉氏則以為非其言曰禮之有天子諸侯之别自古以來未之有改為說者曰成王康周公賜魯以天子禮樂成王者周之盛王也其亦謹於禮矣昔者魯惠公使宰請郊廟之禮於天子天子使史角徃惠公止之其後在魯始為墨翟之學使成王之世曾已郊矣則惠公奚請惠公之請殆由平王以下乎二說孰然曰二說各有所據未詳孰是然非本義所系雖不辨可也六年或問曰州公如曹正月寔來或謂天王使之信乎曰如天王使之經當書曰天王使某來聘今寔來尚不可解而復起天王使之之義違經逺矣曰張氏曰記禮者曰天子曰非佗父寔來成二年傳王曰所使來撫予一人而鞏伯寔來則寔來有自矣而子獨疑之何也曰寔來在州公如曹之下文猶未暢豈有相隔一年而但曰寔來恐史氏立言聖人取之不如是之晦也曰張氏又謂不復國而略之者何也曰略之之云即公榖慢之簡之之意而變其辭耳借使不復其國史寧不書春秋寧不録而略之使不可解則後世何所見義哉曰蔡人殺陳佗朱子謂此是夫子據魯史録之佗之弑君初不見於經者亦是魯史無之耳此語豈不平易明白而子不之取而又於本義之末為說以反之何邪曰朱子據史録之之言施之春秋之大體則可施之蔡人殺陳佗則不可何則經有書弑君而賊不討者矣未有討賊而不書弑君者也使魯史但有蔡人殺陳佗之事而不見陳佗弑君事迹則事事無其始而義有所不備難以因事立敎矣夫子將遂不録殺陳佗之事必不傳疑於後啓紛紛之爭也安知非筆削以後而闕之哉夫春秋之義不待傳而自明夫子之修春秋也亦不意左氏之有傳也今左氏載陳佗殺世子免然後知蔡人殺陳佗為弑君之事使遂不有左氏者出後世將指蔡人殺陳佗為何義乎以是知夫子之將遂不録焉也雖然朱子據史録之之言眞足以破後世穿鑿附㑹之大病又不可因此事而忽此言也曰子録程子之言於本義而遺其蔡侯殺之實以私也之一語何邪曰晉惠公不以討賊殺里克經書曰晋殺其大夫里克如蔡侯以私意殺陳佗經亦當書曰蔡侯殺陳侯佗矣愚是以有疑夫此語也曰子旣取左氏孫氏程子之說以為本義而又曰未詳是否何邪曰佗殺世子經無明文愚安敢質言哉曰子同生先儒曰冢嫡生故書又曰嫡冢始生即書於策與子之法也文之子惡襄之子野莊嫡夫人無子若成昭之嫡子蓋無見於傳莊文成哀惡野六人皆嫡子而莊獨書於春秋者生於即位之後而以太子之禮舉之者莊公一人而已古者嚴嫡庶之分所以定其為君也君一定而僭亂之心息矣張氏亦曰嫡夫人之長子備用太子之禮故史書於策春秋於此明與子之法在於正始明分其物采等衰殊絶於初則私愛之所不能行嬖孽之所不能干所以定國夲息亂源也其他為說皆不出此而子悉違之獨取糓梁之說奈何曰先儒承左氏之文而益其義者也凡冢嫡生而書於策國史之常也在春秋則以為常事而不書愛嫡冢之辨固聖人所盡心也然其見於詩書禮者詳矣春秋直書其變常之事耳子同生雖非變常然假此以明非齊侯之子則是變常而已夫人苟知事之變常則常道見矣此春秋立敎之大法也七年或問曰焚咸丘杜氏劉氏張氏諸儒以為火田程子康侯戴氏以為焚林而田子何以取程胡戴氏之說邪曰火田者冬月去莽翳以逐禽獸而已焚咸丘則焚其林藪害物多矣不仁甚矣况仲春生物之時乎故戴氏曰杜氏以為火田非也禮有火田豈得譏其盡物哉今云焚咸丘豈止火田而已乎且經何不直書火田而書焚咸丘乎曰榖伯鄧侯名張氏諸儒皆以鄧榖逺朝弑逆之人故特名之者何也曰此以名為褒貶之弊也前乎此膝子紀侯朝桓矣後乎此邾子朝桓矣未嘗一名之以示貶而獨於此貶之乎若曰一見法當見法於前此者滕紀當之矣况無一見法之理乎若曰榖鄧逺而滕紀近則逺與近皆朝弑賊也又何閒乎况近者當先而不討逺者何責焉若曰滕子畏大國紀侯畏齊不得已而朝則榖鄧亦畏楚也舎三國而罪榖鄧聖人用法不如是之頗也夫春秋諸侯卒名失地名者以别其人耳非死與失地即賤之而名之也今榖伯鄧侯不死又不失地何獨名之此其可疑者也先儒因以為義求之過矣曰先儒皆謂逆亂天道歳功不成故不具四時四年無秋冬以冢宰下聘弑賊則天下之望於王室者絶矣故去秋冬見天王之不復能用刑也七年無秋冬以榖鄧逺朝弑賊則天下諸侯無復可望者矣故去秋冬見諸侯之不復能修其職也其說奈何曰五經遭秦火錯亂亡失不可勝紀惟易以卜筮存其閒且不免訛衍况春秋之書聖人逺患不敢公傳口授弟子至於後世其書始出相傳相襲豈免闕誤如郭公夏五紀子帛甲戌巳丑與桓無王無秋冬之類其顯然可見者也先儒必欲强通其不可通又凡例褒貶抑揚予奪之說紛然雜乎心胷之閒冝其穿鑿附會其始將以扶植世教而不知其先已破碎經旨矣今就其說辨之使孔子果以冢宰聘桓而闕秋冬次年仍叔子復聘於此為甚當復闕秋冬而不闕果以榖鄧朝桓而闕秋冬當先闕於滕子來朝與四國㑹積成宋亂取郜鼎之時而又不闕則孔子取義於是乎踈矣今幸四年七年秋冬之適無事可書而闕之也如有事焉不知孔子并其事闕之邪將仍書其事而獨闕秋冬二字邪吾欲問之八年或問曰正月烝先儒皆謂此為五月烝起文者何也曰先儒誤以周正改天時謂此正月為去年之十一月禮所當烝故但指為五月烝起文而不以為非時苟知三代之不改四時然後知正月烝亦為非時而糓梁之說為得本義曰公羊之說奈何曰公羊亦多以夏正言也但言不明爾其譏亟之說當為五月烝之傳不可置之正月烝之下盖正月烝特可言不時爾未有譏亟之意也若曰去年十一月烝矣至正月又烝似可譏亟但經無明文不可知也今正月烝矣旣非時矣五月又烝謂之譏亟豈不明哉愚故移其說於五月烝之下而無疑也曰先儒曰正月烝矣而非時復烝必以前烝為不備也子亦不録何也曰正月烝矣之云亦以周正改四時言之遂謂正月烝為得時其曰非時復烝但指五月烝言之故不敢取善乎戴氏之說曰正月烝已非時况五月而又烝乎榖梁開其先戴氏結其後備矣曰先儒以十月雨雪為今之八月黃氏辨之而有閒矣然初冬而雪不若仲秋之甚也何以書乎曰聖人謹天時懼天變於毫忽之閒不待其著而無及也陰氣之凝有漸而十月驟然雨雪非天變乎春秋書之為後世戒者微矣是以唐虞三代之盛燮理隂陽均平氣節不使少有差忒而五榖以登人物不夭非若後世之為治者草蕞補其罅而已曰祭公來遂逆王后于紀先儒多為之說子將奚宗曰先儒雖多為說據經觀理不過本義所録程子張氏之云其他或未免億度而生事也邦衡與程子同義孫氏胡氏獻可與張氏同義孫胡出張氏之前而弗録者不若張氏之詳也康成啖趙諸儒皆辨天子親逆不親逆今考經文亦無譏親逆不親逆之意至胡氏則謂祭公來謀逆后之期髙氏則謂來謀紀難葉氏則謂來朝存耕又謂魯知紀之將亡懼王后不能備禮謀速逆之故遂逆者魯之意君舉又謂祭公不稱使則王未有成命而遂專之凡此諸説去經意益遠皆不敢録九年或問曰紀季姜歸于京師翼之謂劉夏逆王后于齊不言齊姜歸于京師言逆則歸可知此書紀季姜歸于京師不與祭公非天子之命遂逆王后故書之甚祭公專逆之惡者何也曰春秋一事見一義其不書者以常事也祭公以遂事書劉夏以非卿書紀季姜以非嫡長書故曰一事見一義也劉夏逆后而不書齊姜歸于京師者必齊女得冝而常事不書也惡有言逆則歸可知之意乎且書季姜之歸與祭公來逆了不相干甚祭公専逆之惡何自來乎若季姜書歸為甚祭公專逆之惡齊姜獨不可書歸以甚劉夏非卿之惡哉且祭公來不過譏其旣受命而不專耳安有非天子命而自逆之理乎曰劉氏謂逆稱王后歸稱季姜為禮之上下取予進退先後各有所冝公卿謀之諸侯主之龜筴諏之天子命之是王后矣然而未見宗廟未觀君子羣臣則不敢君其位為正始之道王化之本者何也曰此史氏立言自然之法戴氏得其意而録之本義矣劉氏盖求之過而不自知其辭之煩也此猶可也至其引詩曰未見君子憂心惙惙亦旣見止我心則説則求之過而鑿之甚矣十年或問曰公會衛侯于桃丘弗遇劉氏翼之謂不為正辭弗為遷辭何也曰此惑於榖梁内辭之説而少變其意者集韻不通弗随人命辭何有遷正之辨哉曰然則葉氏東萊謂桃丘之㑹恥在公故曰弗遇沙随之㑹譏不在公故曰不見公者何也曰兩皆可恥不無重輕耳觀事見義豈在弗與不之間哉曰此弗遇劉氏謂公後會也然乎曰平看經文衛不來㑹故弗遇耳非公後會也曰齊衞鄭來戰于郎劉氏謂不言師敗績者敗在内也敗在内而不言恥也何也曰此信公榖之過也曰東萊謂不計班序而計功魯乃以此受伐者何也曰此信左氏之過也觀左氏公榖之辨則劉吕不待辨而明矣曰存耕謂來戰若三國自戰者何也曰來戰者來魯而戰自然曲直存乎其閒安有若三國自戰之意哉若三國自戰當書曰齊侯衛侯鄭伯戰于郎不曰來戰矣曰張氏謂以無辭伐有辭則罪在三國不容不反常例以明之者何也曰來戰者魯史之辭孔子因而不革其義自見何嘗反常例作此來戰二字哉此凡例所以亂春秋也十一年或問曰宋人執祭仲突歸忽奔劉氏葉氏諸儒皆謂宋不稱公而稱人為非伯討何也曰春秋之時凡執人者皆私也雖稱爵亦非伯討也蓋史氏立言之法固如是不必以為義也曰孫氏諸儒皆謂歸者善也復歸者不善也入者惡也復入者甚惡也是故復入重於入入重於復歸復歸不若歸之善者何也曰歸與入復歸與復入皆罪也何有於善乎但史氏立言自有輕重隨事可見不必以為例也若曰歸者為善突以庶奪嫡而書歸可以為善乎即此亦以類推矣曰常山謂名忽者以忽旣立出奔絶也忽鄭之世嫡不能自固其位以至於亡考之於詩其迹備見有女同車則刺無大國之助山有扶蘇則所美非美籜兮刺君弱臣强不唱而和狡童刺不能與賢人圖事權臣擅命由其不能自固權在祭仲故宋因而執之者何也曰凡君大夫出奔皆名者史氏别其人耳非絶之也鄭忽不能有其國固不足道然可罪者突與宋莊祭仲也今有殺人者人固可殺律將罪殺人者乎罪見殺者乎罪殺人者而已矣今常山罪鄭忽是罪見殺者也用刑頗矣况所引詩莫非淫奔之辭非刺忽之詩乎曰柔會宋公陳侯蔡叔盟於折存耕謂蔡叔者桓侯也生不稱侯死不稱公從其國之舊也蔡之先多稱叔仲度侯也曰蔡叔胡亦侯也曰蔡仲故桓侯亦稱叔然乎曰不然也胡氏曰十五年許叔入于許十七年蔡季自陳歸于蔡莊三年紀季以酅入于齊皆書字則蔡叔書字可知又莊十年荆以蔡侯獻舞歸未嘗不稱侯也曰公會宋公于夫鍾于闞于虚于龜髙氏存耕戴氏石氏黃氏諸儒皆謂魯桓為鄭平宋然乎曰經不見其義十二年榖丘之盟左氏有公欲平宋鄭之文諸儒據左氏以為義耳平觀經文未可據也愚於左氏旣辨之矣十二年或問曰十一月有兩丙戌杜氏以為重書為因史成文劉氏謂春秋故史有所不革引其文則史而言何也曰孔子修春秋筆則筆削則削如盡依魯史之舊而不削則重復支離何為謹嚴哉如两丙戌曉然可削者也安知非筆削之後相傳之乆而有羡文哉曰及鄭師伐宋戰于宋先儒皆謂公及鄭伯也不言公者魯鄭敗績也不言敗績者為内諱也子一切削之何邪曰春秋固有為内諱者矣如公見弑而書薨則不地以見其實夫人奔而書孫子般見弑而書卒則以前後事見其實除此大目餘皆直書其事而善惡自見使後人據事觀理以為大戒若公而不言公敗而不言敗則後世何能知其事實以見義乎且為内諱而不言公遂并外諱而不言鄭伯乎此為内諱而不言敗績乾時之戰獨不諱而言敗績乎又不書公會紀侯鄭伯及齊宋衛燕戰何以書公與紀侯鄭伯邪曰内勝而不諱也曰内勝而書公遂并外勝而書紀侯鄭伯乎皆不通之論也十三年或問曰公會紀侯鄭伯己巳及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績三傳之不同旣見於辨疑矣孫氏邦衡諸儒又謂齊伐魯而戰於魯者何也曰經書公㑹紀鄭矣何得言紀鄭會魯邪且齊果伐魯經當書曰齊侯宋公衛侯燕人伐我今書公㑹矣又書公㑹紀侯鄭伯矣非齊伐魯而戰于魯也曰劉氏又謂宋來報怨齊實主之何也曰齊宋皆有魯怨也今經文但以齊為主後世何從知其的為宋報怨而齊主之不若據經立論之為實也曰存耕又謂魯與紀鄭為㑹而齊宋衛燕来戰會事不果故不地何也曰魯紀鄭若但為㑹而四國伐之經當書公及紀侯鄭伯會于某齊侯宋公衛侯燕人伐之如書蔡人宋人衛人伐戴鄭伯伐取之之法則三國無罪而四國有罪矣今經書曰公㑹紀鄭及齊宋衛燕戰則存耕之説短矣曰葬衛宣公葉氏諸儒謂衛方伐我而我會其葬不以怨廢禮本義不録何也曰春秋無褒也此為臣子私諡與衛朔背殯即戎而書也夫魯衛兄弟之國而攻戰為仇不仁甚矣苟取其怨不廢禮而書焉則是倡家讀禮屠兒禮佛而已矣不若康侯知古人以葬為重之說為少平然亦非春秋本義不以下闕文十四年或問曰公㑹鄭伯于曹髙氏謂鄭伯欲結曹好故公往㑹之者然乎曰臆辭也左氏傳此妄矣然猶曰鄭人来修好㑹于曹髙氏何從知其為欲結曹好邪若果欲結曹好而往㑹也經當書曰公㑹曹伯不當書公㑹鄭伯于曹也曰無冰先儒皆以十一月言之子皆不取而獨取黄氏戴氏之說何也曰月令季冬冰方盛水澤腹堅命取冰周禮正歳十二月令斬冰即詩所謂二之日鑿冰沖沖者也又曰三之日納于凌隂朱子釋之曰二之日謂斗柄建丑二陽之月三之日即正月建寅之月也以詩與月令周禮考之則十一月無冰未為失時至十二月無冰可鑿來年春遂無冰然後魯史書之仲尼因而錄之以見人事縱弛燮理失道則隂陽錯行冬行春令當寒而燠是以萬物失冝疫癘將作又無冰可藏則無以為喪祭之須以節陽氣之盛若十一月無冰則十二月有冰可鑿正月有冰可藏亦何害於事而書之哉以此言之則四時之不可易三代不改月數之數也尚矣但戴氏謂書無冰於正月為無藏冰則義有未盡特以其識見正大逺勝諸説不敢遺之云爾曰夏五無月先儒有曰傳疑也疑而不益見聖人之慎也故其自言曰吾猶及史之闕文又語人曰多聞闕疑慎言其餘則寡尤而世或以私意改易古書者有矣盍亦視此以為鑒可也然則春秋曷以謂之作其義斷自聖心或筆或削明聖人之大用其詞則舊史有可損而不能益其說然乎曰此即榖梁之說而益之以辭者也榖梁之辨孫氏髙氏備矣此不復論竊謂吾猶及史之闕文孔子蓋謂事之不可知者爾若事之顯然而可見者孔子安得不正之哉多聞闕疑孔子敎人闕其理之可疑者爾若理之斷然而可言者孔子亦使人愼言之也若夏五而無月乃事之顯然而可見理之斷然而可言者而非改易古書之謂也孔子亦豈恝然而已乎若曰孔子筆削可損而不可益當并去五字亦不害於此事之義孔子必不錄斷爛不可讀之文為後世訓也秀巖亦曰胡氏之說愈密而愈踈矣聖人作春秋固謂空言不如行事也使舊史果有夏五之文則亦削之而已存而不益於義何所當乎此必秦漢以後傳者有所脱遺如左氏傳成公二年夏有之比耳必為之說則非矣曰御廩災先儒謂魯侯之有御廩僭也其說奈何曰月令曰藏帝籍於神倉諸侯各有宗廟各有籍田御廩之名吾未見其僭也此為災而書耳曰杜氏謂嘗先其時過也何歟曰杜氏誤解左氏周正月之語遂以此八月為夏之六月故為先時殊不知八月而嘗周之常禮而無所變者也八月而嘗常事不書此書者以壬申御廩災而乙亥嘗耳非譏其先時也張氏諸儒皆然由杜氏唱之曰宋人以齊蔡衛陳伐鄭趙氏謂凡不用我師而用彼師曰以然乎曰不然也以人情言之豈有都不用我師而但以彼師之理苟不用我師而但以彼師彼將怒曰汝師不勞而勞我亦不為之用矣惟其以我師之不足而又乞師以用之也故曰以爾曰張氏謂春秋特書日以見宋與四國之罪者然乎曰史有自然之法春秋錄之以見義有自然之妙宋用四國之師則曰以若特書曰以非春秋自然之妙也夫聖人豈有作為於其間哉物各付物而已矣十五年或問曰天王求車左氏有諸侯不貢車服之說杜氏釋之曰車服上之所以賜下東萊引書車服以庸為證義可通矣子皆不之取何也曰周官有器貢服貢則諸侯有貢車服者也諸侯貢之上受而藏之復以賜下亦何傷於義哉必以書有車服以庸之語而遂舎周官器貢服貢之文則得其一而失其二矣是以不敢取也曰存耕謂平王崩而求賻襄王崩而求金桓王將崩而求車皆以媿魯者何也曰周室衰微諸侯莫貢執政者但顧目前之湏不識經國之體下求列國何暇媿魯哉漢文帝以呉王不朝賜之几杖張武受賂媿之金錢雖不失厚意然已非御天下之正義況衰周無西漢之盛桓王無文帝之風乎且春秋之時積習生常周雖媿之魯弗顧也曰許叔入于許先儒為說多矣子一切刪之而附以己意何也曰先儒大槩引左氏隱十一年鄭伯使許叔居許東偏以奉許祀而今以鄭亂始入為義隱十一年經正書曰公及齊鄭入許許未嘗滅也自隠十一年距今十有六年則必有君許而為諸侯者矣設使當時許叔居許東偏以奉許祀今日之事乃復其舊迹不可以入書也況左氏許叔居許東偏之事未可盡信乎設使可信亦不可為許叔入許之傳也曰常山康侯張氏責許叔以許為先王建國不能伸正義於天王方伯以復其國乃因亂竊入故書入于許者何也曰許叔雖不能伸大義於天子方伯而鄭為許讎國鄭亂而能復其國經亦不當與突入于鄭小白入于齊同一法也蓋說春秋者不見許叔出奔之事而以許叔居許東偏之事當之耳案蔡季自陳歸于蔡季子來歸齊小白入于齊之類皆不書出盖義不繫於出或魯史不書彼闕則闕之何必强牽彼以實此哉曰邾牟葛來朝存耕謂其不奔天王之喪而朝篡弑之賊然乎曰王制曰不能五十里不合於天子附於諸侯曰附庸三國附庸之國也難以責其不奔天子之喪矣十六年或問曰公㑹宋衛陳蔡伐鄭杜氏曰蔡常在衛上今序陳下蓋後至張氏諸儒皆從之然乎曰此左氏釋經之弊而杜氏宗之又因以釋此義者也夫宋晉齊魯大國㑹盟侵伐豈無後至者乎未聞居陳蔡諸國之下也十七年或問曰蔡季自陳歸于蔡何氏謂封人無子季次當立封人欲立獻舞疾害季季辟之陳封人死反奔喪思慕三年卒無怨心信乎曰未可信也左氏嘗見國史矣猶不敢質言之但曰蔡人召季蔡季自陳歸于蔡而已考之史記世家年表旣無季當立之文稱之三傳亦無季辟獻舞于陳之事何特見經中季以字稱歸為易辭而又與季子來歸之文相類遂生事以實之不自知其害經旨也夫萬世取信者經而已經曰蔡季自陳歸于蔡益責季非世子不受命於先君不誓於天子倚陳之力歸為諸侯則無王無父矣何氏不特妄論其義又妄撰事以實之其不為春秋之讒賊者幾希杜氏謂桓無子召季而立之十一年後經書荆敗蔡師以蔡侯獻舞歸又世家年表封人後即見獻舞安知獻舞非蔡季之名哉今以大義言之則春秋無褒又不書常事季果當立而又無怨心則春秋不書矣以人情言之獻舞旣疾害季使獻舞為諸侯則季不能一朝居使季為諸侯則獻舞不應復為諸侯於十一年之後也曰推何氏意謂季歸而為臣也曰季果歸而為臣則春秋亦不書惟其歸而篡也故書之以見義若曰彼歸而叛君據邑則春秋當書如孫林父入于戚以叛之文矣曰劉氏康侯亦謂季之去也以道其返也以禮何也曰此亦信左榖何氏之弊也考之他書不見季出奔之迹求之春秋又無返季之義何從知其去以道返以禮哉春秋或問卷二
