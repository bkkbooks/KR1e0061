body:
  text: 春秋或問卷四元程端學撰僖公二年或問曰城楚丘朴鄉謂城邢歷序三國者詳書也城緣陵止書諸侯者略之也城楚丘沒諸侯者略之而又略也楚丘不如緣陵緣陵不如城邢救災恤患鄰道也詳書而不殺豫之也封諸侯非王法沒諸侯而不書諱之也諱之者奪之也然乎曰不然也三國城邢而不再序則若邢之自城與魯之城之也故再書三國焉城緣陵上既列序諸侯故前目後凡而但稱諸侯也城楚丘者魯自城之也豈可指元年㑹柳之諸侯城之乎且城邢為救災恤患城緣陵獨非救災恤患乎設如城楚丘為諸侯城之亦非救災恤患乎何為略之又略也夫春秋有自然之書法使城楚丘而去諸侯之文以寓豫奪之意則晦昧而不可曉豈書法之自然哉且褒貶凡例抑揚豫奪之說春秋之蠧也說春秋者自漢及唐自唐及宋能知擺脫俗習者朴鄉數人而已而其為說猶或如此吾然後知習俗之移人雖智者不能免况其餘哉曰冬十月春王正月夏四月三書不雨先儒皆以餘月有雨子何以知不雨與書首月不相蒙也曰以後書六月雨而知之也如十一十二與二三五月而有雨則六月雨在不書矣惟其書六月雨也然後知左氏所謂自十月至於五月不雨者為可據也但其下文云不曰旱不為災者為妄說耳曰此不雨書法與文二年書自十二月不雨至于秋七月十年十三年兩書自正月不雨至于秋七月之文異者何也曰文公之三不雨有事介乎其間此則無事以間之故所書有不同也後世以凡例求之而不得於是為之辭以強通之故榖梁有勤而閔雨之說先儒亦有冬十月不雨則十一月十二月有雨春正月夏四月不雨則二三五月有雨之說是皆以不雨與冬十月春正月夏四月聨屬讀之而不察之失也愚故離冬十月春王正月夏四月自為一時無事書首月之義而以三不雨不與之相蒙斯有以合乎左氏之說而經㫖自明矣曰既書不雨則一時之中有事矣子何以言一時無事書首月邪曰此非㑹盟侵伐郊禱朝聘諸事可以月日書者也特記一時之不雨耳而不雨非可以月日書也何妨自書首月乎曰冬不雨之下書楚人侵鄭夏不雨之下書徐人取舒矣子何以言一時無事耶曰雖有二事而皆無月日又皆在不雨之後春秋之法凡正四七十月有無月日之事則但書春夏秋冬而不書首月恐其月之亂事也此以不雨間之故雖有二事而冬春夏得以書首月也非若文公時三書不雨皆有繫月日之事介乎其間而不可以直書首月也曰其或曰旱或曰不雨何也曰魯史命辭有異同孔子因之而不革奈何必執此例以求彼同乎二年或問曰齊宋江黃㑹于陽榖先儒以諸侯之師同次陘者桓公之正兵又領江黃各守其境案兵不動為八國之援者為竒兵然歟曰不然也此見江黃不同伐楚而其後江黃伐陳而意之也設使有此則春秋本正義明道之書非戰國孫吳之術學者固不可移彼以論此而况髣佛想像之云乎四年或問曰八國侵蔡遂伐楚次于陘先儒譏遂為專然乎曰無譏也此與公㑹齊侯于櫟公與夫人姜氏遂如齊與公㑹晉齊宋蔡鄭陳莒邾秦于溫而諸侯遂圍許與下文曹伯襄復歸于曹遂㑹諸侯圍許之遂同義蓋文法當然譏在一事而非在一字也若公子結媵陳人之婦遂及齊侯宋公盟與公子遂如京師遂如晉之遂則譏其專耳然亦文法當然意則有輕重耳非若後世一字褒貶之云特下一遂字以譏之也曰次于陘有譏乎曰無譏也與齊宋曹師次于聶北救邢與叔孫豹救晉次于雍榆之次不同也彼之所謂次者名救而不進耳此之所謂次者紀實事以見下文退師盟于召陵之節次耳曰秋及江人黃人伐陳子何以兩存高杜氏之說也曰皆可通也皆有疑也以文勢觀之高氏近理但執濤塗在夏及江黃伐陳在秋此又可疑者也若齊與諸侯及江黃伐之書法自當言諸侯及江人黃人伐陳此又不可知者若如杜氏說八國皆伐楚者何為獨使魯也哉但孔氏程子諸家皆從杜氏故兩存之耳五年或問曰公及齊宋陳衛鄭許曹㑹王世子于首止諸侯盟于首止張氏諸儒謂再稱首止美之大者然乎曰不然也㑹王世子在夏又與世子為㑹盟諸侯在秋又諸侯自為盟㑹盟既異而又有二三月之差故不得不再言其地乃書法當然何大美之有夫桓公知戴世子之為義而不知要君之非義先儒知桓公之有功於王而不知假仁之非義政孟子所謂久假不歸惡知其非有者也吾何以知其假也古之真有者躬自厚而薄責於人桓公內嬖冢嗣不立身死而五公子作亂其所以正王之冢適者果自身而推之哉聖人安得而虛美之昔漢高帝愛趙王如意欲易太子張良造謀使四皓輔太子以朝朱子論之曰良之為此不惟不暇為高祖愛子計亦不暇為漢家社稷計矣其事正相類而首止之事殆又甚焉嗚呼權謀術數之說起大人格君心之道不復見此孔子所以惻然有隱而書歟八年或問曰禘于太廟用致夫人先儒之說多矣子獨有取於趙氏何邪曰用致夫人左氏謂哀姜東萊君舉存耕諸儒從之榖梁謂成風董子劉向范氏孫氏胡氏劉氏康侯葉氏張氏朴鄉諸儒從之公羊謂齊媵女趙氏謂時君之妻聲姜高氏又謂五世之夫人莘老又謂聲姜哀姜成風凡六說獨公羊之說其謬易見餘五說意略近似然魯之禘祭文王周公二位而已魯之祫則自周公伯禽以下已毁未毁之主皆祭之若僖公致仲子子氏文姜哀姜成風者必用祫祭告於羣主或特祭告於昭穆之廟今止曰禘則趙氏謂時君之妻聲姜因其至而特設禘禮以為榮觀者近理矣又惟夫人自至某而告廟可以言致如經書公至自某者三傳亦以致言也若立仲子成風之妾為正夫人與升子氏文姜哀姜於廟經當異其文如躋僖公之義不可以致言也况子氏文姜哀姜已祔於正廟仲子己别有宫而成風猶未死以此考之則聲姜之說斷不易矣曰經何以不曰夫人姜氏也曰春秋本義在於禘以致夫人而不在於聲姜之氏姓也况失禮在僖公而不在聲姜而書姜氏則不成文乎豫於本義已言之矣曰娶聲姜何以不書納幣親迎與夫人姜氏至自齊乎曰得禮則為常事而不書獨此非禮故書之也十二公夫人不書者多矣何獨疑於此哉九年或問曰伯姬卒啖氏謂內女為諸侯夫人書卒許嫁為夫人者亦然其為媵及嫁太子公子大夫則不書者然乎曰啖氏之說蓋常事耳若春秋之法得禮則雖為諸侯夫人與許嫁者有不書也失禮則雖為媵及嫁太子公子大夫悉書之故十二公之女適諸侯與許嫁而卒者多矣不皆書也莒慶來逆叔姬叔姬歸于紀皆為媵與嫁大夫者也則書之曰莘老諸儒亦謂以吾君為之服因録之者何也曰此可施之作史之常例而不可以入春秋不書常事之㫖也曰里克殺其君之子奚齊春秋殺未踰年之君四內則子般子赤外則齊舍奚齊其三書之如成君奚齊獨稱君之子故石氏謂奚齊稱子必係於其君以明國人不子之也言君而必曰其君之子以明國人不君之也國人不子而獻公獨以為子國人不君而荀息獨以為君且曰殺而不曰弒春秋以明分之不可亂也朴鄉亦取其說而子不之從何也曰奚齊非弒逆之賊也雖實庶子則固晉君之子也立雖不正則固晉人之君也使里克殺之於既立之後豈非弒其君哉今書殺其君之子則是未立之辭也且卓與奚齊皆庶孽也皆國人不君而荀息獨以為君皆國人不子而獻公獨以為子者也何獨於卓而書弒其君哉十年或問曰晉里克弒其君卓朴鄉謂卓豈有冝為君之義春秋欲著弒逆之罪故成其君臣之名者然乎曰不然也卓非弒逆之賊而大夫立之則固里克之君何俟欲著弒逆之罪而後成其為君哉卓與奚齊非有優劣也殺之者一里克也况卓為荀息所自立今欲著弒逆之罪獨成卓之為君奚齊嘗受先君之命矣反不成奚齊之為君此其故何哉吾於殺奚齊既言之矣十四年或問曰諸侯城緣陵先儒皆以詳不如城邢略不如城楚丘為義為責桓公之淺深然乎曰不然也其原二使我之也楚丘本魯邑而三傳謂之封衛緣陵非為杞而二傳謂之封杞諸儒以凡例乘之見有詳略之不同則論議蜂起矣殊不知城楚丘者魯自城也與書城中丘城郎城小榖之云同故略城邢者三國之師也不得言諸侯故詳城緣陵者諸侯也前目已見於鹹之㑹故後凡不詳不略制言之體固如此何必相較以為義哉豫於城邢既言之矣曰季姬使鄫子來朝先儒謂魯公鍾愛其女使自擇配者然乎曰億度之辭也曰何氏謂季姬許嫁於邾及與鄫子遇使鄫子謂己者何也曰此見季姬己字疑女子許嫁笄而字之文而意之者非有所據也夫女子十有五年而笄二十而嫁雖未許嫁既笄必有字之者矣不可執一而論也曰沙鹿崩不係國朴鄉謂地有不係國者如楚丘不係衛緣陵不係杞然乎曰不然也山可以不係國名山大川不以封也地不可以不係國古者無不係國之邑也愚於楚丘緣陵既言之矣此得以略之十五年或問曰晉侯及秦伯戰于韓獲晉侯先儒謂不書以歸免秦伯者然乎曰不然也高氏曰不書以晉侯夷吾歸者以其即復國也十八年或問曰宋曹衛邾伐齊左氏謂納孝公先儒皆緣此立論子獨兩存其說何邪曰若納孝公經當書曰宋公曹伯衛人邾人伐齊納公子昭如莊九年魯納子糾之法或書曰宋公曹伯衛人邾人伐齊師救齊昭入于齊如莊六年魯齊宋陳蔡伐衛王人救衛衛侯朔入于衛之法今經但曰四國伐齊而不見納孝公事迹則但當據經議其伐喪之罪與其圗伯之迹及桓公伯業之淺深耳何得因傳廢經而為傳義哉且宋納孝公則二十三年齊侯何得伐宋圍緡乎然齊桓八月始葬必其內亂外伐而致緩者也故亦不敢盡廢傳文姑並存之而以經為主焉曰劉氏謂不書納公子昭者昭非正不與納者何邪曰使宋納不正之昭正當書以懲之如朔入于衛者可也何得削之而使人不知其故哉凡經之所書皆不與者也如一切削之則無春秋矣曰邢人狄人伐衛朴鄉謂狄使書人與荆人徐人江人黃人皆著其與中國接者何也曰非此之謂也春秋不可書邢狄伐衛也則稱邢人矣邢既稱人春秋又不可書邢人狄伐衛也則稱狄人矣然則狄稱人者便文也非著其接中國也且二十一年狄侵衛何不人之以著其接中國哉二十年或問曰西宫災董子劉向之言何如曰存耕得之矣其言曰仲舒曰僖公立齊媵為夫人而天災西宫劉向曰僖公立妾母為夫人入宗廟故天災閔宫仲舒則牽制於公羊齊媵先至之說向則以用致夫人而為之附㑹者也二十一年或問曰大旱莘老謂不雨者旱不為災大雩者旱未為災天旱者旱為災也然乎曰魯史記事有詳略有輕重又非一人之手故不同耳其實不雨即旱旱即不雨也安有自某月不雨至於某月而不為災之理乎又安有旱未為災而先雩之理乎此不待辨而易見者也曰宋楚陳蔡鄭許㑹于盂執宋公以伐宋先儒皆謂楚執之子獨取陳嶽氏之說何邪曰先儒之論承左氏公羊之弊也陳氏之說本於經者也經不言楚先儒求之而不得故有分惡諸侯之說豈知春秋直書其事而罪惡自見之㫖哉若以為楚子造謀而諸侯從之則可也何則當時楚强而詐諸侯衰而愚惟楚令之從而不知其不可者也故楚人來獻捷是其驗矣觀下文公㑹諸侯釋宋公益知諸侯之與謀矣故諸侯有從命之罪而楚有造謀之惡若以諸侯不知而楚自為之聖人以其不助宋伐楚而分其惡於諸侯則誣聖人甚矣二十三年或問曰齊侯伐宋圍緡先儒多責孝公背立已之恩然乎曰此左氏之辭於經則無所考也二十四年或問曰晉侯夷吾卒經在二十四年冬傳云二十三年九月杜氏徐邈之徒皆謂文公定位而後告喪春秋從赴而書然乎曰不然也左氏謂諸侯國史擇焉不精考焉不詳而遽附於二十三年之間又多為說以附㑹之則既誤矣後世求之不得遂指經以為從赴夫夷吾卒晉人立懷公是時非有內亂外伐安得不告喪而預待文公之至而後告乎借使文公入而後告喪必曰先君某以某年某月某日卒於其魯史必曰某年某月某日晉侯夷吾卒必不於來赴之日書曰晉侯夷吾卒此人情事理之常而杜徐之徒信傳疑經強為此說以求經傳之必通而不知其反誣經而惑世也諸家為說此類甚多不暇悉辨二十五年或問曰宋蕩伯姬來逆婦劉氏謂伯姬之嫁不見於經為內交不敵則不書於策今見於經為公主大夫之昏為卑朝廷而慢宗廟者然乎曰不然也伯姬嫁蕩氏事正以其常事不書也若諸侯大夫不敵而違禮則春秋當書之以示戒今反謂不敵而不書則與劉氏前所謂常事不書者自相伐矣况經書蕩伯姬逆婦本責以姑逆婦而失親迎之禮而非公主大夫之昏而書也使當時公主大夫以嫁之亦非劉氏可得而知也曰楚人圍陳納頓子于頓先儒皆謂一事子獨離而二之何也曰謂之一事者本於公羊榖梁而成於杜氏先儒又從而演之故其說牢不可解獨胡氏得其㫖而辨之甚明愚既録諸本義之間矣請因其說而詳焉大凡公榖不見國史以意求之而不知其義故其說多鑿左氏嘗見國史故其說有據獨其自為說則往往附㑹而不可信耳今左氏謂令尹子玉追秦師弗及遂圍陳納頓子于頓雖無所發明蓋與經不相背也杜氏乃自為其事曰頓迫於陳而出奔楚故楚圍陳以納頓子不知杜氏何所據而為此言邪蓋億度之辭耳先儒解經據經觀理可也而捨經以求傳甚則又捨傳而求注則其事愈紊而其義愈乖矣夫陳一國也頓亦一國也頓既非陳屬邑楚人納頓子于頓可也何必圍陳哉且陳之見迫於楚久矣楚納頓子陳人曷敢與爭必待圍陳然後納之乎不特杜氏無所據而求之事理又有不通者也况公羊謂不言遂為兩之榖梁又謂納頓子者陳也其說固陋尤不可宗吾故斷然以為胡氏之得其㫖也二十六年或問曰楚人滅夔以夔子歸先儒以楚夔不名為義何也曰以楚不名為義者據衛侯燬滅邢也彼或知燬為衍文則自無此論矣以夔子不名為義者先儒不一其說趙氏謂時未與魯通莫得知之爾孫氏謂略夷狄劉氏又謂黜楚而伸夔夫楚滅夔已赴於魯矣不可謂未與魯通也齊滅赤狄潞氏以潞子嬰兒歸潞子既名不可謂略夷狄也楚滅同姓其罪顯矣夔不死社稷而與楚歸亦不為無罪也使夔而縮春秋伸夔亦不在不名荆敗蔡師以蔡侯獻舞歸蔡侯無罪也而卒以名數者皆所不通則吾所謂史有詳略與春秋脫之者近之在來者擇焉二十七年或問曰公㑹諸侯盟于宋先儒謂魯欲解宋圍故此盟為僖之功何也曰公榖注有解宋圍之說先儒不察遂以為功耳葉氏之說甚明則既附於本義矣而杜氏康侯亦曰公與楚結好故往㑹盟其地以宋者宋方見圍無嫌於與盟公之罪亦著矣獻可亦曰案左氏二十八年楚子使子玉去宋又子玉曰君復衛侯而封曹臣亦釋宋之圍以此言之宋圍不解也蓋公不救宋而往㑹從楚之諸侯為盟於宋故明書以示義則其說愈明矣今以經文觀之如釋宋圍經當書曰公㑹諸侯盟于宋釋宋圍如書公㑹諸侯盟于薄釋宋公之法今經但曰盟于宋則非解宋圍審矣曰張氏謂經曰㑹諸侯不曰㑹楚使公從夷狄之罪必待考而後見者何也曰諸侯親者也楚則大夫也經曰㑹諸侯則楚在其中矣何必復生義哉二十八年或問曰晉侯侵曹晉侯伐衛朴鄉謂特出晉爵而不厭其辭之繁為豫伯之辭然乎曰不然也晉侯侵曹故稱晉侯既而晉侯又伐衛故亦稱晉侯若晉使卿則書名氏使微者則書晉人此史氏不易之定法而孔子因之者也苟特出晉爵為子伯之辭則晉侯殺其世子申生而特出晉爵者亦將豫之乎且晉之侵曹伐衛將以攻楚師而覬一勝也若王者之師則安用此術哉聖人亦何所取而豫之乎其後城濮之戰亦以出齊爵晉爵為說亦其舊習之未盡除也曰公子買戍衛不卒戍刺之高氏張氏諸儒多謂懼晉以殺買者然乎曰豫於左氏既辨之矣知左氏之謬則諸儒之說不待辨也曰諸儒皆謂公子買知難而退為無罪子獨不然何歟曰買為魯之懿親知勢之不敵與義之不可而不能諫既已受命而往戍衛矣又復畏死而逃歸是進退皆無義也惡得無罪哉故惟吕氏謂買戍衛而不卒戍罪也刺之則過矣為近之而義有未盡耳豫故因其說而足之非敢自求異於衆也曰康侯之說何如曰康侯之說雖無甚抵牾然不言戍衛之罪僅可施之殺大夫之義耳曰莘老謂春秋書刺者二公子偃不書所刺之罪而公子買著不卒戍之迹為偃則當刺而買在可恕何也曰不書所刺之罪者止譏専殺大夫也書所刺之罪者兼譏不當戍衛也故不卒戍不特譏買而多譏魯此一事兼二義者也讀者特不察耳曰公朝于王所先儒皆言晉文致天子而公朝之春秋婉而成章故不見於踐土之盟而見於此然乎曰不然也三傳惑之而讀焉者不察也豫於左氏傳踐土之盟已略言之邦衡之說可考也况此不言諸侯而但言公朝於王所其事又益明矣今以事理觀之晉文方假尊周之名以令天下惡有呼天王曰王來吾將朝矣豈足以服諸侯哉曰然則晉文何以謂之譎也曰晉文之為固有譎者矣如侵曹伐衛執曹伯以致楚之類是也而非召王之以下闕文曰杞伯姬來先儒謂為魯莒釋怨然乎曰經不言其故而傳亦無考億辭也三十年或問曰衛殺其大夫元咺及公子瑕先儒謂公子瑕未聞有罪而殺之元咺立以為君故衛侯忌而殺之也然不與衛剽同者是瑕能守節不為國人之所惡也故經以公子冠瑕而稱及然乎曰不然也為此說者惑於左氏云元咺歸立公子瑕之一語也劉氏固己辨其妄矣使公子瑕為元咺所立而不辭惡得為無罪哉惡得為守節哉其曰不為國人之所惡亦意之之辭耳瑕苟自立則既三年矣使其仁如堯舜孔子亦將正名其僣竊之號安得以不為國人所惡而去其號特冠以公子哉其稱及乃書法當然亦非無罪而書及也曰高氏謂經書於衛侯未歸之前若不罪衛侯者蓋以二子之禍皆晉文為之也者何也曰二子之禍固晋文之為然孔子不過據舊史先後而録之非衛侯既入而殺咺與瑕孔子特易其先後以歸晉文之罪也今觀經文事勢及左氏事跡乃衛侯殺咺與瑕而後入衛侯雖無大罪而義則未盡也曰葉氏又謂執衛侯稱人不以為伯討為定晉侯之罪復國加之名為定衛侯之罪自晉歸以復書為定元咺之罪立踰年不稱君為定瑕之罪何也曰此惑於一字褒貶之失也夫四人者固皆有罪矣然衛侯之罪輕而瑕之罪不可考讀春秋者當於事上觀之不可於一字求義也春秋執諸侯大夫者皆稱人不可謂定晉侯之罪曹伯襄無罪復國亦稱名不可謂定衛侯之罪諸侯大夫歸國者多以復書不可謂定元咺之罪瑕實不為君故稱公子不可謂定瑕之罪四人之事昭如日星然不求之大體而求之一字之間則四人之罪反得以匿矣非學春秋之法也曰衛侯鄭歸于衛翼之諸儒謂不書復歸而書歸者蓋殺咺與瑕之禍晉文為之故無惡文也莘老諸儒又謂不書復為禀命於天王與新封者同也陳洙氏又謂不書復為晉文以私憾遂執衛侯故不曰復歸以原其情也此皆以不書復歸為善辭至高氏諸儒則謂衛納玉於晉晉為之請以免衛侯夫委罪人於天子而又私釋之故不言歸自京師又不言復為不與其復也此以不書復為惡辭也至葉氏諸儒又謂衛納玉得歸故不得以京師言為天子之病至存耕諸儒則為曹伯負芻書歸自京師是加京師以奉賊之辭一有王命而歸為大順故書以易辭豈得以不言自京師為罪諸說紛紛子一切略之無乃太簡乎曰春秋命辭固有重輕有繁殺學者當先考春秋之事次觀春秋比事之意然後察乎命辭輕重繁殺之間則聖人之意庶乎可窺其一二矣若但求一字之褒貶與前後所書之凡例以立論焉吾恐舍其本而究其末緦麻之察而三年喪之不務也自晉侯伐衛屬辭比事至此凡八書而見義故衛侯鄭歸於衛乃卒事也不比事而觀王伯之盛衰君臣之相勝為春秋之大變乃拘拘於復歸與自京師一字之間宜其說之紛紛而徒足以亂春秋也夫魯史有詳略則春秋亦詳略先後事迹有不同則春秋亦不同必欲執彼以例此則反泥而不通矣今衛侯之執雖歸之京師當時或晉侯共釋之或晉侯使京師釋之則魯史書其實孔子亦據其文而録之安得自改之哉吾故曰拘拘求之一字之間者亂春秋者也三十一年或問曰取濟西田孫氏謂復侵地也濟田本魯地高氏謂嘗為鄰國所奪不識所謂鄰國者誰也曰以理推之知其為復鄰國之侵地但前事既逺不可得而考也唯以為曹田則斷不可爾曰四卜郊不從乃免牲猶三望子既取公羊劉氏三卜之說矣然高氏則謂郊不過二卜也上辛不吉則卜中辛又不吉則不卜而用季辛焉者何也曰古禮既廢後世記禮者各有所宗而是非卒難立辨然先王以義起禮而義者人心之不可泯者也故猶可以義斷其得失若二卜不吉不卜而用季辛則季辛之日能知上帝之必饗乎不能必上帝之饗而祭之則是虛文而已曰三卜而得禮則襄七年三卜郊不從乃免牲春秋何以復書也曰古先聖王之事天也誠義兼盡龜筮依人而行豈有不從者哉今三卜而不從則神不饗非類斷可知矣况魯不當郊而郊者乎然則三卜豈非非常之事乎但比之四卜五卜者為少輕耳曰魯之郊孟獻子以為祈農者然乎曰劉氏固嘗辨其妄矣劉氏曰彼見郊不過三月則以為啓蟄聞配用后稷則以為祈農事何其陋於禮也曰三望之說鄭氏有以海岱淮言之矣杜氏劉氏有以分野之星及境內山川言之矣子獨取於公羊之說何也曰望者逺望而祭之若其境內山川則不曰望矣唯魯僣用天子之郊故用天子之望若鄭杜之說乃諸侯事宜故孫氏曰據鄭杜止祭其封內况海河淮非魯封內又諸侯無祭分野星之事且魯所僣天子蓋四方之中祭其大者三耳故惟公羊之說比諸說稱長然於禮經無考亦不敢質言也曰公羊諸儒多謂中禮曰牲傷者曰牛子獨取朴鄉之說何也曰詩書禮言祭天者皆曰牛也豈皆傷者乎禮曰帝牲必在滌稷牛唯具夫以天下養而祭其祖豈以牛之傷者祭之乎又禮曰天地之牛角繭栗宗廟之牛角握則亦各有所宜爾夫天與祖對雖有尊卑之殊然主祭者之心豈有二哉吾故斷然以為非傷者也三十三年或問曰晉人及姜戎敗秦師于殽劉氏康侯張氏王氏皆謂公羊無師字為狄秦者然乎曰不然也一字褒貶之弊也夫楚秦吳越皆夷狄也春秋嘗書楚師敗績矣於時楚伐齊圍宋豈非夷狄乎而卒言師由是觀之其為狄之之道在其事而不在師之一字也愚於三傳辨之矣春秋或問卷四
