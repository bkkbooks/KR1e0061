body:
  text: 春秋或問卷五元程端學撰文公元年或問曰𦵏我君僖公先儒謂凡崩薨卒𦵏人道始終之大變不以得禮為常事而不書其或失禮而害於王法之甚者聖人則有削而不存以示義然乎曰其曰崩薨卒𦵏不以得禮為常事而不書子於隐元年益師卒三年宋公卒既言之矣其曰聖人削害王法之甚者以示義則未之辨也夫所謂削害王法之甚者以示義其晉文召王以諸侯見之謂歟此三傳之妄而先儒誤信之者也夫春秋一經皆非常之事苟聖人削害王法之甚者則將持害王法之輕且小者以示義此理之不然者也夫害王法之甚者莫如弑君其次莫如用諸侯其次莫如滅國取邑其次莫如専征伐生殺春秋皆一一書之何獨於召王諱之且後世儒者觀傳文而謂其削之也假令春秋而不有三傳則削之者不可得而知矣然則聖人預知三傳之将作而先為經以待之乎夫春秋大義炳如日星三傳且其一助耳而其間晦盲㫖意破碎文義者不可勝數學者不求之經而求之傳宜其有此説也嗚呼惜哉曰莘老又謂春秋十二公卒𦵏之見於經者十一天王使人㑹之者一僖公而已春秋之王一十三公㑹𦵏者二而臣㑹𦵏者二不㑹𦵏者九春秋一切著之用見周不君而魯不臣者然乎曰莘老既自謂春秋常事不書矣何獨於此及其説哉夫天王㑹僖公𦵏正以其不當㑹而㑹也故書之耳若㑹而得禮何書之有魯之㑹𦵏天王亦然其間或以見𦵏之遲速或以見諸侯不往而遣大夫皆有為而書若於此數之謂天王一㑹魯𦵏魯五㑹𦵏天王而已則聖人以為常事而不書者莘老不得而數矣豈不誤哉若莘老謂見魯史取其常事與非常者槩數之則可云爾已矣二年或問曰自十有二月不雨至于秋七月子既辨於僖二年之不雨而有間矣然趙氏謂不雨告廟者則每時書之不告廟則通言之然乎曰此亦榖梁憂雨不憂雨之意而變其説者也伯循生於千載之下其告廟不告廟詎能知之就如其説則一時一告廟也若一月一告廟又将月書之乎葢不通之論也曰先儒又謂書不雨至于秋七月而不曰至于秋七月不雨者葢後言不雨則是冀雨之詞而非文公之意不書八月雨見文公之無意於雨不以民事繫憂樂者然乎曰此亦因榖梁而深求其意廣符其辭者也夫經書自十二月不雨至于秋七月文從而意順乃製言之體若曰自十二月至于秋七月不雨雖亦可通但文義慳澀豈若經文得自然之妙哉况此本魯史之辭孔子因而不革者乎讀春秋者固當句句而玩之然求之太過則簡易明白之㫖失而艱深晦昧之意生眞近世之大病學者可復蹈之哉四年或問曰逆婦姜于齊孫氏諸儒謂此公逆婦姜于齊以其成禮乎齊故不言公以諱之然乎曰此榖梁之説劉氏既辨之矣曰啖氏趙氏莘老朴鄉諸儒亦謂稱婦姜為已成婦不言逆女為成禮乎齊者何也曰據經止書公如晉及晉侯盟不見成禮乎齊事迹且春秋稱婦姜者三宣元年遂以夫人婦姜至自齊成十四年僑如以夫人婦姜至自齊他如僖五年宋蕩伯姬來逆婦僖三十一年杞伯姬來求婦皆以婦言之豈皆先成禮者哉葢稱婦者有姑之辭也非以成禮而稱婦也曰然則先儒又謂不稱夫人不可為小君奉宗廟者何也曰春秋書至始稱夫人其始逆者無姑稱女有姑稱婦常法也不可以不稱夫人立論也曰趙氏謂有姑之辭自施於書至之例何也曰杞伯姬來求婦蕩伯姬來逆婦於時已可稱婦矣何待書至然後婦為有姑之辭乎曰先儒又謂往逆稱夫人國不書至為禫制未終思念娶事方逆也而已成為婦未至也而如在國中者何也曰禫制未終而思念娶事其闕已見於公子遂如齊納幣之時大凡入國書至各有其故故者非常之謂也此非常已見於逆婦姜之文矣其至無故故不書耳何必以不書至立論哉且十一公之夫人皆書至乎抑亦有不書至者乎此不待辨而其義曉然者也其曰思念娶事方逆已成其為婦未至而如在國中則是架空生義似聖人虛加之名以譏喪娶如此觧經徒使人游心荒唐之鄉而無所據守所謂不唯無益而又害之者也六年或問曰閏月不告月猶朝于廟葉氏謂閏月附月之餘日先王告朔而不告月然乎曰不然也此公榖之說也劉氏既辨之矣請即葉氏之説而申之葉氏曰此與不郊猶三望仲遂卒猶繹之辭正同愚謂不同也猶三望者僭禮也郊僭矣今不郊而猶三望可以已而不已之辭也繹雖非僭然卿卒不可以繹而猶繹亦可以已而不已之辭也今朝廟禮也此可已不已之辭矣經意若曰閏告月禮也文公始以閏而不告月猶朝謁于廟夫既朝謁於廟而不以告月失禮矣今葉氏乃曰與猶三望及猶繹同然則謂朝廟非禮可乎謂可以已而不已乎葉氏又曰玉藻謂閏月則闔門左扉立於其中故天子不以朝羣臣明堂不為正堂各於其月之堂闔其門之左扉而居之愚謂明堂之制左右前後具四時四分為三以具十二月閏既無定月自然無定處閏既非十二月之正自然闔左扉而居其所閏之處非謂獨於閏月閉口吞聲不視民事也葉氏又曰斗指兩辰之間而無是朔安得有月愚謂閏月斗雖指兩辰之間而閏月晦朔日月未嘗不合日月之合既同常月閏月之事既不可廢天子既以閏月頒之諸侯諸侯安得不以閏月告其祖廟哉此公榖葉氏泥於經不書朔而書月之一字而為此説而不知其違經之逺也曰木訥諸儒皆謂猶朝於廟為幸其不已之辭者然乎曰其意厚矣近乎愛禮存羊之意矣然非春秋之㫖也凡春秋所書皆譏也皆非常也無幸其不已之意也今即此事而觀朝廟為告月既不告月而猶朝廟非禮也雖然朝廟惡可并廢之哉此盖為不告月而及夫朝於廟之事也先儒見朝廟之不可廢也遂有幸其不已之辭豈知春秋所重者在於不告月哉愚於本義既言之矣曰東萊又謂閏月不告與四不視朔為公有疾也有疾而四不視朔是無疾而不視朔之源閏月不告是常月而不告月之端何也曰其曰閏月不告月是常月不告之端可其曰有疾而四不視朔是無疾而不視朔之源不可盖疾病之來雖聖賢不能免使實有疾雖十不告月十不視朔春秋不譏唯其無疾而閏不告朔不視也故春秋書之聖人豈強人力疾而行事哉或問曰公㑹諸侯晉大夫盟于扈莘老謂春秋大夫盟者二莊九年公及齊大夫盟于蔇及此晉大夫是也齊襄被弑而無知已討小白未入而齊方無君齊大夫來盟以紓國難晉靈尚幼不能盟晉大夫來盟以紹先君之業皆不可不假一時之權故得免焉而不名然乎曰不然也二者如可免則春秋削而不書矣凡書之者皆不免者也夫春秋正義明道豈肯計一時之功利而假人以非禮之禮非義之義哉且莘老論大夫之不名者然也若夫諸侯之不序國爵亦可曰免之乎夫蔇之盟本魯莊欲納子糾而為盟其罪在魯君扈之盟乃晉大夫擅權欲伯諸侯而為盟其罪在晉大夫苟俱免之則罪之輕重無等情之淺深無擇矣曽謂聖人肯如是乎故曰不然也曰朴鄉謂此與十五年十七年皆略而不序為莫有主是盟之辭齊桓未盛晉伯不競則雖序齊晉於諸侯之上而必書曰同盟者未純乎主伯之辭也其説何如曰尤不然也晉靈雖幼不能主盟然其大夫主諸侯之盟矣苟大夫不主諸侯之盟則遣使而㑹諸侯者誰歟既莫適為主則此盟無益也設使莫適為主人何妨列序諸侯之爵與晉大夫之名乎且十四年新城之盟又誰為主而列序宋陳衞鄭許曹之爵與晉趙盾之名乎况同盟者齊晉竊天子殷同之盟而非未純乎主伯而謂之同也夫二幽雞澤之同盟果齊未盛不競之時乎故曰尤不然也九年或問曰夫人姜氏至自齊劉氏謂出入有禮則可以致出入不以禮則不可以致此其歸寜為有禮然乎曰不然也如有禮春秋且不書矣惟其無禮故志之也夫常事不書劉氏嘗自言之矣至此則謂出入有禮是常事也豈不自戾哉曰先儒又謂其行非禮以不致見其罪夫人初歸為文公越禮故削而不書至示誅意之法矣今此書至者又以見小君之重一國之母儀而可以動揺乎出姜至是不安於魯故特書至以示防㣲杜漸之意然乎曰不然也夫春秋以書至見罪未聞以不至見罪也且不至者後世不可得而知也苟以不書見罪則書者皆無罪春秋何必作哉且小君固一國之母儀而不可動然不在書至見也夫出姜不安於魯其防㣲杜漸之意亦已見於前二年公子遂納幣與四年迎婦姜於齊之日矣此其書至特其中事爾曰然則文姜哀姜何以不致邪曰彼淫奔者何有於告廟冝魯史之不書也魯史不書孔子安得自加之哉且其罪惡已見於㑹享如師之文何必以書至見義乎曰秦人來歸成風之襚葉氏有謂死三日而斂則含襚有不及其尸者矣先王待人以情而不責人以事故有既𦵏而至含於蒲席者稱其情而為之也而左氏反謂惠公仲子賵為貶不及尸榖梁謂成風之含賵為貶不周事者皆妄也其説然乎曰不然也禮固有含於蒲席者謂其匍匐而至而弗及者也在日月之間可也豈有六年之久而始致襚子孫即吉已三年矣何謂稱其情而為之哉十年或問曰楚殺大夫冝申木訥諸儒謂冝申謀殺穆王是討弑君者而稱國以殺人書其官不曰楚人殺冝申者為穆王即楚世子商臣弑君父者也故春秋以無罪書之然乎曰不然也晉里克殺其君之子奚齊又弑其君卓然不以討賊殺之故春秋書曰晉殺其大夫里克今冝申之事左氏未可盡信也設使可信宜申不過自作亂耳未必眞有意討商臣弑君父之罪也春秋何為遽赦之哉且宜申謀弑耳春秋未嘗書楚宜申弑其君商臣也何為即書曰楚人殺宜申哉又稱國以殺與不去其官之説吾所不觧也其書曰殺其大夫者以其専殺大夫而責其君耳非以其臣之賢而不去其官也苟以其臣之賢而不去官則春秋凡書殺其大夫者皆賢大夫乎且如晉先都士縠箕鄭父左氏謂皆作亂者也何為亦書其官乎十二年或問曰子叔姬卒高氏謂未及嫁而死自十九以下皆為殤與成人之禮有差而文公卒之過於常制故譏之然乎曰不然也凡過禮者皆比事以見義今書子叔姬卒之後不見過禮事迹何可妄意之邪曰季孫行父帥師城諸及鄆杜氏孔氏謂鄆莒魯所争者城陽姑幕縣南有貟亭貟即鄆也以其逺逼外國故帥師城之張氏亦謂即鄆州須城縣也其與成四年冬城鄆之鄆異矣子獨以為即成四年之鄆者何也曰以事理考之而知三家之誤也盖春秋有東鄆有西鄆東鄆莒附庸邑非莒邑也劉氏葉氏嘗辨之矣西鄆乃魯邑也文公時魯未嘗取莒附庸鄆至成九年楚人入鄆乃莒附庸之鄆也襄十二年季孫宿亦入之昭元年魯始取之而疆鄆田耳今城諸及鄆之鄆當為西鄆故曰即成四年冬所城者也左傳成十六年晉人報季文子公待于鄆者亦西鄆也於後齊侯取鄆居昭公者亦西鄆也使今所城即莒魯所争之鄆則春秋前無取鄆之文後此成九年楚當伐魯入鄆不應伐莒入鄆襄十二年季孫宿救台不應自入魯鄆且鄆既入魯昭元年魯不應再取鄆而疆鄆田此盖三家泥於行父帥師之文遂以為即莒魯所争者耳不可不辨也十三年或問曰大室屋壞常山高氏諸儒皆為變異不可不謹天人之際然乎曰不然也理之所無而有者變異也理之所有而有者非變異也凡屋久而不修則壞此理之所有者也國君有民土則有財用非庶民者可以貧富言也文公為千乘之君而不修宗廟至使屋腐而壞論者不責夫人之不修而委之天之變異使後世人主怠於事而付之天者必斯言也十四年或問曰齊人執單伯齊人執子叔姬常山諸儒皆謂不獨罪商人也齊人不討賊俱北靣而事之致執其君母齊人均有罪焉故春秋書曰齊人執子叔姬然乎曰不然也此就人字生義者也正一字褒貶之弊也夫齊人不討商人固有罪矣然不在書人字見義也果書人字以見義則齊人執陳轅濤塗齊人執鄭詹亦可罪齊人不計賊乎豈知凡執人者史法皆書人乎十五年或問曰宋司馬華孫來盟先儒以為不稱使非君命然乎曰楚屈完來盟于師當是時亦可謂非君命乎盖當時至魯而旋為盟或史有詳略聖人不得而妄加焉爾何必以為義哉曰單伯至自齊劉氏謂賢之貴之孫氏謂無罪見執然乎曰不然也單伯書至見此事之終也單伯始則不輔魯君討商人弑逆之罪而阿順㫖意求叔姬以見執辱終則僥倖見釋而得歸何賢何貴何無罪哉曰諸侯盟于扈左氏無能為之説已見於辨疑矣先儒又謂不足序而略之與狄之而不序者何也曰此亦無能為之意而少變其辭者也夫諸侯之㑹盟罪莫重於成宋亂而取賂又莫重於逆王命而納衞朔又莫重於伐鄭而納突其他㑹盟侵伐悖理傷道難以數舉者皆列序諸侯之目焉何獨於此略之狄之哉盖求其説而不得從而強為之辭者也十八年或問曰公子遂叔孫得臣如齊先儒謂變文書介副者然乎曰此踵榖梁之弊而未能革者也夫聖人因魯史之舊辭以見是非安得變文書介副乎當時得臣雖不若遂之得權然皆卿也安得卿為介哉今以理勢推之遂有奪嫡之請欲明其非一己之謀以取齊侯之信故挾之以行耳若得臣止為介副乃常事也春秋安得而書之春秋或問卷五
