body:
  text: 春秋或問卷七元程端學撰成公元年或問曰作丘甲杜氏東萊君舉諸儒謂此甸所賦今使丘出之四倍於常然乎曰不然也劉氏嘗辨之曰丘者十六井爾甸者六十四井使丘供甸賦是加四倍之斂魯亦必不為也且經當云丘賦不當云丘甲其言既簡且明矣而莘老亦嘗辨之曰甲者惟工人能為之爾就令成公暴刻亦不能使丘皆為之則是盡魯人皆作甲也如杜預之說以為甸出甲士三人使丘出之夫一甸之地兼有四丘而使丘出甸賦丘豈能供之哉亦不能頓取於人如此暴也成公始作丘甲則是丘出一甲而甸出甲士四人往者三人而今增其一丘出一人焉故曰作丘甲也其言又詳且明矣二年或問曰齊侯使國佐如師己酉及國佐盟于袁婁張氏朴鄉謂與屈完之來初若不異然齊桓申大義而屈完情屈故曰來盟于師盟於召陵郤克挾主勢行私忿戰勝而求多於齊反為國佐以理折之而其氣餒故書曰齊侯使國佐如師言齊非有誠服之心也曰及國佐盟于袁婁言汲汲在晉齊不得已而盟也王道曲直之繩墨觀於召陵袁婁之書曉然然乎曰不然也此因康侯之說而衍之者也此執凡例以求春秋者也春秋因事命辭而義自見豈屑屑援彼方此以為義哉齊桓伐楚但欲楚受盟而已故楚遣屈完來盟于師齊桓欲其入吾地然後盟故與之盟于召陵斯春秋書曰屈完來盟于師盟于召陵郤克伐齊有進無退齊侯窮蹙使國佐求免郤克之論議未定故至於袁婁而始盟故春秋書曰齊侯使國佐如師己酉及國佐盟于袁婁齊桓之於郤克固為彼善於此然齊楚之不心服則等也據傳論之國佐有直理之言而屈完亦有方城漢水之對觀楚既盟而滅弦滅黃圍許不已亦可見矣且及之為義與而已矣安有汲汲之義此時晉方得志豈汲汲求盟哉夫不觀齊桓伐楚與郤克伐齊之事之始終曲直而瑣瑣求之一字之間此凡例褒貶之說汨人耳目雖明智之士不能免焉惜哉曰公㑹楚公子嬰齊于蜀公及楚秦宋陳魏鄭齊曹邾薛鄫人盟于蜀朴鄉謂不沒公為魯之不得已十一國稱人為晉猶主夏盟所以略之然乎曰不然也不沒公紀實是也十一國稱人亦因魯史之文也原朴鄉意蓋為魯得已而盟則為辱而沒公以諱之矣今不得己斯不沒公而不諱也晉不主夏盟則可盟楚而出大夫之名矣晉猶主夏盟斯責諸大夫之盟楚而人之矣豈春秋據事直書之㫖哉夫諸侯敗齊之後楚鄭不過侵衛而已不及乎魯也使魯能告晉而力救衛中國猶可保也成公懼楚首㑹嬰齊于蜀又與十一國之大夫盟于蜀蓋可已而不已者也豈不得已之謂哉借使不得已而盟楚則不人大夫矣今也晉猶主盟而人大夫則是譏其得已也譏其得已而又不沒公則進退皆不可也亦難矣故曰褒貶凡例不若據事直書之得也三年或問曰新宫災三日哭常山髙氏諸儒有謂宣公之主未遷者何也曰諸儒謂未遷者非有所據也特以桓僖之宫稱諡宣公之宫不稱諡而意其未遷耳夫宣公之死二十有八月成公之喪踰大祥與禫矣神主不遷於宫廟將祔之何地哉曰然則丹桓宫楹刻桓宫桷與桓宫僖宫災何以稱諡也曰丹楹在莊公二十三年刻桷在莊公二十四年去桓公也逺故不得謂之新宫而謂之桓宫桓宫僖宫災在哀公三年去桓僖又逺故不得謂之新宫而謂之桓宫今宣公入宫甫三月而災故當時謂之新宫乃人情物理之所宜稱夫何可執而反疑神主之未入宫哉曰檀弓有曰有焚其先人之室則三日哭況藏先人之神主者乎然則公榖諸儒稱有禮者不為無據而子不然之豈有據邪曰三日哭於禮雖莫考而禮記之書閒有漢儒附㑹之說反據三傳以為禮者固未可盡信也今以春秋不書常事求之則決知三日哭之為非禮也曰鄭伐許不書人不書帥師先儒皆謂略之者狄之也然乎曰不然也魯史有詳略孔子能損不能益也且鄭一年而兩伐許比事見義罪豈不顯必俟狄之而後顯乎且凡書帥師者譏大夫專兵也此既無其大夫名則自不書帥師春秋外大夫將兵者七十餘不書帥師者三而已不特史有詳略又安知非脫誤乎其夏去疾伐許亦書帥師可以不狄之乎說者曰始伐許不狄之也今再伐許故狄之耳然則四年冬鄭三伐許其罪尤夥何以反不狄之而稱鄭伯乎荆楚猾夏大為無道春秋何不狄之而書曰楚子圍宋楚子圍鄭楚子城蕭楚師侵衛伐陳楚公子嬰齊帥師伐鄭乎此皆一字褒貶之弊也善乎朴鄉之言曰春秋文十年秦伐晉成三年鄭伐許昭十二年晉伐鮮虞先儒皆曰狄之也於秦伐晉則曰晉自令狐之戰不出師者三年秦不顧義命見利而動又起此役夷狄之道也於鄭伐許則曰鄭襄背華即夷狄與楚比周鄭一歲而再伐許故狄之於晉伐鮮虞則曰楚靈不道殄滅陳蔡晉為盟主既不能救且僞㑹齊師假道鮮虞夷狄之道也是皆深於春秋者也夫事有大小辭有詳略其書人書氏書爵者詳辭也其直書國者略辭也秦晉之爭自令狐而後其事微矣故略之晉伐鮮虞亦然春秋固不可盡以闕文視之而亦豈可字字而求其義乎善乎吕本中之言曰先儒往往以不稱人者皆狄之恐未必然記事有逺近有詳略有大小不可以一槩論秦之伐晉事小而地逺故略之特罪其諸侯自相侵伐殺生自恣爾如加人而中國之則遂合於禮乎又曰事有大小則記有詳略史家常法春秋特以是垂訓後世爾所謂吾無隱乎爾也晉伐鮮虞罪在伐人之國以天子在上而諸侯放恣擅行征討也晉伐鮮虞略辭也其罪則自見矣以晉伐鮮虞為狄之則荀吳帥師何以不狄之也以此知詳略之異非褒貶所係六年或問曰立武宫葉氏謂私禱成功而立宫然乎曰服䖍亦云而孔氏譏其無驗不可從矣曰夾漈以為講武之宫者何也曰黃氏辨之曰昭十五年有事於武宫注云武公廟成公立武宫謂非廟不可也曰楚公子嬰齊帥師伐鄭先儒謂書卿帥師伐鄭無貶辭何以知其深惡楚以下書欒武子帥師救鄭而知之然乎曰夷狄猾夏今又伐鄭之喪豈不可惡直俟欒武子救鄭然後知惡楚乎且當時幸有欒武子之事也借使無之楚終不見惡乎尋先儒意謂夷狄而稱公子所以褒之也豈有大夫帥師而可褒之乎大夫帥師則楚國之權亦在大夫矣春秋至此始書楚之大夫帥師則夷狄盛而同於中國此則春秋所書之意也七年或問曰同盟于馬陵先儒皆謂同病楚然乎曰不然也諸侯固病楚然遂以同病楚釋同盟則非也同盟之說見於十六年者詳矣八年或問曰晉殺其大夫趙同趙括先儒謂同括無罪為莊姬所譖而欒郤害之故不去其官而稱國以殺者然乎曰不然也春秋有罪無罪皆曰殺其大夫蓋譏諸侯之專殺耳何關有罪無罪乎曰天子使召伯來錫公命先儒以天子為義又從左氏作賜何也曰朴鄉於此辨之甚詳其言曰春秋書天王者二十三稱王者三而稱天子者一莊元年冬王使榮叔來錫桓公命文五年王使榮叔歸含且賵王使召伯來㑹葬及此年天子使召伯來錫公命是也說者曰桓公弒君而王不能討及其死又使來錫命文公以僖公妾母成風用夫人禮而王不責反令榮叔歸含且賵又使召伯來㑹葬故皆去天以示貶焉又曰天王者制治天下而主乎法也天子者養天下而主乎恩也在詩賞善罰惡之事多稱王恩賜燕好之事多稱天子桓公篡弒之賊而來錫命則不能行王法故王去天成公之立八年矣未嘗有勤王之績而來錫命則失於私恩故稱天子愚請有以折之春秋書來錫命二王使榮叔來錫桓公命天王使毛伯來錫公命也來賜命者一賜成公命是也夫錫桓公命固不能行法錫文公命獨為得禮乎賜成公命固為失恩錫文公命獨不為失恩乎使榮叔歸成風之含賵使召伯㑹成風之葬固為非禮宰咺來歸惠公仲子之賵獨非妾母乎王不去天何也說者曰名冢宰所以貶也然則榮叔獨不可貶乎豈歸仲子之賵罪在冢宰而不在天王乎歸成風之含賵罪在天王而不在榮叔乎凡此皆抵牾而難通者也然則如何杜元凱孫明復皆以王者之通稱過矣或者傳寫之誤歟啖助吕本中之言云爾吾從之由是觀之賜與錫字相近安知非傳寫之誤哉曰衛人來媵黃氏謂宋二王後得用天子禮三國來媵天子之制前是必有不得其正故書以見正然乎曰不然也宋雖得用天子之禮不過以天子之禮祭其祖耳然其爵則公也分則臣也地不過百里安得盡用天子之禮哉且三國得媵則常事耳春秋不書常事其曰前是必有不得其正億度之辭豈足以垂教哉九年或問曰伯姬歸于宋先儒謂譏宋公不親迎也然乎曰於以下闕文經本文未見譏宋公之不親迎也於經前後則見三國來媵與季孫之致女而已故曰為是起文也十年或問曰衛侯之弟黑背帥師侵鄭先儒謂不書爵命氏族者未命也未命則匹夫爾黑背侵鄭匹夫而代諸侯之權也然乎曰朴鄉曰非也夫既命之帥師矣焉有非大夫而可以任國事哉其書弟者蓋見其私爾仁人之於弟也固親愛之然其待之過厚則亦非所以為中觀齊年之子無知僖公愛之衣服禮秩如適卒之弒諸兒者無知也衛侯之弟者子叔黑背生公孫剽孫林父寧殖出衛侯衎而立剽亦以其父有寵愛之私故得立爾然則齊年鄭語衛黑背皆以弟書者豈非其寵愛之私聞於鄰國而史䇿書之孔子因以記之乎若夫陳侯之弟黃出奔楚衛侯之弟鱄出奔晉天王殺其弟佞夫秦伯之弟針出奔晉陳侯之弟招殺世子偃師盜殺衛侯之兄縶宋公之弟辰出奔陳宋公之弟辰自陳入于蕭以叛宋公之弟自蕭來奔凡此者書之所以見其薄友愛之義爾一則已薄一則已厚聖人並書於策而兄弟之義著矣十二年或問曰晉人敗狄于交剛髙氏有謂此即白狄然乎曰不然也春秋白狄書白狄赤狄書赤狄狄書狄皆紀實吾乃捨狄之名而從白狄之稱不已過乎十四年或問曰莒子朱卒徐氏葉氏謂葬稱諡而莒行夷禮君終無諡故比之吳楚不得書葬然乎曰不然也春秋之時聘問弔赴皆以人情厚薄與國勢强弱而不以禮是時莒被楚兵潰亂離散雖赴於魯安知魯之必㑹其葬哉魯不往則史不書史不書則聖人不能加也且吳楚秦皆夷也未嘗無諡安知莒之無諡乎十五年或問曰晉侯執曹伯歸于京師朴鄉諸儒皆謂春秋執諸侯皆書人為略辭惟此執曹伯書晉侯以為伯討又引左氏負芻殺太子自立為曹伯之罪或又以僖之二十八年晉人執衛侯書歸之于京師此書歸于京師以為義子皆不取何也曰書人書侯書之不書之仲尼皆因魯史之文也晉人執衛侯固非伯討然是時曹衛黨楚晉欲攘楚故執衛侯而歸之京師雖不免於譎然猶有名焉今負芻殺太子事於經無考左氏見經獨書晉侯而附㑹其說豈可遽以書晉人為亂辭書晉侯為伯討書之為正不書之為非正哉晉侯殺其世子申生鄭伯克假于鄢亦書爵可謂伯討乎此皆信左氏之過而不察春秋之大㫖者也曰宋殺其大夫山而不氏左氏以為背其族何氏以為譖華元則固不足信矣孫氏以為大夫之未命石氏又疑其脫誰其適從哉曰大夫三命者氏再命者名史氏常行也劉氏論之矣見於隱元年公子益師卒然則孫氏為近之曰㑹吳于鍾離先儒謂吳以號舉夷之也泰伯至德實始有吳以族言之則周之伯父也其後世以號舉者以其僭稱王不能居中國之號耳其說何也曰夷之之說衆矣皆先儒口傳之熟而不察耳劉氏曰吳則其君矣未可以爵通又不可稱人故須云㑹吳以成其文也此說近之矣且夷狄之稱君臣同辭蓋略之也哀十二年書公㑹晉侯及吳子于黃池當是時吳主夏盟尤當夷之何為稱子乎其曰以僭稱王而夷之者尤非也吳雖泰伯仲雍之後以其族則伯父以其地則夷狄也且泰伯仲雍非封於吳也逃之荆蠻耳武王克商始封其曾孫周章於吳而為子固不當進蠻夷而特稱侯伯也惟循夷狄之法雖大稱子而已非以其僭稱王而遂舉號也且楚亦僭王矣春秋每書曰楚子何獨於吳而夷之十六年或問曰鄢陵之戰楚子鄭師敗績趙氏辨榖梁有謂君敗而師不敗者何也曰恐無是理也君者師之腹心也師者君之牙爪也安有腹心敗傷而爪牙不傷者乎必其陳列崩破而後及其君爾今以左氏考之有曰敗者一大楚師薄險又曰天敗楚也又曰先大夫覆師徒者君不在不榖之罪也又曰臣之卒實奔又曰側亡君師然其尚能明日復戰則無甚大敗耳豈可謂不敗乎向使君敗而師不敗則公子側何以見殺乎然則榖梁舉重之說未為無義也十七年或問曰公㑹尹子單子晉侯齊侯宋公衛侯曹伯邾人伐鄭先儒謂曹伯負芻殺君自立晉侯執之歸于京師次年曹伯歸自京師已而諸侯伐鄭曹伯遂列于㑹是王從負芻以成曹亂故是年不書王言王之不王也朴鄉曰不然也脫文爾然乎曰朴鄉正先儒之謬得之矣其曰脫文亦非也蓋春秋凡事有月者書王無月者不書王蓋王為王月耳請毋以他公之事明之成二年不書王無月也四年不書王無月也八年不書王無月也十年不書王無月也十有二年不書王無月也十有三年不書王無月也此六年者皆以無月之故而不書王何獨十有七年而脫之乎故曰先儒之謬甚矣朴鄉亦偶未之考耳不書王又見桓三年曰九月用郊劉氏以用為用人以祭者亦有所據乎曰彼見邾人執鄫子用之故以凡稱用者皆用人也殊不知邾用鄫子上言執又言鄫子故知其用為用人今但言用郊則與用致夫人大夫宗婦覿用幣與用牲用田賦用幣于社何以異哉五者不可謂用人也五者不可謂用人用郊獨可謂用人哉曰晉侯使荀罃乞師吕氏有謂以乞師為名則先王之禮意猶有存者然乎曰不然也為國禮讓固也然上之使下大之使小名分之間不可毫釐僭差也今伯主以天子之令命諸侯伐有罪乃以乞師為名非所卑屈而為此卑屈之辭豈先王之禮意哉禹伐有苖㑹羣后誓于師曰咸聽朕命奉辭伐罪𦙍侯承王命徂征告于衆曰今豫以爾有衆奉將天伐尚弼豫欽承天子威命武王誓于牧野曰今豫發惟恭行天之罰爾所弗勗其于爾躬有戮曷嘗言乞哉乞之一字在伯主且不可况天子之命而曰有先王之禮意無乃過許乎信斯言也春秋曷書哉十八年或問曰晉弒其君州蒲張氏曰弒君者欒書中行偃也厲公昵用小人殺戮無辜書偃晉之世臣以社稷為心尚可行易位之權而遽弒之二臣嘗以君事之矣故稱國以弒分其惡於衆然乎曰此非有道者之言也天下豈有弒其君而可分惡於其衆者哉湯放桀武王伐紂有桀紂之亂湯武之德者可也書偃無湯武之德厲公無桀紂之亂則是弒逆之賊而已孟子曰有伊尹之志則可無伊尹之志則篡也使其惡可分則春秋不書矣今春秋明書弒其君州蒲尚可分惡於衆哉又二臣乃世臣非貴戚之卿安可易位哉而易位與弒又不可同年而語也使二臣意主於弒而其惡可分是帥天下而為亂也故曰非有道之言曰然則何以不書二臣之名也曰吾於本義言之矣曰晉侯使士丐來聘許氏有謂公朝晉甫歸而聘使繼至晉悼之下諸侯肅矣此列國之所以睦叛國之所以服然乎曰春秋正義不謀利明道不計功求睦諸侯而害禮教春秋弗與也悼公之入當先討弒君之賊哀痛以居喪喪畢入見天子然後聘於鄰國斯為禮矣今既不然而但求所以睦諸侯則是五伯急功利之謀惡足尚哉春秋或問卷七
