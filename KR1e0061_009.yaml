body:
  text: 春秋或問卷九元程端學撰昭公元年或問曰晉趙武楚公子圍虢之會經言會而傳言盟髙氏諸儒謂不書盟者以盟先楚故沒之是時晉主會而楚主盟故也宋盟亦楚主之耳特書之者著諸侯之弭兵以為盟皆不外楚也然乎曰此信傳疑經之過也宋盟則書盟虢會則書會春秋據事直書之法也使盟果先楚春秋正當書之以見義何必沒之乎且諸侯以弭兵為名而無弭兵之實聖人安得信其虛名而遂不沒宋之盟哉曰秦針奔晉葉氏謂以景公為不能兄也故目弟康侯謂不曰公子而特稱秦伯之弟者何也曰春秋因事見義若化工之賦物而名得其真其曰不能兄故目弟不曰公子而特稱秦伯之弟皆非春秋自然之法也曰莒去疾入莒莒展輿奔吳劉氏謂莒展輿常稱子而不稱子以其不討賊失子之道也然乎曰展輿不討賊固失子之道矣謂因其失子之道而去其子之稱亦非春秋法許世子止蔡世子般親弒其父猶不去世子豈有不討賊而去其子之稱哉曰東萊謂展輿踰年而不書爵去疾不稱公子而繫之莒為不成展輿之為君許去疾假齊以討展輿也然乎曰書去疾之入而不繫之莒則人不知其為何國之人故繫之莒云爾大凡繫國者製言之體爾何足以為義哉且展輿無與聞乎弒之迹其可罪者不討賊而已齊奉去疾以逐展輿去疾既入而亦不討賊聖人安得許其假齊以討展輿哉曰朴鄉亦謂去疾長而繫莒為當立而奔齊莒人已立展輿其繫展輿以莒亦宜展輿雖已立而未踰年猶未成為君故不稱君而但曰展輿爾則聖人所書莒事為兩下爭國之辭又謂入于莒者為難辭然乎曰左氏載去疾長展輿少之事本不可信辨疑言之矣若但以繫莒為當立則無此理也夫莒子見弒於前年之十有一月展輿安得為未踰年之君乎且經明書去疾入莒入者篡辭也豈但為難辭而已哉夫展輿既立矣去疾奔齊矣安得為兩下爭國之辭哉曰然則左氏以展輿不稱君者何也曰劉氏康侯既辨之矣曰楚子卒左氏以為弒劉氏朴鄉黃氏既辨之然邦衡謂不原其賊為迹涉暗昧慮無辜之濫及故不書弒者何也曰諸侯被弒赴告鄰國豈皆以其實哉魯知其弒則書弒矣且左氏明言公子圍問王疾縊而殺之何為暗昧哉今經書卒則是蔽賊也豈理也哉學春秋者不信經而信傳又為説以蒙之經之不明不以是哉四年或問曰楚子諸侯會于申莘老諸儒曰淮夷不殊會者蓋殊會之法施於中國會夷狄也晉中國也吳夷狄也于柤于向是以殊之楚夷狄淮夷亦夷狄故不殊會然乎曰不然也柤與向諸侯大夫往會吳故春秋書諸侯會吳于向會吳于柤此則淮夷來與其會自當直敘於諸侯之下文勢當然夫復何疑而以不殊會為義乎且上書內大夫會某大夫者魯史之常法也下書大夫會吳者魯與諸侯之大夫往會吳也製言之體當如是爾然則殊會之説施之柤與向且不可通况施之申之會乎秀巖亦曰諸侯之會為吳而出故因其實而記之也申之會不為淮夷而出故序之於諸侯之下亦其宜也曰髙氏諸家謂諸侯會弒逆之賊者何也曰信左氏之弊也劉氏黃氏朴鄉既辨之矣曰楚子及諸侯伐吳執齊慶封殺之孫氏莘老君舉葉氏諸儒皆謂不言楚人殺之者不與楚討也其不與楚討者以楚靈貪虐不道殄滅陳蔡故孔子以諸侯共執為文所以與殺陳夏徴舒異也然乎曰不然也經書執齊慶封殺之者蒙上楚子伐吳之文不必再言楚人也且楚人先執而後殺其事與殺陳夏徴舒異何必比而同之哉當時諸侯唯楚命是聼執而殺之者楚子耳孔子安得變亂其實使若諸侯殺之哉曰劉氏諸儒以為分善於諸侯者何也曰此舉未嘗有善也使楚子灼知弒賊之當討而討之猶可以言善原楚子之情不過伐吳而慶封者吳之所封故殺之所謂仗義以行私者也惡得謂之善哉曰葉氏諸儒謂為齊討者何也曰楚之憤吳久矣一旦得志則報怨而已何有為齊討哉曰取鄫劉氏謂取附庸之辭莒已滅之為附庸乎莒也然乎曰不然也外凡書取國者皆取也謂存其社稷但使其君屬已而已內凡書取國者皆滅也諱惡也襄六年經明書曰莒人滅鄫則是夷其社稷而廢其君矣安得復使之為附庸乎劉氏見莒前既滅鄫今魯復取之故疑其附庸乎莒今魯復取而附庸之殊不知魯凡言取者皆滅也但鄫之復國不可得而考耳然以書法觀之必非附庸乎莒而今亦必非附庸乎魯也五年或問曰楚殺其大夫屈申劉氏謂屈申君弒不討國亂不去北面事讎為足以殺其身然乎曰楚麋非殺劉氏既辨之矣今之云云偶自相戾耳六年或問曰宋華合比出奔衛傳者多矣子皆略之何也曰傳者雖多不過據左氏寺人栁以立義而於經了不相干寺人栁之事吾不得辨其是非然傳者據之以立義則吾知其非也故略之也七年或問曰暨齊平趙氏謂齊取賂于燕見利忘義故以齊求平為辭然乎曰此惑於左氏杜氏之弊也孔子修春秋據事直書而義自見未嘗反其説以見義也至其門人陸氏亦云據實言之乃是齊及魯平趙氏每辨三傳之非而其言若此則三傳之惑人也尚矣八年或問曰陳侯之弟招殺陳世子偃師孫氏諸儒謂親之以見其惡然乎曰此榖梁之説愚既辨之矣曰常山諸儒以為招欲取國不特骨肉相殘然乎曰當時事迹不可盡考或其謀篡或為公子留殺偃師亦未可知然楚執干徴師而留即奔鄭則左氏之言可信而招為留殺之也曰邦衡謂再舉陳者以明陳之存亡繫於世子殺世子而陳之亡形具故繫之以國然乎曰經再舉陳者製言之體當如是也單舉世子而不書陳則不明其為陳世子也夫世子者一國之本存亡繫焉夫人能知也不在再舉陳之一字而後顯也曰搜于紅劉氏諸儒皆云不書公為公不與陳君舉亦謂桓莊之狩必言公昭定之搜不言公然乎曰不然也以理勢觀之謂之三家之志三家之兵則可謂之公不與焉則不可魯自昭五年舍中軍三家四分公室而公無民昭公定公凡五搜皆三家之兵可知矣然當時昭公猶擁虛器未應舍公而自為搜也然桓莊之狩皆稱公者公志也昭定之搜不稱公者非公志也論其書法不無微意耳若曰公不與而不書公則求之過也何以明其為三家之志也昭十一年夫人薨而搜于比蒲於時昭公奚暇乎搜而儼然大搜知其為三家之志矣何以明其搜之必有公也定十四年大搜于比蒲經亦不書公而其下書曰邾子來會公知其公之與搜也張氏亦曰搜而邾子來會則公親搜矣而不書公以軍政不屬公而專於三家則季孫孟孫氏之所為也然愚又以大閲之類舉不書公較之則亦文法有如此者未可盡以非公之志而不書公也讀春秋者不以辭害義斯盡善矣曰陳人殺其大夫公子過孫氏謂此公子招殺過而言陳人者不與公子招殺之故以陳人自討為文也然乎曰不然也使聖人不與公子招殺之也正當書招以見其罪肯為陳人自討之文以匿招之罪乎曰髙氏謂其不書招殺過者過亦有罪故稱人以殺者何也曰過固有罪矣使昭獨殺之聖人因過之有罪而移招之罪於衆人亦無是理也曰東萊又謂過為招所殺而不以兩下之辭書為過立公子留而得罪於國人故國人共殺之者何也曰招果自殺過經必以兩下之辭書之矣苟國人惡過立公子留而殺之則過乃篡逆之黨經亦不書殺其大夫矣凡經書殺其大夫者皆譏其以諸侯而專殺之也意者公子招與國之大夫懼楚之討而共殺過以覬免故經書陳人殺其大夫公子過左氏得其意僅舉公子招之殺過而不言衆大夫爾故愚於左氏不敢不取而又不敢盡信者此也然於他書無考其實惡得而質言之哉曰楚師滅陳執陳公子招放之于越殺孔奐葉氏謂楚子也曷為謂之師不正其伯討則是其為師焉而已者然乎曰不然也滅陳稱師者見其用大衆也非不正其伯討而改子為師也孔子未嘗亂史之實也曰杜氏謂奐為招之黨者何也曰張氏嘗辨之矣其言曰奐為招黨他無所見蓋杜氏億料之辭耳曰葬陳哀公先儒皆謂楚人葬之經不書楚為不與楚葬之然乎曰謂楚人葬之者是也謂不與楚葬之者非也不書楚人葬陳哀公者黎氏謂與執陳公子招放之於越殺陳孔奐葬陳哀公皆蒙上楚師滅陳之文其言約其旨明矣既見之本義矣不煩多説也曰春秋凡言葬諸侯者莫非魯往會葬今經書葬陳哀公矣子何以知其非魯之會葬也曰楚方滅陳而據陳矣魯畏楚者也安敢會陳侯之葬哉且陳已滅必不赴諸侯以葬期魯之不會無足疑者十年或問曰季孫意如叔弓仲孫貜帥師伐莒劉氏謂舍中軍制也僭三軍利也然乎曰不然也夫舍中軍左氏備矣舍中軍則四分公室季氏擇二仲叔各據其一僭魯之民自若也豈三家灼知中國之制不可三軍而舍之以復古歟曰康侯謂季孫為主將二子各率一軍為之副則雖舍中軍而三軍舊額固在信乎秀巖嘗曰魯舍中軍之後軍制之詳不可得而知但以晉考之每軍各有將佐若三軍皆行則六卿並出亦有將佐不同出者今以三卿為三軍則誤也以傳考之四分公室季氏擇二仲孫叔孫氏各一而叔氏無與焉當此時魯卿之有軍行者意如也貜也叔孫婼也彼叔弓又安得一軍而率之哉叔弓者宣公之弟叔肸之孫胡氏似誤以為叔孫也其考之亦不詳矣十一年或問曰楚子虔誘蔡侯般殺之于申先儒皆以名楚子為貶子一切略之何也曰朴鄉論之矣朴鄉曰諸侯不生名非失國也非爭國也則不名而楚子虔衛侯燬名此學者所以深求其説而不得也或曰衛侯使禮至仕邢既而伐之禮至從國子巡城披而殺之於外是懷詐以滅人也蔡般弒君父而立楚靈王不能聲其罪而討乃包藏禍心甘言重幣以誘而殺之遂滅其國此二者皆聖人之所甚惡也是以特名之為此説亦近似矣愚嘗思之竊謂聖人之作春秋不以名字為褒貶也諸侯不生名卒則名失國則名爭國則名見滅則名皆所以别也初非有褒貶於其間也後世之儒以名字為褒貶而後聖人之意愈不可見矣自其以名字為褒貶也名於質之經而不合則必曲為之説以通之故治春秋者多失之鑿且如衛侯燬滅邢漢儒有滅同姓之説然以經考之則諸侯之滅同姓者多矣何以皆不名而獨名衛侯邪至於楚子虔則滅同姓之名又不通矣謂其誘而殺之故名之邪則楚子之誘戎蠻子亦誘之也又何以不名説者又曰以夷狄誘夷狄猶可也以夷狄誘中國不可也此言近矣然觀聖人所書以誘稱之固所以著楚子之罪矣又豈以中國夷狄而有異乎然則衛侯燬楚子虔之所以名皆衍字爾先儒或謂衛侯燬滅邢之下有衛侯燬卒恐因此而訛遂以滅邢之上亦加燬字此言是也愚謂楚子虔亦恐後儒於蔡侯般之上見其不應名般而不名虔故加一虔字不知蔡侯般之所以名非以罪般也此與胡子髠沈子逞徐子章羽沈子嘉胡子豹蔡世子有潞子嬰兒同一義爾曰季孫意如會晉齊宋衛鄭曹把之大夫于厥憖先儒皆謂謀救蔡而子違之何邪曰謂謀救蔡者左氏之説葉氏辨之矣今以經文考之不見救蔡之文以事迹觀之一會之後楚自滅蔡葉氏所謂適在救蔡之中故傳意之者近之矣曰楚師滅蔡執世子有以歸用之劉氏謂君存稱世子君沒稱子某君既沒而稱世子者正疑乎不正君子與之繼世焉春秋之設辭也非其人之謂也盡其道之謂也父之仇不與共天下則有為之者盡於世子矣其説然乎曰不然也春秋者據事直書者也非君子與之繼世而為此設辭也人有弒其父者可謂不子矣而春秋書楚世子商人蔡世子般然則稱世子者君子果與其繼世乎知弒父之賊復稱世子則知盡世子之道者不以世子見義也孫氏曰有當稱子而言世子者有未立也案四月丁巳楚虔又殺蔡侯般楚棄疾圍蔡十有一月丁酉楚師滅蔡執蔡世子有以歸用之有窮迫危懼以至於死此其未立可知也康侯胡氏亦用孫氏以為説豫既附於公羊之辨矣十二年或問曰晉伐鮮虞蘇氏謂特書晉為深罪晉楚滅陳蔡而晉不救也常山謂晉懷利尚詐夷狄之道故書晉以狄之者何也曰謂懷利尚詐者左氏之説謂狄之者榖梁之論而誤信之者也楚滅陳蔡而晉不救固可罪也然豈在單舉晉以為貶哉居仁曰為春秋者以為書州書國書人及書帥師者姓名為褒貶輕重故以晉伐鮮虞不書人與師為狄之也以理考之則恐未然夫事有小大則記有詳略史家常法春秋特因是以垂訓後世爾所謂吾無隱乎爾也晉伐鮮虞罪在伐人之國以天子在上而諸侯放恣擅行誅討也其事則微故書亦略晉伐鮮虞略辭也其罪則自見矣故書楚書吳皆略之之辭爾以為逺者有不可得而詳也事之小者亦然皆非所以為褒貶輕重也十五年晉荀吳帥師伐鮮虞如以晉伐鮮虞為狄之則荀吳帥師伐鮮虞何以不狄之也以此知詳略之異非褒貶輕重所繫無疑也其言可以破千古之謬矣然愚謂居仁謂逺者有不可得而詳者是也以小事而略之者非也若以事小而略之則荀吳帥師伐鮮虞事亦小也何為不小之哉十三年或問曰楚公子比自晉歸于楚弒其君虔于乾溪孫氏髙氏諸儒皆謂先言歸者明比不與謀後言弒者正比之罪何也曰此言左氏謂觀從以蔡公之命召子干子晳及郊而告之情強與之盟之事與公羊歸無惡榖梁非弒之論而為此言也左傳之事其信否未可知公榖歸無惡與不弒之論則斷不可取今據經求意但曰公子比自晉歸于楚而遂弒其君曷嘗有先言歸以明比不與謀之意哉曰劉氏亦謂言歸為易者何也曰此亦習於三傳之説而不自覺者也劉氏作權衡以辨三傳之非明炳幾微而獨此昧焉知邪説之惑人也深矣曰髙氏又謂此非親弒加之罪者何也曰此亦信公榖之説云爾大凡弒君者豈必手投刃哉或使弒之或脅殺之皆謂之弒故趙穿弒君而經書趙盾者盾使之也楚靈自經而經書比弒者比脅之也安可謂比非親弒加之弒哉曰平丘盟葉氏諸儒謂猶幸有此然乎曰不然也平丘之會據經而觀強楚自若諸侯日離魯君不盟大夫見執又據左氏則叔向矜其甲兵欲懼諸侯爾何必幸有此哉曰劉氏葉氏諸儒謂一地再言為復陳蔡而善是盟然乎曰此因榖梁之説而演之者也愚既辨之矣曰莘老諸儒謂公可以與盟畏楚之強逃歸不盟然乎曰詳味經文及考左氏本晉不許魯非魯不許晉也且魯既與會矣不應懼楚而復不盟也使懼楚則不會矣既會而不盟何益於懼楚哉曰康侯抑崇之言如何曰康侯固不失理然多就傳生義抑崇本諸孫氏愚既取孫氏之説矣曰蔡侯廬歸于蔡陳侯吳歸于陳孫氏謂孔子以陳蔡自歸為文為抑強夷存中國者然乎曰聖人固欲存中國抑強夷也然不在以陳蔡自歸為文以見義也凡諸侯大夫出奔而倚大國以歸者春秋皆書某自某國以見諸侯大夫有所挾大國有所奉之罪使楚滅而今復封之正當直書其事以見夷狄封中國之罪何得反改曰歸以沒其實又使後世測度非歸以見抑強夷存中國之義乎曰高氏謂雖制在夷狄而平丘之會為有功故聖人特以陳蔡自歸為文者然乎曰平丘之會楚未必懼且陳蔡歸國春秋雖書在會平丘之後然陳蔡復國實在會平丘之前不可以平丘之會為功也使平丘之會果有功也亦不在自歸為文以見義曰葉氏又謂陳蔡歸國皆請於王者然乎曰請於王經與三傳外史皆無所考意之而已十五年或問曰有事于武宫籥入叔弓卒去樂卒事孫氏謂有事於武宫非志也由籥入叔弓卒去樂卒事故志之然乎曰不然也有事于武宫雖為去樂卒事而起然武宫之不當祭亦因有以見義故春秋一事兼數義者有之武宫者豈其所當有事者乎孫氏之説施之宣八年有事于大廟者可也曰常山引栁莊寢疾之事以明不當告因其告至於不得已而去樂卒事皆由告故也者然乎曰不當告之説施之卿卒在外者可也愚於本義既言之矣其曰至於不得已而去樂卒事者亦非也夫卿卒在外不以告若卿卒於涖事豈可籥入而去樂以卒事哉愚於本義既引孫氏説明之矣誤入不得已而去樂卒事則是春秋然譏其不當告而不譏其去樂卒事也今案左氏本叔弓涖事而卒則是不待告而知者也既不告而自知至於不得已而去樂卒事則是得指之宜春秋不在書者也今則何以書乎曰莘老孫氏又謂去樂卒事合禮矣春秋言之者為有事於武宫之廢廟春秋因變禮而推言之然乎曰如其説則春秋但書有事于武宫足矣何必贅此下文乎曰朴鄉諸儒亦謂去樂卒事其可也常事不書此記禮之變而書者然乎曰禮有常有變變而得其正可不謂禮乎不可不謂之禮則亦常事而已春秋何必書哉夫所謂非常者謂非禮也夫朴鄉諸儒將以禮之變者為非禮乎曰髙氏謂禮大夫當祭聞君之喪攝主而往君聞臣喪何獨不然者然乎曰君臣之尊卑禮之隆殺等級猶天之於地也臣聞君之喪而攝主以往君聞臣之喪而亦攝主以往則尊卑倒懸紀綱不立矣此不辨而可知者也十七年或問曰有星孛于大辰左氏以為宋齊陳鄭災先儒以大辰為心心為明堂前星太子後星庶子孛星加心象天子適庶將分爭也後五年景王崩王室亂劉子單子立王猛尹氏召伯立子朝至哀十三年有星孛于東方不加宿為吳人僭亂日敝於兵戾氣所感固將壅吳而降之罰故氛氣所指在東方假手越人吳國遂滅許氏則又兼二家之説子一切違之何也曰日星霜露之變由乎人事之感而天應之天應之而人復被其災所謂有感必有應所應復為感者也然必指某事以實之則瑣碎支離而穿鑿附會此漢儒之通弊不可復述也曰楚人及吳戰于長岸邦衡謂吳楚不言敗而言戰為惡夷狄交攻故不别其勝負而一目之然乎曰不然也夷狄交攻固可惡也然書其勝負復何傷哉此蓋勝負敵耳不煩多説也十九年或問曰宋公伐邾高氏謂天下無伯而宋元正之是以春秋録而進之然乎曰不然也凡伐人之國者皆無正也特有彼善於此耳姑考左氏宋本為向戍之女而親伐國尤不當進之也曰先儒謂宋為聲罪致討之兵歸鄅之俘故書伐邾而釋其取邑之罪者何也曰伐人之國取人之邑諸侯不臣而肆強陵弱罪之大者也以其聲罪歸俘而遂釋其取邑則是因小惠而蓋大罪聖人宜不如是况取邑之事未足信邪曰葬許悼公先儒皆謂賊不討不書葬然乎曰此公榖之説也石氏曰榖梁傳例弒君而賊不討者不書葬其書葬皆意有所見也如蔡景以為不忍使失民於其子陳靈則以為外之討賊蔡昭則以盜名不見於經許悼則以為不使止為殺父此傳例也通於經則不可黎氏曰被弒之君多不書葬者或彼國方有事變雖葬我畏其亂無使往會之豈有賊未討則不書葬邪此二傳妄為之説也且蔡世子般弒其君固何般未討而固亦書葬邪善觀許悼弒而書葬者非他蓋變生於內而不及國又般止欲沒其弒逆之迹具禮葬其父我有使往故書葬焉歐陽公止為弒得其旨矣二十年或問曰曹公孫會自鄸出奔宋劉氏謂言自鄸待放者然乎曰不然也經書自鄸奔宋紀實事爾蓋與大凡出奔者同一義也待放之説不亦逺於經乎且華亥自南里出奔楚宋公之弟辰自蕭來奔經嘗先書其叛與入矣其書自某出奔則文同也亦可以待放言乎曰邦衡抑崇少藴諸家皆謂會據邑以叛未及發而奔者何也曰此信公羊之説求之過而為之辭者也知公羊之誤則先儒之説有不待辨曰盜殺衛侯之兄縶任氏諸儒謂齊豹非卿故書盜然乎曰其稱齊豹本乎左氏耳左氏稱豹為司冦而縶奪之則齊豹為大夫矣亦當書名安得書盜乎二十二年或問曰劉子單子以王猛居于皇邦衡曰出而言居者如成君也朴鄉謂居于皇為土地固其所有者何也曰二子以居字為重故為此言以愚觀之不過王猛居于皇爾義有所歸不在居之一字也曰劉子單子以王猛入于王城先儒謂劉單挾天子以令諸侯而專國柄書而未足故再書於䇿然乎曰不然也此信公榖之弊也經書王室亂故劉單以王猛居于皇又以王入于王城耳其曰王猛則其所輔者正矣夫造亂者景王也作亂者王子朝與尹氏也安得以挾天子令諸侯者目之乎果如其言則劉單坐待王子朝之殺王猛也而可乎夫是以為挾天子令諸侯則尹子立子朝反得為正乎其所以再書者朴鄉所謂二事者是也夫復何疑二十四年或問婼至自晉劉氏之説何如曰吕氏論之矣其言曰原父以三傳不言叔孫而公羊言叔孫似是聖人本意因遂以為可褒而褒之世儒説經之鑿舉皆類此原父能知他人之鑿而不自知其鑿也惜哉二十五年或問鸜鵒來巢高氏謂鸜鵒所在有之魯政出於三家昭公孤立於朝故魯之公室荒涼寂靜將為丘墟而鸜鵒穴處之禽來巢然乎曰經不言來巢于朝而來巢於國耳况經書曰有則前此所無孫氏所謂魯無鸜鵒故言有者是也且鸜鵒不踰濟安得所在有之乎曰宋公卒于曲棘先儒謂不匿其私親之惡故雖卒於封內而特書其地以别之然乎曰諸侯不為王事而卒於他所者皆書之故雖其封內之邑亦書之如晉侯卒于扈及此曲棘之類是也謂之譏其非所可也謂之不匿私親之惡而特書其地以别之不可也曰齊侯取鄆先儒謂經書次于陽州見公未絶於魯而季氏為不臣及書取鄆見公已絶於魯而逐於季氏為不君然乎曰不然也臣而逐君豈問已絶未絶哉二十六年或問公至自齊居于鄆蘇氏諸儒謂凡公行而告廟則書至在外雖不告而書至為存公又謂稱居于鄆為存一國之防然乎曰不然也此即榖梁不外公之意而少變其辭者也書至自齊居于鄆皆記實事耳聖人雖未嘗不存公而此辭未可以存公解也其曰公至自齊者始公孫於齊次於齊境自齊境至于魯鄆豈非至自齊乎雖不告廟獨不可云至自齊乎其曰居于鄆又以見公之失其所也愚於本義既言之矣曰天王入於成周莘老諸儒謂成周即京師然乎曰不然也成周與王城杜氏得之東萊言之亦詳其言曰河南即郟鄏周武王遷九鼎周公營以為都是為王城洛陽周公營下都以遷殷頑民是為成周洛誥所謂我又卜瀍水東亦惟洛食者也平王東遷定都於王城王子朝之亂其黨多在王城敬王畏之徙都成周邦衡亦曰宣十六年成周宣榭火成周若實王都當云京師宣榭火二十二年書王猛入于王城此書天王入于成周二者若俱京師則何必異名焉周之東都非王者舊居之地無堅城可扞衛故三十二年諸侯遣大夫共城之三子之説可據矣二十七年或問曰吳弒其君僚劉氏諸儒謂稱國以弒為衆弒君之辭謁餘祭夷昧不與子而與弟凡為季子也季子使而亡焉僚者長庶也即之是廢讓而毁義以成篡國人莫説故謂之衆弒君之辭又謂國宜之光故稱國以弒者吳大臣之罪春秋歸罪大臣也然乎曰不然也此執襄二十九年公羊之説與今左氏之言求其必合於經之弊也豫於公羊左氏既言之矣請復申之今據公羊而論使僚不當立光當辨於即位之時今僚立而光臣之矣一旦弒之則是弒君也春秋書曰吳弒其君僚所以正名也如以衆不悅其立匿其弒君之賊而書衆弒其君則是許其弒也不可以訓矣其曰歸罪大臣而遂捨光之罪則是弒君者得以匿其名而立不正者蒙弒君之罪真偽不辨輕重失倫亦非所以垂教也先儒必欲合傳於經也故牽挽附會以成其説而不顧理之不可通讀春秋者能考襄二十九年公羊之謬則於此自知經傳之不可合矣二十九年或問曰公自乾侯居于鄆任氏謂公孫于齊次于陽州而至以齊今公如晉次于乾侯而不至以晉者所以罪晉也然乎曰不然也此以凡例求其必同而不知其鑿者也師氏有言曰公至自齊齊侯見公也公至自乾侯晉侯不見公也義雖未盡而意近之矣曰齊侯使髙張來唁公許氏謂高張不地以公居鄆猶以晉志故稱來邦衡亦謂來從國內辭者不與季氏得有其國也然乎曰不然也此一字褒貶之弊也前書唁公于野井不可言來也此先書公至自乾侯居于鄆矣故言來也製言之體當如是爾夫不與季氏得有其國豈在來之一字乎曰康侯引式微之詩謂以事求人而人不有其事是微君之故以身下人而人不有其身是謂微君之躬者何也曰詩言微君之故者非為君之故也非為君之故胡為乎使我在此中露乎微君之躬者非為君之躬也非為君之躬胡為乎使我在此泥中乎如此而已苟為不有其事不有其身則下句胡為乎之文不可得而通矣此非本義所關雖不辨可也三十年或問公在乾侯先儒悉謂存公者然乎曰不然也此榖梁之説諸儒從之而不求諸經旨爾春秋為一嵗之始書公在乾侯者聖人傷世變之心也一嵗之始諸侯當奉天子所頒之正朔以告於廟退而聽政而公乃失國名寄乾侯聖人傷世變之心何如也豈特存公而已直欲討逆罪返公於正而後已耳夫魯之失政原於諸侯之不有天子故大夫不有諸侯况世卿當國庸君暗弱權既下移上復失道以至壞亂而莫之救春秋歷書諸侯大夫會盟侵伐而終之以此其所以為後世戒深矣豈存公二字所能盡哉曰徐子章羽奔楚劉氏石氏諸儒皆謂書名與弦談溢三子異者三子力不勝而奔故不名徐子則既服而后奔故名然乎曰此以名字褒貶之弊也凡諸侯失地者皆名則徐子之名固當三子之不名或魯史不詳聖人不得而益爾若力不勝與既服之説則斷不可三十二年或問諸侯大夫城成周先儒謂城王都不可以不書又謂不曰城京師而曰城成周謂京師衆大之稱成周為地名與列國等者然乎曰不然也城王都者常事也以大夫而城成周豈常事哉非常不可以不書非謂城王都不可以不書也京師者春秋所謂王城者也即河南郟鄏之地武王遷九鼎周公營之以為都洛誥所謂我乃卜澗水東瀍水西者也成周者洛陽也周公營下都以遷殷之頑民是為成周洛誥所謂我又卜瀍水東者也平王東遷定都於王城杜氏謂王子朝之亂其餘黨多在王城敬王畏之徙都成周是也先儒誤以成周即京師故有衆大之稱與地名之説未足據也夫京師無定所王之所都即為京師河南郟鄏前日之京師叔孫得臣如京師晉人執曹伯歸之于京師是也成周洛陽今日之京師晉人執宋仲幾于京師是也今書成周以别其非前日之京師爾於二十六年既引先儒之説辨之矣曰吕氏謂周室衰微諸侯猶勤為先王之德澤猶有存者然乎曰當時臣逐君庶篡嫡先王之德澤盡矣今即此事而論天子不安其居而居於成周而諸侯之大夫僅一城之則春秋豈為先王德澤之存而書之哉春秋或問卷九
