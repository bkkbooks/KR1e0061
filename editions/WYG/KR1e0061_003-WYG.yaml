body:
  text: 春秋或問卷三元程端學撰莊公元年或問曰不書即位黄氏謂國亂不行禮然乎曰不然也桓公去年四月見戕於齊是月而喪歸十二月葬之矣外無諸侯伐國内無庶孽爭位姜氏之孫又在三月之後何謂國亂而不行即位之禮乎曰張氏諸儒皆謂莊公無志討賊泰然居之而孔子削其即位者何也曰使莊公不討賊而泰然即位正當筆之以見其無人心如桓宣之即位者也若史有即位之文而削之則後世何從見其義哉愚雖不能知魯史之文與孔子筆削之事然以義斷之而知其决非削之也曰單伯逆王姬杜氏曰天子卿也單采地伯爵也何也曰此杜氏不敢變左氏之過也故孫氏曰單伯於此見經之後莊十四年書齊人陳人曹人伐宋單伯會伐宋冬又㑹諸侯于郢春秋王臣而㑹在諸侯之上亦不若内臣而書會也惟内臣會諸侯則曰會某由此觀之則單伯内臣非王臣也劉氏亦曰若命魯為主單伯稱使以見王命之來乃冝矣不稱使非義也又十四年經書單伯會齊侯宋公衛侯鄭伯于郢稱單伯㑹諸侯則單伯為魯人明也猶曰叔豹會晉趙武楚屈建矣若單伯為周大夫則應書單伯齊侯會于鄄不得屬會于單伯也屬會于單伯則非周人審矣觀此二說杜氏當自絀而左氏送王姬之誤因可類推矣曰王使榮叔來錫桓公命先儒多稱去天字以示貶子獨主孫氏之說何也曰去一字以為貶非春秋意也後世穿鑿之說也夫天王聘桓者三求車者一其義同爾皆不去天何獨於此而去天哉吕朴郷亦曰春秋不書天者惟此年王使榮叔來錫公命與文五年王使榮叔歸含且賵三月王使召伯來會葬而已為先儒之說則曰桓公弑君而王不能誅又反錫之命僖公成風妾母也而王使人歸含且賵又使人㑹葬成其為夫人使嫡並妾此二事最大故去天以示貶此只在拘春秋書天王之例故有此說春秋為尊王而作也而已自貶天王何以責人乎榮叔歸含且賵與宰咺來歸仲子之賵一例爾何不去天以示貶乎以名冡宰為貶則榮叔何以不貶乎豈歸仲子之賵罪在宰咺而不在天王又豈歸成風之含賵罪在天王而不在榮叔乎此其不通也明矣二年或問曰姜氏會齊侯于禚髙氏謂是時公幼未習國事故夫人得以託國而出會齊侯然乎曰此似是而實非也姜氏之淫奔見於經傳者顯矣託國出會之説何所考乎且夫人孫于齊亦可言託國出會乎三年或問曰溺㑹齊師伐衛先儒多以抗天子之命為説何也曰抗天子之命在五年公會齊宋陳蔡伐衛之時此則於經未見其抗天子之命也曰葬桓王劉氏謂曷為或言葬或不言葬葬自内録者也公親會之則不言葬不言葬者常也公不親會則言葬者非常也葬天王大禮也曷以為常言之蓋以謂子事親臣事君之道焉先儒非之者曰或言天子不志葬又以為不言葬者常也夫事孰有大於葬天子者而可以不志乎死生始終之際人道之大變豈以是為常事而不書也二者之說孰然曰劉說是也特義有未盡耳非之者非也夫天王崩葬必書者史法之常也書葬不書葬者聖人筆削之旨也曰何也曰春秋常事不書其所書者非常之事也天王如期而葬諸侯親往會葬雖死生人道之大變而亦臣子之常事也如悉記之則是史而已非聖人筆削之㫖也削者削其常事筆者筆其非常可為後世大戒者也豈有天王如期而葬諸侯親徃會葬而可為後世大戒者乎夫書崩書葬者據經可見也桓王七年而葬則以緩為非常而書叔孫得臣葬襄王叔鞅葬景王則以諸侯不親為非常而書匡王以四月簡王以五月景王以二月而葬不及七月之制為非常而書其書崩不書葬者據經亦可見也諸侯不奔喪不會葬而朝聘會盟嘉禮自若為非常而書其不書葬者或魯侯會葬或葬期得禮耳其崩葬皆不書者則或以朝廷得禮為常事而不書或魯往㑹葬為常事而不書或不赴告魯史不書孔子無所據而不書苟以死生人道大變為非常而悉書則天王即位當書矣天王即位旣以為常事而不書則天王崩葬亦有為常事而不書者矣此劉氏常事不書者是已惜其拘於公親㑹之則不言葬公不親㑹則言葬之一義為未盡耳先儒乃非之故曰非也曰紀季以酅入于齊陸氏劉氏髙氏葉氏諸儒皆賢紀季謂其不得已而存宗社者何也曰此惑於公羊之說與未辨叔姬歸酅之義故也夫紀季之於紀侯親則兄弟義則君臣骨肉相守死生以之者也而先以邑入齊斷紀侯之右臂使不能守而去其國謂季無罪誣也子噲不得與人燕况紀季乎昔微子去殷以存宗社者以殷之天命已絶人心已去殷之宗社無託故箕子召微子出迪而微子之去亦在殷滅之後殷未滅微子不入周也况紀季以邑乎况齊為讎國乎吾故曰使後世為人臣而懐貳心者紀季而已矣先儒謂其不得已而存宗社非所以訓也曰黄氏諸儒謂紀侯使之事齊以圖存也曰於經未有考焉經之所書但曰紀季以酅入齊而已借使為兄所使為紀季者當諫之曰齊人無厭旣得酅復望紀事齊無益守死而已今不能然則紀季未有可取之實也四年或問曰紀侯大去其國先儒多賢之又以太王之事比之然乎曰未見其賢也又以太王之事比之則過矣昔鄭國介乎晉楚之間事晉則楚伐之事楚則晉伐之任一子産為政二國不敢議而况賢於子産者哉今紀侯不能修德任賢以守其國而去之故曰未見其賢也昔太王德施於民克厭天心狄人侵之三事不免遷都避難故從之者如歸市而國遂以興書曰至于太王肇基王迹比紀侯之一舉潰滅者何啻千里故曰比太王者過也常山髙氏固已辨之矣曰葉氏謂其潔身而去之雖伯姬之喪且不顧紀侯蓋自是隠者也曰大夫士仕於其國有去而隱之之道諸侯世其國者無去而隱之之道也故國君當立不立猶失其義况見在為君者乎苟欲隱而棄其妻之喪則是欲潔其身而亂大倫無一可也原其情畏齊而逃耳不必多為義也曰戴氏諸儒皆謂大非紀侯之名乃大去其國也大去者盡室逃焉也曰此公榖之說而少變者大去之云於文則支於義則窒夫春秋謹嚴書去其國可矣何必書大去哉此其文之支者也苟紀侯盡室逃焉則必葬伯姬而後去攜叔姬以偕行今棄伯姬而齊葬之棄叔姬而歸於酅此其義之室者也且去其國與失地之君奚異哉春秋失地之君皆名紀侯安得不名之故曰大者紀侯之名也而非大去之謂也五年或問曰姜氏如齊師先儒引載驅之詩以為刺襄公盛其車服疾驅於通道大都與文姜淫者然乎曰不然也朱子謂齊子云者指姜氏而言且魯道居上而下繫齊子又不曰齊侯則齊子為齊女而指姜氏也明矣今曰襄公誤也然非春秋本義置不復論曰公㑹齊宋陳蔡伐衛先儒皆為拒王命子獨不然何邪曰拒王命之罪五國不能逃矣然拒王命乃在六年正月王人救衛之後此時惡能預知王人之救而拒之哉先儒謂王人之救必天王嘗立黔牟嘗不使朔及衛者意之之辭也於經傳無考當時王命曷嘗行於諸侯哉邦衡辨此甚悉已附見於榖梁矣學者平心易氣讀之自當有見也六年或問曰齊人來歸衛俘先儒皆釋俘為寳子獨不然何邪曰俘之字訓軍所獲而己未聞又訓寳也先儒見公榖作寳左氏亦稱寳遂訓俘為寳殊不知寳為實俘為虚曰俘云者所取於衛之寳貨也故言俘則寳兼貨物言寳則寳玉而已矣故盗竊寳玉大弓不言俘曰葉氏諸儒引書序俘厥寳玉以證之又何說邪曰書序之俘亦訓取也若訓俘為寶可云寳厥寳玉乎曰張氏諸儒又謂俘者正文寳者繹辭何邪曰就書序言之寳者寳玉也俘則取其寳玉焉知書序之訓則知春秋之不可訓俘為寳矣曰杜氏又釋俘為囚者何也曰釋俘為囚則齊侯來獻戎㨗楚冝申來獻㨗者不可得而解矣果囚也當言獻不當言歸况當時四國伐衛而納朔矣有何囚乎果有囚也四國伐衛時已虜之矣不待齊來歸也稽之字訓旣不得折之事理又無據杜氏之説蓋與張葉諸論等耳七年或問曰恒星不見星隕如雨髙氏謂既夜而恒星不見則其餘皆見矣及夜中而餘星隕墜衆多如雨然乎曰不然也經言恒星不見而已我不敢知餘星之皆見也經言星隕如雨而已我不敢知恒星之不隕也曰郭綱謂恒星不見為月之霸月霸在弦望之閒辛卯月五日月未當霸而恒星隱其占霸圖將興者然乎曰經言恒星不見而已我不敢知月之霸也若月不霸而恒星自不見我豈知之朱子雖謂星亦受曰之光未聞如月之或明或霸也使果如月之霸而不見則又不足為異春秋將不書之故曰讀春秋者據經求義雖不中不逺矣曰秋大水無麥苖先儒皆謂麥苖為二物子獨信黃氏為一物者何也曰考之天時事理而信之也經書秋無麥苗秋豈有麥乎曰杜氏諸儒以秋七月為夏五月也曰天時不可改月數未嘗易先儒辨之詳矣不可復踵舊說之陋也且經但曰秋而已不言月也設使大水在八月九月即八月為六月九月為七月於時亦豈有麥乎不特無麥苖亦秀矣此考之天時者也以五榖言則禾稲之苖為首而麥次之不應先言麥而後言苖亦不應不書禾而書苖且既無麥矣又無苖矣而不見書饑此考之事理者也曰非謂麥苖同時也因無苖兼舉無麥耳曰經書大水而無麥苖則因大水所浸而一時皆無者也非因無苗而兼舉無麥如冬書大無麥禾之比也今如黄氏說則天時事理兩得之其曰麥種於秋始種為苖秋有大水故無麥苖豈不明白也哉八年或問曰師次于郎以俟陳人蔡人劉氏葉氏諸儒多謂陳蔡將過我而邀之子何以知其期共伐郕而陳蔡不至獨有取於杜氏之說也曰以下文甲午治兵及齊師圍郕而知之也盖俟陳蔡而不至遷延止次而衆心懈也故治兵陳蔡不至而恥旋師也故復約齊以圍郕若陳蔡將過而邀之則不有治兵圍郕之事而春秋亦當異其文以見意亦不直書曰次于郎以俟陳人蔡人也故莘老康侯邦衡子由貫道諸儒皆宗杜氏非予之獨取也曰安知圍郕之師非治兵振旅而歸至夏而復出師乎曰以文勢觀之而知其為即俟陳蔡之師也曰師及齊師云者蒙上文之辭也曰秋師還者見輕舉妄動暴師三時殘民黷武也故常山曰春秋書魯用師未有如是之詳者正此意也曰秋師還先儒皆謂莊公親將及其還皆不稱公為重衆者然乎曰不然也若公自將則春當書曰公次于郎夏當書曰公及齊師圍郕秋當書曰公至自伐郕盖君行師從君重于師豈得遺公而言師哉此史氏不易之定法孔子因魯史之舊以取義豈肯改其實哉謂改名見義者公榖之餘習而不察之者也讀春秋者不可以不知也九年或問曰公伐齊納子糾齊小白入于齊先儒或以子糾為兄或以小白為兄何也曰各有其說而未可以片言決也謂子糾為兄者公榖之意而孫氏胡氏劉氏邦衡莘老東萊諸儒宗之謂小白為兄者程子之說而康侯朱子張氏諸儒宗之然各無明文可考孫氏諸儒謂子糾為兄者以春秋書法有子字故也據經論理者也然朱子則謂公榖之經無子字而小白為兄闕程子意不特以公穀無子字亦以論語孔子許管仲之仁之事信之也但程子於管仲之事以大義推之而知其為兄耳非有所據也今以春秋所書齊小白入于齊與齊人取子糾殺之之文觀之則子糾為兄之說似亦有理蓋齊小白入于齊有篡位之辭齊人取子糾殺之三傳同有子字固不可以公穀前無子字為疑也至程子引薄昭之言以證小白之為兄而朱子又疑荀卿嘗謂桓公殺兄以爭國而其言固在薄昭之前則朱子雖宗程說固亦不能無疑於其間也况朱子於集註論王珪魏徴事則曰功過不以相掩今以子糾為兄而小白殺之正與太宗殺建成相類管仲之事小白正與王魏之事太宗相類豈論語特取其功而春秋則正其義如朱子所謂功過不相掩者歟是以不得不兼取程子孫氏諸儒之説以俟知者也或又曰程子不特於論語稱桓公為兄而已正與春秋之經辨之也其言曰桓公兄而子糾弟襄公死則桓公當立此以春秋知之春秋書桓公則曰齊小白言當有齊國也於子糾則止曰紏不言齊以不當有齊也不言子非嗣君也公穀并註四家皆書納糾左氏獨言子糾誤也然書齊人取子糾殺之者齊大夫嘗為魯盟于蔇既納糾以為君又殺之故書子定其罪也曰程子以大義推測小白之為兄猶可也以此論知小白之為兄則益疑矣夫春秋於子糾不書齊者蒙上文公伐齊之齊非子糾不當有齊而不書齊也於小白言齊者凡春秋所書必曰某國某名則小白書齊固其書法而非小白當有齊而書齊也且春秋直書其事而善惡自見果子也雖不盟書子也非子也雖屢盟不書子也惡有嘗與魯盟于蔇而特加子字之理哉盖春秋傳為程子未成之書非易傳成書之比冝其有未定之說亦程子所謂義理無窮之意正學者所當辨也曰及齊師戰于乾時我師敗績孫氏謂内不言敗此言敗績為羡文然乎曰不然也此惑於公穀之說而反疑經之過也夫所謂羡文者重見復出理有不通者也乾時之敗紀實事也而以公穀不經之談反疑經之羡則過矣居仁曰凡例之謬者可宗也邪十年或問曰公敗齊師于長勺先儒皆謂詐戰然乎曰不然也此左氏穀梁凡例之弊也經書敗某師者多矣豈皆詐戰者乎左氏於十一年公敗宋師于鄑嘗曰凡敵未陳者敗某師皆陳曰戰旣為之凡例矣又必撰其詐戰之事以實之今此左氏旣曰齊師伐我公將戰用曹劌之言齊三鼓魯一鼓則是皆陳而非詐戰明矣何以又書曰公敗齊師乎此左氏自相矛盾者也至穀梁則以不日為疑戰又其謬之尤者先儒鑒此亦可少變而求之春秋之本義矣而又不察而踵其弊焉可嘆也已曰公侵宋先儒皆以無名行師曰侵子獨不然何邪曰康侯胡氏曰考諸五經皆稱侵伐易謙之六五曰利用侵伐征不服也書之泰誓曰我武惟揚侵于之疆詩之皇矣曰依其在京侵自阮疆周官大司馬以九伐之法正邦國曰殘害良民則伐之負固不服則侵之若此者為無名行師可乎十二年或問紀叔姬歸于酅先儒謂紀宗廟在酅故叔姬歸奉其祀書之所以賢叔姬者何也曰禮諸侯之尊弟兄不得以屬通紀季猶不得以奉諸侯之廟况叔姬為媵妾者哉夫紀季以酅入于齊則為齊之臣旣得罪於宗廟矣叔姬不死於國破之時又以嫂而歸依於失節之叔同事仇讎之齊而謂其賢乎失其是非之心矣且紀亡已九年叔姬安在而今日往承宗廟乎亦無是理也設使紀廟在酅則有紀季在亦非叔姬所得奉也况季亦罪人乎曰然則春秋何以書其卒葬也曰叔姬卒於季葬於季卒葬非其所春秋安得不書哉曰朴郷謂春秋於紀叔姬宋共姬録之詳者賢也其說又何也曰春秋失禮之事多則書之詳失禮之事少則書之略夫文姜之事春秋書之亦詳可謂賢文姜而書之乎曰宋萬出奔陳先儒多謂陳人受宋之賂而使婦人飲之酒是與賊為黨也故特書萬出奔陳而湣公不葬以著陳人與賊為黨之罪然乎曰不然也陳受宋賂使婦人飲之酒特傳文耳未可以傳議經也如宋臣子能用賂以求萬陳能以計而送萬雖未盡討賊之道然猶有意於討賊而賊猶得以伏誅也豈不勝於不討與蔽賊者哉聖人安得一槩以不討賊之罪而不為别白也今經書曰宋萬奔陳則是宋不討賊而陳不殺賊也且湣公之不書葬或宋亂不告而魯不會史無其事聖人不得自益之也况賊不討不書葬實後世自為之例而不可為法者哉夫經書宋萬奔陳義本自明何待不書湣公之葬然後見陳人黨賊之罪其曰特書亦非邵子所謂天理自然之意矣十三年或問北杏之㑹先儒或謂稱爵以與齊稱人以貶四國者何邪曰此踵榖梁之謬而甚之者也凡例褒貶之說先儒辨之詳矣今卽此論之僭天子之事者齊侯也召諸侯者齊侯也四國從强國之令耳書曰殱厥渠魁脅從罔治今舎齊侯而責四國失其輕重之權衡矣聖人肯若是哉自褒貶凡例之說興使聖人惻怛之心經世之義付之小巧私智惜哉十四年或問荆入蔡先儒或責桓公圖伯而不救或謂桓公圖伯先中國而後夷狄為得持重之道或謂桓公伯業未成遂致其横行淮漢子一切削之何也曰春秋之義尊君抑臣貴王賤伯内中國外夷狄而已奚暇較桓文伯業哉故不得而取也十七年或問多麋董子劉向曰麋之為言迷也月令冬至麋角解象迷復凶故麋為小人鹿為君子姤之上九為姤其角吝故夏至鹿角解者何也曰此漢儒釋經之鑿也夫不求理之顯然而求意之髣髴轉相訓詁經之所以不明也曰京房曰廢正作淫為大不明則國多麋者何也曰此漢儒奏災異之弊也夫物之為災固有所感然必求某事應某事則牽合固滯有所不通矣曰杜氏以害五榖故以災書者何也曰春夏秋多麋或害五榖冬而多麋未必害也先儒多言害稼皆本諸杜氏耳十八年或問公追戎于濟西兩孫氏兩劉氏康侯髙氏諸儒皆謂魯無預備不覺其來已去而追之邦衡葉氏諸儒又謂戎不為宼過我而躡之為出其不意以倖其功者然乎曰不然也此見經無戎伐魯之辭而但言追戎故意之而為此言也殊不知義不在於戎伐魯而在於逺追戎耳夫公追戎于濟西與公敗齊師于長勺公敗宋師于鄑義雖不同而語意相似長勺與鄑之役説者不聞譏魯無備也亦不聞齊宋不伐我也何獨於追戎而譏其無備與戎不伐我乎曰劉氏又謂追而不及何也曰僖二十六年經曰公追齊師至酅弗及則明言之矣此經無明文吾不能知其及與不及也曰有􅈮齊氏作或爾雅食葉曰或􅈮者短狐含沙射人影蓋出蠻荒江海中非魯地所有皆由縑簡相傳篆隸之變所以繆者然乎曰不然也經書曰有是未嘗有而有也此其所以異也且春秋螽但曰螽螟但曰螟未嘗書有也麋則曰多亦未嘗書有也然則􅈮之為物非所當有而有者也且􅈮之一字三傳所同未可以意改經也十九年或問公子結媵陳人之婦遂及齊侯宋公盟先儒或言鄄之巨室嫁女與陳人結以其庶女媵之因與齊宋盟挈之以往者何也曰如鄄之巨室嫁女於陳人經當書曰公子結之女媵鄄人之女于陳遂及齊侯宋公盟不當書曰結媵陳人之婦也如因與齊盟挈之以往則經當書曰公子結㑹齊侯宋公盟遂以其女媵鄄人之女于陳不當書曰結媵陳人之婦遂及齊宋盟也曰或謂此結因媵婦之故遇齊宋來伐而遂自與之盟也曰鄄者衛地齊侯宋公在焉未知其來伐我否也假令知齊宋伐我之情結當遣使歸報其君而自往媵亦不當自與之盟也曰然則何以不言魯女也曰省文也且重在遂事也盖結為媵則知其為魯女矣何必言魯女哉二十二年或問曰陳人殺其公子禦宼髙氏謂國亂不知主名者何也曰國雖亂豈有殺公子而不知主名者哉曰莘老謂賤而略之者何也賤當書盗今不書盗非賤也曰張氏諸儒皆謂世子之嫡未誓者何也曰此信左氏之誤也如世子也經當書曰世子春秋之時稱世子者曷嘗有誓於天子者哉曰劉氏謂稱人以殺為殺有罪者何也曰春秋惟討賊稱人為殺有罪其他稱人者皆非殺有罪之辭也若知劉氏說國人皆曰可殺而殺之則刑當其罪春秋何書焉曰然則史記亦稱陳宣有嬖姬生子疑欲立之乃殺太子者非歟曰史記亦誤信左氏耳史記之誤豈止此哉二十三年或問曰公如齊觀社杜氏謂因祭社蒐軍實故公往觀之者然乎曰此因襄二十四年傳稱楚子使薳啟疆如齊齊社蒐軍實使客觀之故杜氏云然今經但言觀社耳未見其蒐軍實也曰莘老孫氏謂觀社則魯社廢者然乎曰經但言觀齊社耳亦未見其廢魯社也二十四年或問曰夫人姜氏入劉氏謂不致為不見宗廟者然乎曰不然也豈有娶婦而不見宗廟之事乎盖上文先書公至自齊至此自然書入製言之體當如是也夫春秋隨事異文譏公子遂以同姓而逆女則書曰遂以婦姜至自齊至譏禘而納婦則書曰禘于太廟用致夫人此譏夫不俟婦婦不從夫則先書公至自齊而後書姜氏入所謂隨事異文者也後世必欲執此例以同彼例此理之所以不明也至杜氏求其說而不得則有丁丑入而明日告廟孔氏亦有旣朝廟乃見宗婦之說揣摩億度一至於此吁亦可怪哉曰然則先儒皆謂文姜制之而莊公不得娶者何也曰想其事勢或然而於經傳未有所考也然左氏載公初築臺臨黨氏見孟任從之閟而以夫人言許之割臂盟公生子般安知莊公不以嬖妾而不娶歟然此旣非所書本義弗辨可也曰大夫宗婦覿用幣先儒多謂公事曰見私事曰覿夫人不可見乎宗廟則不可以臨諸臣故以私言之者何也曰此見姜氏不書至與一字褒貶而生事者也此事之旨本譏婦人不當用幣而已其曰大夫宗婦覿不過叙其事實以起用幣之義更無他義也今以字義言之爾雅云覿見也覿與見本不可以公私言也姜氏丁丑初入次日宗婦即敢私見亦無是理也若曰不可見乎宗廟故以私言之不知書此覿字者魯史乎孔子乎若魯史邪莊公是時奉姜氏之不暇未有不可見宗廟之意也若孔子邪孔子必不以不可見宗廟而改舊史之見曰覿也日然則論語何以曰私覿也曰文隨事見各有所主也論語所謂私覿者謂孔子使他國朝享禮畢退而以私禮相見者也然則覿字之義本非私也以上有私字故為私覿耳今經無私字不可以私言也安得取彼私覿二字之義并為一字以訓春秋之覿為私乎易曰三嵗不覿可訓三嵗不私見乎曰杜氏又謂大夫宗婦同贄俱見子獨取胡氏之說以為非大夫與宗婦者何也曰同贄俱見穀梁之餘論也愚旣辨之矣此事左氏得其實曰哀姜至公使宗婦覿用幣不言大夫公羊雖不明言然大意亦主乎婦人之用幣杜氏解經一宗左氏不少違左氏有所不通必為曲說以通之獨此顯然者杜氏乃不察而背之甚可怪也曰朴鄉之意亦謂大夫與宗婦同日而見者何也曰大夫與宗婦固同日而見然此則但譏大夫之婦用幣耳夫男子之贄大者玉帛則大夫覿而用幣非所譏也故春秋不指大夫之用幣使指大夫之用幣經當書及今不書及則為同姓大夫之婦明矣曰戎侵曹曹羈奔陳赤歸于曹杜氏謂羈曹世子赤曹僖公然乎曰孫氏曰案史記曹世家及年表僖公名夷杜預謂羈即曹世子赤即僖公者以突歸于鄭文相類耳曰趙氏劉氏髙氏張氏諸儒皆謂戎納赤赤篡國與鄭忽突之事無異子獨何以知其不然也曰以經文次第與王氏之言而知之也王氏之言旣附見於本義之後矣請於此申之經書公納子糾楚納頓子皆明言之此則但書曰戎侵曹又不入曹而曹羈自出奔故赤得以乘間而入雖不免庶孽竊國之罪然比鄭突之倚宋逐忽者有間矣故春秋明微而學春秋者不可以不詳考也二十五年或問曰日食鼔用牲于社孫氏諸儒謂鼓為常唯鼔而用牲為非常者何也曰此糓梁氏之說也予旣辨之矣且傳有天子伐鼓于社諸侯伐鼓于朝之文而葉氏劉氏康侯之說又足以發之不煩多說也曰伯姬歸于把先儒或謂莊公女子何以知其為桓公女也曰以書法論之則石氏髙氏吕氏存耕黄氏諸儒皆謂時君之女必加子字今經不書子旣知其為桓公女矣以春秋之義求之若莊公女則此書之為無所為其後書把伯姬來亦無其義何則父母在嵗一歸寧莊公在而女子歸寧則不在所書也以其為桓公女莊公姊妹今桓公死且二十六年至此始嫁則過時明矣故此書歸與其後書公會把伯姬于洮有姊妹已嫁兄弟不同席之嫌杞伯姬來有父母死不得歸寧之戒故知其為桓公女也曰胡氏謂此不書逆女為天下亂㛰禮壞逆非大夫故不書康侯謂逆者非卿名姓不登史策則但書歸以志禮之失者何也曰此榖梁之意而易其說者也使逆非大夫正當書之以見義苟不書之則義與事俱冺世孰知之夫十二公之女不皆書其歸不皆書其逆女者以其得禮為常事而削之也其失禮非常則書以為戒故有書逆而不書歸者有書歸而不書逆者亦有書逆書歸而并書納幣者又有書大夫逆者隨事見義何有定例髙氏所謂皆有為者是也今不書逆女何必别為義哉常事不書而已矣曰旣曰伯姬則莊公姊也子何以莊公姊妹言也曰男女自為伯仲叔季故不得必其為莊公姊也曰公子友如陳公子母弟一也或稱公子或稱弟何也曰石氏曰諸侯之尊弟兄不得以屬通在禮諸侯絶旁期而臣諸父昆弟君臣者分之别也昆弟者恩之屬也禮不可以無分異貴賤則禮法嚴臣不可以敵君申私恩則公義廢然則春秋之書公子乃其常也其書弟者法之變也故始元終麟惟來聘來盟則書侵伐則書殺害出奔則書玉帛之好牲血之事大夫之職非天倫之所當行也故來聘來盟則書齊侯使其弟年来聘鄭伯使其弟語來盟是也爭怒逆徳也戰侵危事也人臣效命非天屬之所當親也故侵伐則書衛侯之弟黒肩帥師侵衛是也廹窮患難不能相恤骨肉殘害以至相伐不顧也甚矣殺害出奔則書天王殺其弟侫夫秦伯之弟鍼出奔晉是也外乎此者皆稱公子而已此春秋之法也而左氏公羊之例為母弟稱弟庶弟不得稱弟而母弟稱公子亦已戾矣二十六年或謂曰公伐戎許氏謂隠桓以來世有戎盟至莊公戎始變渝是以有濟西之役於此伐戎義已勝矣黄氏以許說為正子不取焉何也曰許氏知盟戎之為好而不知中國不可與戎盟知濟西之役可復而不知無所禀命之為罪故不取也曰木訥謂魯為曹伐之者何也曰木訥謂戎侵曹曹羈出奔陳及陳女叔來聘言必有羈於曹羈者億之之辭設使可信亦非本義二十七年或問曰把伯姬來劉氏譏其已亟然乎曰非也尋劉氏之意以伯姬為莊公女春旣㑹而冬復來故曰已亟然不知其為莊公姊妹也曰子何以知其為莊公姊妹也曰先儒以不書子伯姬故知其為莊公姊妹也使為莊公女今年春伯姬一歸寧足矣安得以父而㑹女于洮吾故斷然以為莊公姊妹而無疑也曰僖五年把伯姬來朝其子杜氏以為寜成風何也曰彼亦以為莊公女而成風所出也是時成風未死而意其歸寧爾他無所㨿也曰莒慶來逆叔姬先儒譏公自主之者何也曰以經文觀之無公自主之之義設使有之亦其中一小義耳非所書之本義也為此說者其諸榖梁氏所謂來為接内與不與夫婦之稱之意歟予旣辨之矣曰公會齊侯于城濮先儒多謂王命齊伐衛而㑹魯以定交然乎曰不然也如王命齊伐衛春秋當異其文如㑹魯以定交而伐衛必不在衛地也且齊魯已交何俟此時而定况明年伐衛齊自伐之而魯不與乎二十八年或問曰齊人伐衛衛人及齊人戰先儒多謂齊奉王命而討衛者然乎曰闕旣辨之矣曰大無麥禾黄氏謂麥之禾為一物者然乎曰不然也詩曰禾麻菽麥書曰禾盡偃則禾者榖之未刈者也豈一物哉且下書告糴入齊若其夏但無麥之禾則秋有粟不應即饑而告糴也曰劉氏謂大無麥禾為魯不務蓄積日損月削以至麥禾大盡而後覺之非今歳之事者然乎曰若然春秋當書倉廪乏不當書大無麥禾且於時為冬正農民輸粟之時旣非大荒亦不應即告糴而春秋當書大無麥粟不當書大無麥禾也曰啖氏謂敎令無經民失業而大無麥禾者然乎曰莊公之時民固失業然不致大無麥禾也民失業而大無麥禾則舉魯之地皆不耕乎必無之理也二十九年或問曰新延廏吕朴鄉謂延廏為天子之廏何也曰非也此惑於新作雉門及兩觀之為僭天子也謂兩觀僭天子可謂延廏僭天子不可夫諸侯有馬則有廏安知延廏為天子制乎此盖譏莊公大饑告糴而非時傷財害民耳曰劉氏謂修舊何也曰新者一新之謂不特修舊而已三十年或問曰葬紀叔姬髙氏以為齊人降鄣而後葬叔姬與紀侯大去其國之後齊葬伯姬同意皆所以罪齊者然乎曰不然也此惑於公榖之以鄣為紀邑耳鄣非紀邑愚旣辨之矣且伯姬者齊葬之叔姬者紀季葬之而魯往會葬耳事理了不相干其差盖又甚於公榖者曰齊人伐山戎先儒多謂齊侯又以為救燕趙氏亦謂來獻戎㨗為齊人此為齊侯蓋交互致誤者何也曰此三傳史記之說也求之經則不然左氏於公及齊侯遇于魯濟有曰謀伐山戎以其病燕故也公羊曰此齊侯也榖梁曰齊人者齊侯也史記桓二十三年山戎伐燕燕告急於齊齊桓公救燕遂伐山戎至于孤竹而還燕莊公遂送桓公入齊境又曰寡人南伐至召陵望熊山北伐山戎離枝孤竹則為齊侯自行矣使實自行經當書曰齊侯使實救燕經當書曰救燕今經曰齊人又不曰救燕况燕不與齊桓㑹盟則三傳史記不然矣盖萬世取信者經也據經考傳之真偽可也據傳疑經者先儒之大弊也况齊桓節制之師不在衆多故其侵伐多稱人唯城邢稱師伐楚稱侯耳此伐山戎安知其不命將其獻㨗也安知其不自行乎故吕朴郷曰以僖十年齊侯許男伐北戎觀之則伐北戎為齊侯親往伐山戎為將卑師少不然一齊侯也前伐山戎則稱人後伐北戎則稱侯前後自異誰能曉之可謂簡易而明白矣三十一年或問曰築臺于薛存耕謂薛不幸有大故魯莊於其近地以築臺者何也曰薛者魯地偶同薛國名又偶與薛伯卒比本二事而不相干也其下書築臺于秦可謂近秦國乎三十二年或問曰公子牙卒二傳為鴆之子獨不然何也曰邦衡髙氏辨之備矣朱子嘗曰大凡疑義所以決之不過乎義理文勢事證三者而已今公子牙卒求經之理觀經之文證以經前後之事皆不脗合故不然也曰經書隱公桓公閔公薨子般子惡卒三傳以為弑子乃然之何也曰君有可諱之義臣不在所諱也臣有罪則殺之而已矣夫君有可諱之義則理所當也而經文又不書地經之前後又有事證故三公二子之薨與卒正與義理文勢事證三者相合吾安不然其說哉曰公薨于正寢先儒之說多矣子一切不取何也曰先儒雖多為說不過論其終于正寢耳終于正寢常事也春秋不書常事嗣過雖極然亦不以卒而見義此必有為而書耳莊公十一月而始得葬不請於天子而私謚之非其起義而何哉然則薨于正寢者不過直書其實事耳而義則不主乎正寢猶書其他諸侯之卒不可為非常而為葬之緩速與私謚起也然則未可就正寢而生義也曰子般卒與子野同胡氏髙氏皆謂惟傳見弑經無所見子何以知其為弑也曰以公薨而子般繼卒又慶父如齊與閔公不書即位又閔公薨不地慶父奔莒而知之也曰康侯之說何如曰論傳而已閔公元年或問曰不書即位先儒謂内無所承上不請命正人道之大倫者何也曰尋先儒之意似謂舊史有即位之文而孔子削之無是理也不若榖梁謂先君不以道終則子弟不忍即位之為近也夫内無所承猶可說也其曰上不請命則魯之由來久矣何獨削閔公之即位乎且桓宣弑君而立其内無所承上不請命甚於閔公矣孔子何為不削之哉曰公及齊侯盟于落姑子何以知其為季子之謀也曰以理勢觀之而知之者慶父雖嘗如齊乃在前年之冬至次年秋公方及齊盟則非慶父請之也落姑旣盟季子卽歸比事而觀可以逆知其為季子之謀也且季子出奔必有所畏非有所倚何敢遽返季子旣歸仲孫旣來慶父欲篡而不得則弑閔以逃矣曰然則季子有大功乎曰未也以左氏成風之事季子與季子不討賊而奉僖公以逃又合經文季子旣歸閔公見弑之事觀之則季子意在僖公心持兩端特閔公已立而未敢發耳適慶父弑閔卒中其謀故季子遂得善名朱子所謂季子自有大惡與皆是魯國之賊者得其情矣而三傳以為賢難以語乎智矣曰齊仲孫來孫氏以為私來與祭伯來同義者然乎曰無上下文而平觀之則與祭伯來同義是時齊方有政非衰周比也況當魯國擾攘之際而仲孫忽私來乎無是理也此義吕朴鄉得之矣其言曰春秋不以名字為褒貶何也曰春秋魯史也史之所無聖人不能強加之史之所書聖人亦不革也聖人之所因革者其義也非名字之謂也且謂名為貶乎仇牧荀息皆名也未見其有可貶之實也且謂字為褒乎南季榮叔原仲蔡叔皆字也未見其有可褒之實也故有不必名之而後為貶不必字之而後為褒也不書來盟不書來聘而直書仲孫來則其無名以來可見矣豈必名之而後為貶哉然則春秋為齊桓病矣桓公身為伯主魯國有難起而正之眞伯主之事也莊公死子般弑閔公幼慶父夫人亂乎内魯之不絶如綫設以齊正魯猶反手也落姑之盟僅能復季子而已而夫人慶父之志未可知也仲孫之來非盟聘則未有以寧魯也未有以寧魯則其來為無名魯國之人皆觖焉卒之再弑閔公者慶父也然則養慶父之惡使至於稔者齊桓也直書曰來其義見矣二年或問曰吉禘于莊公先儒釋禘之義孰優曰惟趙氏冣詳其言曰禮記大傳云禮不王不禘王者禘其祖之所自出以其祖配之諸侯及其太祖喪服小記曰王者禘其祖之所自出又下云禮不王不禘正與大傳同則諸侯不得禘禮明矣是以祭法云有虞氏禘黄帝而郊嚳祖顓頊而宗堯夏后氏亦禘黃帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊冥祖契而宗湯周人禘嚳而郊稷祖文王而宗武王禘者帝王立始祖之廟謂未盡其追逺尊先之義故又推始祖所自出之帝而追祀之以其祖配之者謂於始祖廟祭之而使以始祖配祭也此祭不兼周廟之主為其踈逺不敢䙝狎故也鄭𤣥注祭法云禘謂配祭昊天上帝於圜丘也葢見祭法所說文在郊上謂之郊之最大者故為此說爾祭法所論禘郊祖宗者謂六廟之外永世不絶者有四種爾非關配祭也禘之所及最遠故先言之爾豈關圜丘哉又云祖之所自出謂感生帝靈威仰也此何大妄之甚此文出自䜟緯始於漢哀平閒偽書也故桓譚賈逵蔡邕王肅之徒疾之如讎而鄭𤣥通之於五經其為誣蠧甚矣或問曰若然則春秋書魯之禘何也荅曰成王追寵周公故也故祭統云成王追念周公賜之重祭郊社禘嘗是其義也郊禘天子之禮社與嘗諸侯所自有撰禮者見春秋書嘗社以為郊禘同遂妄言耳魯之用禘蓋於周公廟而上及文王文王即周公所自出故也此祭唯得於周公廟為之閔公時遂僭于莊公行之以其不追配故直言莊公而不言莊宫明用其禮物耳不追配文王也問者曰左傳云烝嘗禘于廟何也荅曰此為見春秋經前後記祭惟有此三種以為祭名盡於此但據經又不識經意所以云耳又見經中禘于莊公以為諸廟合行之故妄云禘于武宫僖宫襄宫皆妄引禘文而說祭爾問者曰若禘非時祭之名則禮記諸篇所說其故何也曰禮記諸篇或孔門之後末流弟子所撰或是漢初諸儒私撰之以求購金皆約春秋為之見春秋禘于莊公遂以為時祭之名見春秋唯兩度書禘一春一夏所以或謂之春祭或謂之夏祭各自著書不相符㑹理可見也而鄭𤣥不達其意故注郊特牲云禘當為礿祭義與郊特牲同鄭遂不注其注祭統及王制則云此夏殷時禮也且祭統篇末云成王追念周公賜之重祭郊社嘗禘是也何得云夏殷禮哉遂都不注鄭又見吉禘于莊公遂云禘小於祫儒者通之云三年喪畢小禘于禰五年大祫至此便三年一禘五年一祫若禘不迎羣廟之主何得謂之大若迎羣廟之主何得於禰廟迎之又曾子問篇中何得不序乖謬之甚也且春秋文二年公羊曰大事祫也毁廟之主皆陳於太祖陳者明素皆藏於太祖廟今但出而陳之也未毁廟之主皆升合食於太祖升者明自本廟而來升也禮記曾子問篇云祫祭于大廟祝迎四廟之主明毁廟之主皆素在太廟故不迎也又云非祫祭則七廟五廟無虛主並無禘說為殷祭處則禘不為殷祭明矣問曰若禘非三年喪畢之殷祭則晉人云以寡君之未禘祀何也荅曰此左氏之妄也左氏見經文云吉禘于莊公以為喪畢當禘而不知此本魯禮不合施於他國故左氏亦自云魯有禘樂賓祭用之即明諸國無禘了可知矣是左氏自相違悖亦可見矣問者曰王制所云礿則不禘禘則不嘗嘗則不烝烝則不礿信如鄭說乎荅曰撰此篇者亦縁見春秋中唯有禘烝嘗三祭謂魯唯行此三祭遂云爾若信如鄭注諸侯每歳皆朝即遠國來往須歴數時何獨廢一時而已又須往來常在道路如何守國理民乎問者曰明堂位云季夏六月以禘禮祀周公于大廟又云夏礿秋嘗冬烝此即以禘為大祭而時祭闕一時義甚明著也荅曰禮篇之中夏礿秋嘗冬烝庸淺鄙妄此篇為甚故云四代之官魯兼用之又云君臣未嘗相弑也禮樂刑法未嘗變也其鄙若此何足徴乎鄭𤣥不能推本討原但隨文求義解此禘禮輒有四種其注祭法及喪服小記則云禘是祭天注毛詩謂則云禘是宗廟之祭小于祫注郊特牲則云禘當為礿注祭統王制則云禘是夏殷之時祭名殊可怪也趙氏辨論極為詳密極為正大但其曰不追配與葉氏諸家少異耳春秋或問巷三
