body:
  text: 春秋或問卷十元程端學撰定公元年或問曰定公不書正先儒謂昭公不得正其終定公不得正其始然乎曰朴郷曰正者天子之正朔也天子頒之諸侯諸侯受而頒之於其國故於人君即位之始皆書王正月以見其受正於天子也似非正始正終之義盖是年昭公已薨而定公未立在禮先君既終而嗣君繼世不可以一年而二君故以先君之末年猶繫之先君至明年而後繫新君之元年此書法也昭公以十二月薨則今年春不得以係之先君之末年矣而定公又以六月而後即位故今年春不得如他君之例而繫以王正月但如常年書王三月爾觀聖人所書六月癸亥公之喪至乾侯所謂公者昭公也戊辰公即位所謂公者定公也則是定公未即位之前猶是昭公之魯及定公既即位然後追書今年春皆為定公元年爾此所謂不可一年而二君也史書之體也曰十月隕霜殺菽菽豆之縂名至秋而皆熟兹已十月不維其時而見殺於霜故以害民食而書之事豈不順而子獨不然何也曰讀經者當先頌一經之大義則其小義有不通者闕疑可也苟唯小義之必通而不顧大義之所在則支離穿鑿不自知其失經意矣今改正朔而不改月數大義也吾於或問既辨之矣且春秋二百四十二年之間以夏正言之皆可通也其可疑者獨此一事耳吾安得以一事而遂疑二百四十二年之事乎况菽之為物董子以為草之強者五行志以為難殺之草吾雖未深信之然豈無說而遽以小義亂大義乎二年或問曰公如晉至河乃復先儒謂意如上不請於天子下不請於方伯而立定公故晉怒而公徃朝晉辭公而復故明年因㑹而請盟於臯鼬然乎曰黃氏曰恐待晉之過厚也不獨晉無此意當時亦未嘗有此說也四年或問曰公㑹劉子諸侯于召陵侵楚先儒謂傳書伐而經書侵一以為罪楚一以為陋之何也曰此因傳疑經與一字褒貶之弊也左氏此傳錯亂不可攷葉氏辨之矣何以信傳而疑經哉春秋伐曰伐侵曰侵録實事而義自見者也使本書伐而孔子改曰侵以罪楚以陋諸侯則春秋非實録矣曰公及諸侯盟于臯鼬先儒謂書公及為魯志者何也曰此榖梁之說也予既言之矣曰石氏謂書諸侯盟㑹天子之大夫何也曰此褒貶之說也陸氏謂劉子不與者得之若惡㑹天子之大夫固當書劉子以見義苟削劉子之名人豈知其可惡哉曰把伯卒于會石氏謂齊桓伐楚許男卒于師書之如在國以齊桓安之也晉定伐楚為臯鼬之盟把伯卒于㑹為晉侯之德衰然乎曰不然也卒于師則書師卒于㑹則書㑹皆紀實事耳石氏之云其諸一字褒貶抑揚與奪之說與曰劉卷卒先儒謂惜賢者閔周室然乎曰不然也以王臣而外交諸侯豈其得義而反賢之乎周室固所閔也然不在劉卷卒見義使見義於劉卷卒則春秋書其葬又何所取義乎曰任氏謂書卒葬者卒于未至而諸侯有助之歸其喪者何也曰侵楚在三月盟在五月當盟之時劉子不與而其𦵏又在七月公至之後不可言卒於未至也設使諸侯歸其喪而書其卒葬孔子亦助其喪而書其卒葬乎曰晉衞伐鮮虞蘇氏謂昭十二年楚滅陳蔡晉不救而伐鮮虞稱晉以夷之今晉既不為蔡伐楚楚人圍蔡亦弗之救而於其伐鮮虞也稱晉士鞅衞孔圉者晉雖有乘諸侯之罪而蔡無滅國之祸輕重之異也然乎曰不然也此正一字褒貶之弊也蓋史有詳略耳曰葬劉文公孫氏髙氏諸儒謂王子虎不書葬此葬者見其私諡且僭也然乎曰不然也王子虎不書葬魯不㑹其𦵏也劉卷書葬魯會其𦵏耳非以私諡書也當時外諸侯有私謚劉卷者天子大夫其諡必由天子矣未必私謚也且天子三公稱公故蔡公亦稱公今劉卷稱公亦未見其僭也曰蔡侯以呉子及楚人戰邦衡謂凡不用我師而用彼師曰以又謂左氏所序是楚自戰而不言蔡經下文曰呉入郢亦不書蔡明蔡不交鋒吴自與楚戰蔡侯之意也故不曰用而書以者其意也然乎曰不然也以即用也非書用則實而書以則意也豈有蔡侯欲報楚怨而但以吴師不用已師之理哉左氏不言蔡者舉大者爾大凡論天下之事以理為主然後考其事迹可也苟考其事迹而不顧理有所不安則無徃而不可妄言矣今考之經文則曰蔡侯吴子而俱不言師者君行師從師不待言也如邦衡言則吴不稱師其可曰不用師乎蔡不用師吴不用師則是無戰也而曰與楚戰于柏舉何哉故善讀春秋者不以文害辭不以辭害義得其義則得其理矣且經書以某伐某者多矣如桓十四年宋人以齊人蔡人衞人陳人伐鄭經皆書曰人矣斷不可曰宋不以師而獨以四國之師僖二十六年以楚師伐齊斷不可曰魯不以師而獨以楚師也通乎彼則邦衡之說不待辨而自破矣曰劉氏又謂吴稱子為進之成伯討人囊瓦為見一貶何也曰劉氏既不暇辨公榖之非而復滯於褒貶之說故有此論也曰囊瓦稱人蘇氏謂賤之任氏謂陵中國以逞不義康侯謂囊瓦貪以敗國又不能死故人之者何也曰此皆一字褒貶不足辨也五年或問曰歸粟于蔡東莱謂先王之澤猶有存焉者任氏謂不用告饑乞糴而歸之見公恤人之患師氏亦謂得恤鄰國之道何也曰此左氏榖梁之意而衡其辭者也吾既辨之矣曰於越入吴杜氏謂於發聲也髙氏亦謂於越與漢書于粤同義蓋於于越粤皆發語辭經書於餘丘亦即其自稱書之然乎曰不然也若為發語之辭經於昭五年越人與楚子伐吴八年楚放公子招于越三十二年吴伐越何以不從發語辭書於越而獨於此及定十四年於越敗吴十三年於越入吴而書於越乎蓋不通之論也曰任氏謂於者驚歎之辭事善則驚歎以羙之若於鑠王師於皇武王是也事有不善則驚歎以惜之若於乎小子於越入吴之類是也然乎曰尤不然也在詩固有驚歎之辭在春秋無此書法也春秋者直書其事以見義者也不應於國名之上而加此驚歎之辭師氏已嘗辨此說矣其言曰以越之入吴為可驚歎則吴之入楚何以不言於吴入楚乎且經書楚或謂之荆或謂之楚既有異稱何獨於越而疑之師氏得之矣八年或問曰公侵齊張氏謂陽虎用事無軍政用兵無法故以侵書之然乎曰不然也侵曰侵伐曰伐隨事命辭豈以用兵無法而改伐為侵乎使實侵者何以命辭乎使侵而有法可改書曰伐乎是皆抑揚予奪之弊學春秋者所當痛埽也曰齊國夏伐我西鄙許氏謂宣以後用兵則侵多而伐少被兵則伐多而侵少知魯中世之衰然乎曰魯自三家得政其衰顯矣不俟伐少侵多而見也然其言亦無甚害理特以無益於經而不取云爾曰公㑹晉師於瓦石氏謂晉士鞅荀寅次于衞地緩於救患故不書大夫而書其師明其失用師之道然乎曰不然也此事之義繫於公㑹晉師而不繫於大夫名氏故不書大夫名爾使緩於救患故當書大夫名氏以見其罪焉用没其名氏見緩於救患之義乎且晉師救我左氏之說固於經無是也以書法與地勢考之未見晉師之救我也况欲於傳外生意以去名氏見緩救患乎無是理也曰先儒又謂春秋大法雖師次於君而與大夫敵至用大衆則君與大夫皆以師為重者何也曰此亦未得義繫公㑹晉師之意而有師重之說夫人君之心雖重師也然君行師從凡書君則師在其中矣未有書師而君在其中者也今此事之義在於公不當㑹晉師爾師之輕重不在此見義也且夫人姜氏如齊師亦不言君與大夫名氏亦可云以師為重乎曰從祀先公杜氏諸儒謂先公者閔公僖公也將正二公之位次所順非一親盡故通言先公焉子獨不然亦有說乎曰杜氏諸儒謂先公閔公者指文公時躋僖公而䧏閔公今復䧏僖公而升閔公也夫躋僖公經既明言僖公矣使今䧏僖公而升閔公獨不可曰從祀閔公乎且立煬宫立武宫亦名言之何獨於此言先公以啓後世紛紛之爭乎况止言從祀而不言升又不言復尤其不明者也經雖簡嚴必不如是之晦一不然也且諸侯五廟太祖之外兩昭兩穆閔僖居文宣成襄昭之上親盡已祧不應於此復升䧏之二不然也蓋杜氏諸儒因左氏之意爾左氏謂陽虎欲去三桓順祀先公而祈焉故杜氏諸儒有復䧏僖公之語今劉氏馮氏既闢左氏之妄矣不應於此復取杜氏諸儒之說也十年或問曰公至自夹谷任氏師氏諸儒謂不至以㑹而至以地為孔子之㑹異乎常㑹以禮義勝而地名不可没者然乎曰不然也桓二年公至自唐盟戎也文十七年公至自榖盟弑賊也定八年公至自瓦㑹晉師也未見其以禮義勝也何為皆至以地乎曰齊人來歸鄆讙龜隂田孫氏邦衡諸儒謂言來歸者明非魯地然乎曰不然也來歸二字是魯地非魯地皆可通稱者也非以非魯地而稱來歸也曰然則先儒謂來歸為齊人心服而歸之者然乎曰亦不然也來者來魯而已心服不服不可知也曰師氏謂宣十年齊人歸我濟西田不言來見齊有惜之之意言歸又言我見魯有卻之之心此無係之之心故不言我然乎曰亦不然也宣公以濟西田賂齊其後事齊甚謹而齊亦自歸之吾未見其惜之也且言我者魯史之常稱内辭也魯固欲之而不可以我字見義也其有係無係亦豈可以我字見義哉此皆就一字生義之弊十二年或問曰墮郈堕費公圍成左氏公羊子既引先儒之說以辨之矣抑猶有說乎曰據經而論郈與費三家自墮也成也者公自圍也非墮也先儒謂墮三都者信左氏之過也使果墮成經當書曰公墮成不當書曰公圍成至其書至亦當書曰公至自墮成不當書曰公至自圍成也學者不求之經而求之傳春秋所以不明也十三年或問曰晉趙鞅歸于晉孫氏任氏黎氏石氏諸儒雖為說不同大意皆謂叛者惡辭歸者善辭為春秋原情而赦罪然乎曰為此說者不惟昧夫春秋大義抑亦暗於人情事勢矣夫趙鞅晉之強臣也其始也據邑以叛晉君畏之故許其歸國晉國衰亂不待言而見矣夫人臣而叛其君又復國自如而以歸為善辭原情而赦罪豈不悖哉十四年以下闕文以上原闕十七行道也曷若弗為之為得乎蓋齊大國也嘗伯諸侯今衞又倚齊以圍戚自然齊序衞上何足為義哉曰任氏師氏蘇氏石氏季氏諸儒皆謂不繫戚於衞為春秋與蒯聵之有戚不與子之圍父退曼姑於齊下為不與曼姑助其子以圍父何也曰此榖梁之意也愚既辨之矣夫春秋惟其不與子之圍父故直書其事以見義豈在去一衞字升一齊字使人揣測而後能知哉四年或問曰盜殺蔡侯申先儒引左氏傳謂春秋變文書盜以警有國之君然乎曰此非知道者之言也君雖不君臣不可以不臣使蔡侯有惡且無可弑之理況蔡侯將如吴諸大夫直恐其又遷耳非大惡也而可弑之乎且公孫翩同姓大夫也而弑其君父矣孔子於是匿其名變其文而書盜又變其文而不書其君則是凡為君者有其過聖人皆許其弑也尚可以訓乎故曰非有道者之言也曰孫氏謂盜者㣲賤之稱不言弑者賤盜也何也曰襄二十九年閽弑呉子餘祭閽賤矣而亦言弑者蓋舉國之人皆臣子也而以為賤不言弑得無害於義乎五年或問曰齊侯卒先儒為說多矣子皆不取何也曰先儒為說雖多莫非論齊景之不能伯而非春秋所以書卒之本義故不得而取也六年或問曰齊陽生入于齊齊陳乞弑其君荼先儒謂陽生不稱公子者以景公命荼已則篡荼誅不子也又謂繫之齊為正其本則事理然乎曰不然也陽生不稱公子與齊小白同其稱齊亦與齊小白同通乎彼則通乎此矣不煩多為說也且陽生不子固當書公子以見義何為反去其公子哉使陽生不繫之齊則不知其為何國之人况陳乞弑逆之賊而亦繫之齊則不以繫國為義也亦明矣七年或問曰公入邾以邾子益來蘇氏諸儒謂不言滅者以明年吴伐魯魯復邾子故不言滅然乎曰不然也楚滅陳滅蔡其後陳蔡皆復國何以不書入陳入蔡乎蓋入人之國其罪大矣而滅人之國其罪尤大聖人不應改滅為入以掩魯之罪也蓋是時魯雖入邾之國而猶不滅其社稷者畏吴之見伐也非已滅其國至吴見伐而始復之也八年或問曰宋公入曹以曹伯歸蘇氏諸儒謂此滅曹也其不言滅者以曹伯好田弋背晉奸宋而自滅故書入為春秋輕重之權衡然乎曰不然也此信左氏公羊之弊也宋入曹而已未嘗滅曹也公羊之說不待辨而易見左氏之說必待辨而始明考之左氏曹伯不過用公孫疆好田弋而已未聞大惡也而聖人遽許宋之滅曹而改滅為入豈理也哉曰吳伐我劉氏謂不言鄙受之也猶曰吴過矣然乎曰不然也吴伐我不言鄙孫氏師氏蘇氏石氏所謂兵加於都城是已聖人未嘗改魯史之實也曰先儒又謂不書曰鄙及與呉盟者諱之何也曰亦非也吴伐我且不諱獨諱其名乎凡書鄙伐之淺者也書伐我伐之深者也伐之深者且書之伐之淺者反諱之必無是理也設使諱之并呉伐我不書可也書吴伐我而僅諱書鄙其能免夫放飯流歠而問無齒決之譏乎曰歸邾子益于邾張氏謂凡取邑少有復歸之者今魯不遂其惡而歸之故以順辭言之然乎曰不然也經書吴伐我又書齊人取讙及闡又書歸邾子益于邾則是懼齊與吴不得已而歸之也安得以歸為順辭哉曰齊人歸讙及闡先儒謂取者異辭歸者順辭見遷善之優改過之大春秋不諱入邾以邾益來者以明歸益于邾之能掩其前惡而美之也然乎曰不然也吴伐魯齊取魯邑畏吴懼齊而歸邾子自取媿辱其義昭然惡可謂掩前惡而羙之乎此蓋泥於取歸二字之弊而昧於屬辭比事之義爾十年或問曰齊侯陽生卒先儒謂齊人弑悼公而春秋以卒書者不忍以夷狄之民加中國之君然乎曰不然也信傳之弊也齊侯無罪而齊臣弑之固當實書以見齊臣之惡設使從而掩之不過掩齊臣之惡爾其能顯齊君之善乎且弑君者齊人也非吴人也而謂不忍夷狄之民加中國之君尤妄也曰呉救陳先儒謂救在夷狄則罪在中國吴雖夷狄來㑹于戚則進而書人使季札聘則又進而書子今曷以號舉而不進之所以深著楚罪而傷中國之衰也然乎曰不然也戚之㑹吴人之下書鄫人矣不可言吴鄫人也故書吴人非進之也春秋書楚人多矣豈皆進之哉季札聘而書吴子者以其書使不可不言呉子也亦非進之也且春秋書楚子使椒秦伯使術亦豈進之哉使春秋欲著楚罪而傷中國之衰當書吴人吴子以見義而反以號舉吴則是抑吴而揚楚也就先儒一字褒貶言之且不得通苟有脱去褒貶凡例據經求義者宜其無時而不通也十一年或問曰齊國書帥師伐我先儒謂春秋特曰我者欲省致師之由而躬自厚也然乎曰不然也凡曰伐鄙伐我皆直書其事以見兵加於魯之淺深云爾苟以書我為欲省致師之由而躬自厚則我當訓已主一身而言非復為内辭矣十二年或問曰用田賦杜氏謂丘賦之法因其田財賦出馬一匹牛三頭今欲别其田及家財各為二賦故言田賦然乎曰如杜氏說當兼言家賦不當止言田賦也田賦之說三傳不言所以惟左氏載仲尼之言歛從其薄如是則丘亦足矣若貪冒無厭雖以田賦將又不足所謂貪冒無厭者是指財賦而言也蓋賦有兵賦有財賦兵賦者丘出戎馬一匹牛三頭至四丘為甸則出革車一乘者是也財賦者如周禮九賦之法歛民財者是也宣公初稅畆則益田稅矣成公作丘甲則益兵矣益兵則益牛馬在其中矣至於哀公不應復益牛馬其所益者財賦耳又與仲尼貪冒無厭雖以田賦將又不足之言脗合故知杜氏之不然也曰君舉以為田賦者家一人以為兵賈逵以為令一井之間出一丘之賦何也曰如君舉言則七倍於常制如賈逵言則十六倍於常賦哀公雖不仁不應如是之酷而當時之民亦且駭而走矣此理之决不然者也十三年或問曰公㑹晉侯及吴子于黃池孫氏劉氏任氏師氏蘇氏胡氏石氏王氏諸儒皆謂吴主此㑹又為两伯之辭然乎曰不然也此信公羊之弊也使吴主㑹經當序吴子於晉侯之上使㑹两伯經當列序天下之諸侯今晉侯序於吴子之上而在㑹者三國而已未見吴之主㑹與两伯之辭也宋之㑹晉趙武楚屈建為主而諸國之大夫列序於其下是两伯之辭也申之㑹獨書楚子而列序諸侯於其下是楚主㑹也今黃池之㑹公羊自為之辭讀春秋者平心易氣據經求理久當自見不復一辨也十四年或問曰西狩獲麟先儒謂春秋成而麟至然乎曰不然也麟固聖人之祥聖人在位而世治麟出祥也雖有聖人不得志麟且獲焉豈祥也哉夫聖人在位而世治則隂陽和四時序鳥獸草木咸若然後麟出焉謂之不祥可乎孔子生於春秋之季歴聘諸國老而知其終莫我用也於是修春秋以正義明道當是時臣弑君子弑父夷狄制中國陪臣執國命麟出無應而至於獲此天下後世之大異也而以為春秋之祥不亦悖哉曰葉氏張氏諸儒謂麟之見獲為孔子之自任何也曰聖人雖以道自任然其心未嘗自聖也麟之見獲雖孔子道不行之兆然亦天下後世一大異也孔子安得是非二百四十二年而以一已當之乎曰夾漈又謂孔子作春秋其後者也於是魯史之紀適至獲麟故于獲麟之後不及他事何也曰謂聖人無意於獲麟而紀事適至於是亦非也今觀孔子弟子載獲麟以後事至孔子卒而止當孔子之未卒未可謂無他事也曰蘇氏諸儒又謂春秋作於五伯之始至於戰國之初何也曰隐桓之際五伯未興也哀公中年戰國未熾也春秋所以始所以終愚於本義既言之矣曰任氏師氏諸儒又謂西狩獲麟物受其害及於幽潛無所逃命何也曰此論施之春狩可施之獲麟不可當春而狩害及幽潛固也若麟之獲則有大異存焉聖人㣲意則主乎獲麟而不暇論夫春狩也曰諸儒之說子既有所不足矣孫氏之論豈不正大而子亦不取何也曰孫氏但主夷夏盛衰一節而言以其猶有所未備也故亦不得而取爾春秋或問卷十
